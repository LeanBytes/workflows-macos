# ── PR Distribution Orchestrator ─────────────────────────────────────────────
# Lightweight PR check: discover every Config/products/<id>.json and compile
# each one (fan-out matrix), so a change that breaks any product is caught
# before merge. No signing, no notarization, no S3, no artifacts.
#
# v0.4.0: products are DISCOVERED from Config/products/*.json (self-contained
# per-product files), not passed as an input. Discovery-by-glob is fork-PR safe
# — GitHub strips secrets AND vars from fork-PR runs, but the product files ship
# with the checkout. The per-app shell is trigger-only.
#
# Per-app shell:
#
#   on:
#     pull_request:
#       types: [opened, synchronize]
#   jobs:
#     pr:
#       uses: LeanBytes/workflows-macos/.github/workflows/distribute-pr.yml@v0.4.4
# ─────────────────────────────────────────────────────────────────────────────
name: distribute-pr

on:
  workflow_call:
    inputs:
      products-dir:
        description: "Directory of per-product Config/products/<id>.json files."
        type: string
        default: "Config/products"

      use-tuist:
        description: "Project is generated by Tuist (runs tuist install + generate before build)"
        type: boolean
        default: false

      pre-build-cache-path:
        description: "Path to cache via actions/cache@v5. Empty = no cache."
        type: string
        default: ""
      pre-build-cache-key:
        description: "Cache key. Required when pre-build-cache-path is set."
        type: string
        default: ""
      pre-build-script:
        description: "Path of a bash script to run before the compile step."
        type: string
        default: ""

      runs-on-build:
        description: "JSON-encoded runner label or array (e.g. '\"macos-26\"')."
        type: string
        default: '"macos-26"'

      lfs:
        description: "Pull the caller repo's git LFS files on checkout (e.g. an LFS-tracked model). Off by default."
        type: boolean
        default: false

      extra-xcodebuild-args:
        description: "Additional xcodebuild settings appended to the build command."
        type: string
        default: ""

      configuration-direct:
        description: "Xcode build configuration to compile. Default 'Release'."
        type: string
        default: "Release"

      # ── Tests (opt-in) — run the app's Swift tests on the PR ───────────────
      run-tests:
        description: "Run tests on the PR (red check on failure). Off = compile-only (current behaviour)."
        type: boolean
        default: false
      test-runner:
        description: "xcodebuild | swift | both."
        type: string
        default: "xcodebuild"
      test-scheme:
        description: "Scheme to test. Defaults to the first discovered product's scheme."
        type: string
        default: ""
      test-plan:
        type: string
        default: ""
      xcodebuild-test-args:
        type: string
        default: ""
      app-name:
        type: string
        default: ""
      swift-package-path:
        type: string
        default: "."
      swift-test-filter:
        type: string
        default: ""
      coverage-min:
        type: string
        default: ""

    secrets:
      SHARED_WORKFLOWS_TOKEN: { required: false }

permissions:
  contents: read

jobs:
  # ── Discover + validate every Config/products/<id>.json (cheap, fail-fast) ──
  # products.py validates identity + the mandatory inline changelog and fails
  # loudly on a bad file — so this ubuntu job gates the expensive macOS verify.
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      products: ${{ steps.d.outputs.products }}
      has-direct: ${{ steps.d.outputs.has-direct }}
      ids: ${{ steps.d.outputs.ids }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6

      - name: Checkout shared scripts
        uses: actions/checkout@v6
        with:
          repository: LeanBytes/workflows-macos
          ref: ${{ github.job_workflow_sha }}
          path: .shared-ci
          token: ${{ secrets.SHARED_WORKFLOWS_TOKEN || github.token }}

      - name: Discover products
        id: d
        env:
          PRODUCTS_DIR: ${{ inputs.products-dir }}
        run: python3 .shared-ci/.github/scripts/products.py discover >> "$GITHUB_OUTPUT"

      - name: Show discovered products
        run: echo "Discovered products - ${{ steps.d.outputs.ids }}"

  # ── Compile every product (fan-out) — no signing, fast "does it build?" ──
  verify:
    needs: discover
    runs-on: ${{ fromJSON(inputs.runs-on-build) }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        product: ${{ fromJSON(needs.discover.outputs.products) }}
    env:
      # A product's Direct scheme is preferred; an App-Store-only product falls
      # back to its scheme-store. (Missing keys render as "" in env assignment.)
      RAW_SCHEME: ${{ matrix.product.scheme }}
      RAW_SCHEME_STORE: ${{ matrix.product.scheme-store }}
      PRODUCT_ID: ${{ matrix.product.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
          lfs: ${{ inputs.lfs }}

      - name: Resolve scheme
        shell: bash
        run: |
          set -euo pipefail
          S="${RAW_SCHEME:-}"
          [ -z "$S" ] && S="${RAW_SCHEME_STORE:-}"
          if [ -z "$S" ]; then
            echo "::error::product '${PRODUCT_ID:-?}' has neither 'scheme' nor 'scheme-store' — cannot compile."
            exit 1
          fi
          echo "SCHEME=$S" >> "$GITHUB_ENV"
          echo "Compiling product '${PRODUCT_ID}' with scheme: $S"

      # ── Tuist (opt-in) ─────────────────────────────────────────────────────
      - name: Install Tuist (via mise)
        if: ${{ inputs.use-tuist && !inputs.run-tests }}
        shell: bash
        run: |
          set -euo pipefail
          # The `brew tap tuist/tuist` cask is broken upstream (invalid
          # `conflicts_with formula:` stanza), so Tuist is installed through mise,
          # via its official one-liner (the method used on the self-hosted runner).
          # mise lands in ~/.local/bin — add it to PATH now and to $GITHUB_PATH so
          # the Fetch/Generate steps below find it. A committed mise.toml pin is
          # honored, else latest. CI sets CI=true so mise auto-trusts the config.
          export PATH="$HOME/.local/bin:$PATH"
          command -v mise >/dev/null 2>&1 || curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          mise install
          mise exec -- tuist --version >/dev/null 2>&1 || mise use tuist@latest

      - name: Fetch Swift package dependencies (Tuist)
        if: ${{ inputs.use-tuist && !inputs.run-tests }}
        shell: bash
        run: mise exec -- tuist install

      - name: Generate Xcode project (Tuist)
        if: ${{ inputs.use-tuist && !inputs.run-tests }}
        shell: bash
        run: mise exec -- tuist generate --no-open

      # ── SwiftPM (when not Tuist) ───────────────────────────────────────────
      - name: Resolve Swift package dependencies
        if: ${{ !inputs.use-tuist && !inputs.run-tests }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -scheme "$SCHEME" \
            -configuration "${{ inputs.configuration-direct }}"

      # ── Pre-build hooks (caller-provided) ──────────────────────────────────
      - name: Pre-build cache
        if: ${{ inputs.pre-build-cache-path != '' && !inputs.run-tests }}
        uses: actions/cache@v5
        with:
          path: ${{ inputs.pre-build-cache-path }}
          key: ${{ inputs.pre-build-cache-key }}

      - name: Pre-build script
        if: ${{ inputs.pre-build-script != '' && !inputs.run-tests }}
        shell: bash
        run: bash "${{ inputs.pre-build-script }}"

      # ── Compile (no signing) ───────────────────────────────────────────────
      # CODE_SIGNING_ALLOWED=NO + CODE_SIGNING_REQUIRED=NO let xcodebuild
      # compile without selecting an identity / provisioning profile.
      # Fork PRs (where GitHub strips secrets) and same-repo PRs alike get
      # the same fast "does this build?" signal. Skipped when run-tests: the
      # `test` job builds the app as part of running the tests.
      - name: Compile (no signing)
        if: ${{ !inputs.run-tests }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild build \
            -scheme "$SCHEME" \
            -configuration "${{ inputs.configuration-direct }}" \
            -destination "generic/platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            ${{ inputs.extra-xcodebuild-args }}

  # ── Tests (opt-in) — red PR check on failure, no Jira ticket ─────────────
  # Single run against the shared core; test-scheme / app-name default to the
  # first discovered product's identity when not passed explicitly.
  test:
    if: inputs.run-tests
    needs: discover
    uses: LeanBytes/workflows-macos/.github/workflows/_test.yml@v0.4.4
    with:
      test-runner: ${{ inputs.test-runner }}
      runs-on: ${{ inputs.runs-on-build }}
      lfs: ${{ inputs.lfs }}
      test-scheme: ${{ inputs.test-scheme != '' && inputs.test-scheme || fromJSON(needs.discover.outputs.products)[0].scheme }}
      test-plan: ${{ inputs.test-plan }}
      use-tuist: ${{ inputs.use-tuist }}
      xcodebuild-test-args: ${{ inputs.xcodebuild-test-args }}
      app-name: ${{ inputs.app-name != '' && inputs.app-name || fromJSON(needs.discover.outputs.products)[0].product-name }}
      swift-package-path: ${{ inputs.swift-package-path }}
      swift-test-filter: ${{ inputs.swift-test-filter }}
      coverage-min: ${{ inputs.coverage-min }}
      pre-build-cache-path: ${{ inputs.pre-build-cache-path }}
      pre-build-cache-key: ${{ inputs.pre-build-cache-key }}
      pre-build-script: ${{ inputs.pre-build-script }}
      file-jira-on-failure: false
      gate-on-new-commit: false
    secrets:
      SHARED_WORKFLOWS_TOKEN: ${{ secrets.SHARED_WORKFLOWS_TOKEN }}
