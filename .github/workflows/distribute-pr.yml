# ── PR Distribution Orchestrator ─────────────────────────────────────────────
# Called from a per-app shell triggered on pull_request: opened/synchronize.
# Builds a Direct artifact and posts a PR comment with download links.
# Does NOT touch the appcast, App Store, or GitHub Releases.
#
# Per-app shell example:
#
#   on:
#     pull_request:
#       types: [opened, synchronize]
#   jobs:
#     pr:
#       uses: LeanBytes/workflows-macos/.github/workflows/distribute-pr.yml@v0.1
#       secrets: inherit
#
# Required caller secrets/vars: see _build-direct.yml header, plus:
#   secrets.AWS_ACCESS_KEY_ID, secrets.AWS_SECRET_ACCESS_KEY
#   vars.S3_DISTRIBUTION_PATH, vars.S3_DOWNLOAD_URL, vars.PRODUCT_NAME
# ─────────────────────────────────────────────────────────────────────────────
name: distribute-pr

on:
  workflow_call:
    inputs:
      use-tuist:
        type: boolean
        default: false
      pre-build-cache-path:
        type: string
        default: ""
      pre-build-cache-key:
        type: string
        default: ""
      pre-build-script:
        type: string
        default: ""
      has-finder-extension:
        type: boolean
        default: false
      has-quicklook-extension:
        type: boolean
        default: false
      runs-on-build:
        description: "JSON-encoded runner for the build callee"
        type: string
        default: '"macos-26"'
      extra-xcodebuild-args:
        type: string
        default: ""
      changelog-path:
        description: "Path to Changelog.json in the caller repo (single source of truth for versioning)"
        type: string
        default: "Config/Changelog.json"
    # Declared so cross-org / cross-account callers (where `secrets: inherit`
    # silently passes nothing) can pass secrets explicitly. Same-org callers
    # can keep using `secrets: inherit` — the declarations are no-ops for them.
    secrets:
      DEVELOPER_ID_P12_BASE64:        { required: false }
      DEVELOPER_ID_PASSWORD:          { required: false }
      KEYCHAIN_PASSWORD:              { required: false }
      PROV_PROF_DEVID_BASE64:         { required: false }
      PROV_PROF_DEVID_FINDER_BASE64:  { required: false }
      PROV_PROF_DEVID_QL_BASE64:      { required: false }
      ASC_KEY_ID:                     { required: false }
      ASC_ISSUER_ID:                  { required: false }
      ASC_KEY_BASE64:                 { required: false }
      AWS_ACCESS_KEY_ID:              { required: false }
      AWS_SECRET_ACCESS_KEY:          { required: false }
      SHARED_WORKFLOWS_TOKEN:         { required: false }

permissions:
  contents: read
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      direct-marketing: ${{ steps.compute.outputs.direct-marketing }}
      build-number: ${{ steps.compute.outputs.build-number }}
      artifact-label: ${{ steps.compute.outputs.artifact-label }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need full tag history for the safeguard tag check

      - name: Compute PR version (and gate beta-publish safety)
        id: compute
        shell: bash
        env:
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
        run: |
          set -euo pipefail

          NEXT_VERSION=$(python3 -c "
          import json, sys
          data = json.load(open('$CHANGELOG_PATH'))
          versions = data.get('versions') or []
          if not versions or 'version' not in versions[0]:
              print('::error::$CHANGELOG_PATH has no versions[0].version', file=sys.stderr)
              sys.exit(1)
          print(versions[0]['version'])
          ")

          # Safeguard (also enforced in distribute-beta.yml as a backstop):
          # if v$NEXT_VERSION is already a tag, merging this PR would try to
          # auto-publish a beta of an already-released version. Fail the PR
          # check so the developer fixes Changelog.json before merging.
          if git rev-parse "refs/tags/v${NEXT_VERSION}" >/dev/null 2>&1; then
            echo "::error::Config/Changelog.json's versions[0].version (${NEXT_VERSION}) has already been released (tag v${NEXT_VERSION} exists). Prepend a new entry to versions[] in this PR before merging — otherwise the post-merge beta workflow would refuse to publish."
            exit 1
          fi

          BUILD_NUMBER=$(date -u +%y%m%d%H%M%S)
          PR_NUMBER="${{ github.event.pull_request.number }}"
          DIRECT_MARKETING="${NEXT_VERSION}-pr.${PR_NUMBER}.${BUILD_NUMBER}"
          ARTIFACT_LABEL="v${DIRECT_MARKETING}"

          echo "direct-marketing=${DIRECT_MARKETING}" >> "$GITHUB_OUTPUT"
          echo "build-number=${BUILD_NUMBER}"         >> "$GITHUB_OUTPUT"
          echo "artifact-label=${ARTIFACT_LABEL}"     >> "$GITHUB_OUTPUT"

          echo "PR build prepared:"
          echo "  Next version (from Changelog.json): ${NEXT_VERSION}"
          echo "  Direct marketing:                   ${DIRECT_MARKETING}"
          echo "  Build number:                       ${BUILD_NUMBER}"
          echo "  Artifact label:                     ${ARTIFACT_LABEL}"

  build-direct:
    needs: prepare
    uses: LeanBytes/workflows-macos/.github/workflows/_build-direct.yml@v0.3.23
    with:
      version: ${{ needs.prepare.outputs.direct-marketing }}
      build-number: ${{ needs.prepare.outputs.build-number }}
      artifact-label: ${{ needs.prepare.outputs.artifact-label }}
      use-tuist: ${{ inputs.use-tuist }}
      pre-build-cache-path: ${{ inputs.pre-build-cache-path }}
      pre-build-cache-key: ${{ inputs.pre-build-cache-key }}
      pre-build-script: ${{ inputs.pre-build-script }}
      has-finder-extension: ${{ inputs.has-finder-extension }}
      has-quicklook-extension: ${{ inputs.has-quicklook-extension }}
      runs-on: ${{ inputs.runs-on-build }}
      extra-xcodebuild-args: ${{ inputs.extra-xcodebuild-args }}
    # Explicit secret passing (not `inherit`) — see comment on workflow_call.secrets above.
    secrets:
      DEVELOPER_ID_P12_BASE64:        ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_PASSWORD:          ${{ secrets.DEVELOPER_ID_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_DEVID_BASE64:         ${{ secrets.PROV_PROF_DEVID_BASE64 }}
      PROV_PROF_DEVID_FINDER_BASE64:  ${{ secrets.PROV_PROF_DEVID_FINDER_BASE64 }}
      PROV_PROF_DEVID_QL_BASE64:      ${{ secrets.PROV_PROF_DEVID_QL_BASE64 }}
      ASC_KEY_ID:                     ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID:                  ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_BASE64:                 ${{ secrets.ASC_KEY_BASE64 }}

  publish-pr:
    needs: [prepare, build-direct]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download direct-build artifact
        uses: actions/download-artifact@v8
        with:
          name: direct-build
          path: ./artifacts

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
        shell: bash
        run: |
          set -euo pipefail
          for f in ./artifacts/*.dmg ./artifacts/*.zip; do
            [ -e "$f" ] || continue
            BASENAME=$(basename "$f")
            aws s3 cp "$f" "${S3_DISTRIBUTION_PATH}/${BASENAME}"
            echo "Uploaded ${BASENAME}"
          done

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ARTIFACT_LABEL: ${{ needs.prepare.outputs.artifact-label }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          S3_DOWNLOAD_URL: ${{ vars.S3_DOWNLOAD_URL }}
          PRODUCT_NAME: ${{ vars.PRODUCT_NAME }}
          VERSION: ${{ needs.prepare.outputs.direct-marketing }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}
        with:
          script: |
            const label = process.env.ARTIFACT_LABEL;
            const baseUrl = process.env.S3_DOWNLOAD_URL;
            const productName = process.env.PRODUCT_NAME;
            const version = process.env.VERSION;
            const build = process.env.BUILD_NUMBER;
            const pr = process.env.PR_NUMBER;

            const body = [
              `**PR build ready** ✅`,
              ``,
              `| Artifact | Link |`,
              `|----------|------|`,
              `| DMG | [${productName}_${label}.dmg](${baseUrl}/${productName}_${label}.dmg) |`,
              `| ZIP | [${productName}_${label}.zip](${baseUrl}/${productName}_${label}.zip) |`,
              ``,
              `PR: #${pr} · Version: \`${version}\` · Build: \`${build}\``,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
