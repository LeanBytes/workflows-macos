# ── PR Distribution Orchestrator ─────────────────────────────────────────────
# Lightweight PR check. Validates that:
#   1. Config/Changelog.json's versions[0].version hasn't already been
#      released (the auto-publish safeguard), AND
#   2. The project compiles for the configured Direct scheme.
#
# No signing, no notarization, no S3, no PR comment, no artifacts. PR builds
# are intentionally minimal — beta and release workflows do the real work.
# Works for both same-repo and fork PRs (GitHub strips secrets from fork-PR
# runs, but this workflow doesn't need any, so it's a no-op constraint).
#
# Per-app shell:
#
#   on:
#     pull_request:
#       types: [opened, synchronize]
#   jobs:
#     pr:
#       uses: LeanBytes/workflows-macos/.github/workflows/distribute-pr.yml@v0.3.45
#       with:
#         # … optional inputs …
# ─────────────────────────────────────────────────────────────────────────────
name: distribute-pr

on:
  workflow_call:
    inputs:
      use-tuist:
        description: "Project is generated by Tuist (runs tuist install + generate before build)"
        type: boolean
        default: false

      pre-build-cache-path:
        description: "Path to cache via actions/cache@v5. Empty = no cache."
        type: string
        default: ""
      pre-build-cache-key:
        description: "Cache key. Required when pre-build-cache-path is set."
        type: string
        default: ""
      pre-build-script:
        description: "Path of a bash script to run before the compile step."
        type: string
        default: ""

      runs-on-build:
        description: "JSON-encoded runner label or array (e.g. '\"macos-26\"')."
        type: string
        default: '"macos-26"'

      extra-xcodebuild-args:
        description: "Additional xcodebuild settings appended to the build command."
        type: string
        default: ""

      changelog-path:
        description: "Path to Changelog.json in the caller repo (single source of truth for versioning)."
        type: string
        default: "Config/Changelog.json"

      configuration-direct:
        description: "Xcode build configuration to compile. Default 'Release'."
        type: string
        default: "Release"

      scheme-name:
        description: |
          Direct scheme name to compile. Pass this explicitly when the
          workflow can fire on fork PRs — GitHub strips `vars.*` (along
          with secrets) from fork-PR runs, so a vars-based scheme name
          would resolve to empty and xcodebuild would error. Same-repo
          callers can leave this empty and the workflow falls back to
          `vars.SCHEME_NAME`.
        type: string
        default: ""

      # Accepted for backward compatibility with the v0.3.x shell templates.
      # Extensions are part of the scheme — they compile alongside the app
      # regardless of these flags, so the PR workflow ignores them.
      has-finder-extension:
        type: boolean
        default: false
      has-quicklook-extension:
        type: boolean
        default: false

      # ── Tests (opt-in) — run the app's Swift tests on the PR ───────────────
      run-tests:
        description: "Run tests on the PR (red check on failure). Off = compile-only (current behaviour)."
        type: boolean
        default: false
      test-runner:
        description: "xcodebuild | swift | both."
        type: string
        default: "xcodebuild"
      test-scheme:
        description: "Scheme to test (defaults to scheme-name, else SCHEME_NAME). Pass a literal for fork PRs."
        type: string
        default: ""
      test-plan:
        type: string
        default: ""
      xcodebuild-test-args:
        type: string
        default: ""
      app-name:
        type: string
        default: ""
      swift-package-path:
        type: string
        default: "."
      swift-test-filter:
        type: string
        default: ""
      coverage-min:
        type: string
        default: ""

    secrets:
      SHARED_WORKFLOWS_TOKEN: { required: false }

permissions:
  contents: read

jobs:
  verify:
    runs-on: ${{ fromJSON(inputs.runs-on-build) }}
    timeout-minutes: 30
    env:
      # Prefer the explicit input; fall back to vars.SCHEME_NAME for same-repo
      # callers. Vars are stripped on fork PRs, so OSS consumers must pass
      # `scheme-name` as a literal in their per-app shell to support fork PRs.
      SCHEME: ${{ inputs.scheme-name != '' && inputs.scheme-name || vars.SCHEME_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # safeguard needs full tag history
          submodules: true

      - name: Verify scheme name is resolvable
        shell: bash
        run: |
          if [ -z "$SCHEME" ]; then
            echo "::error::No scheme name available. Pass the \`scheme-name\` input from your per-app shell as a literal (e.g. \`scheme-name: MacPacker\`), or set repository variable \`SCHEME_NAME\`. Fork PRs strip vars — only the literal input survives there."
            exit 1
          fi
          echo "Using scheme: $SCHEME"

      # ── Safeguard: Changelog.json's versions[0] isn't already released ────
      - name: Changelog.json safeguard
        shell: bash
        env:
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
        run: |
          set -euo pipefail

          NEXT_VERSION=$(python3 -c "
          import json, sys
          data = json.load(open('$CHANGELOG_PATH'))
          versions = data.get('versions') or []
          if not versions or 'version' not in versions[0]:
              print('::error::$CHANGELOG_PATH has no versions[0].version', file=sys.stderr)
              sys.exit(1)
          print(versions[0]['version'])
          ")

          if git rev-parse "refs/tags/v${NEXT_VERSION}" >/dev/null 2>&1; then
            echo "::error::Config/Changelog.json's versions[0].version (${NEXT_VERSION}) has already been released (tag v${NEXT_VERSION} exists). Prepend a new entry to versions[] in this PR before merging — otherwise the post-merge beta workflow would refuse to publish."
            exit 1
          fi

          echo "Changelog.json OK — next version to ship: ${NEXT_VERSION}"

      # ── Compile-only path (skipped when run-tests: the `test` job builds) ──
      # ── Tuist (opt-in) ─────────────────────────────────────────────────────
      - name: Install Tuist
        if: ${{ inputs.use-tuist && !inputs.run-tests }}
        shell: bash
        run: |
          brew tap tuist/tuist
          brew install --formula tuist

      - name: Fetch Swift package dependencies (Tuist)
        if: ${{ inputs.use-tuist && !inputs.run-tests }}
        shell: bash
        run: tuist install

      - name: Generate Xcode project (Tuist)
        if: ${{ inputs.use-tuist && !inputs.run-tests }}
        shell: bash
        run: tuist generate --no-open

      # ── SwiftPM (when not Tuist) ───────────────────────────────────────────
      - name: Resolve Swift package dependencies
        if: ${{ !inputs.use-tuist && !inputs.run-tests }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -scheme "$SCHEME" \
            -configuration "${{ inputs.configuration-direct }}"

      # ── Pre-build hooks (caller-provided) ──────────────────────────────────
      - name: Pre-build cache
        if: ${{ inputs.pre-build-cache-path != '' && !inputs.run-tests }}
        uses: actions/cache@v5
        with:
          path: ${{ inputs.pre-build-cache-path }}
          key: ${{ inputs.pre-build-cache-key }}

      - name: Pre-build script
        if: ${{ inputs.pre-build-script != '' && !inputs.run-tests }}
        shell: bash
        run: bash "${{ inputs.pre-build-script }}"

      # ── Compile (no signing) ───────────────────────────────────────────────
      # CODE_SIGNING_ALLOWED=NO + CODE_SIGNING_REQUIRED=NO let xcodebuild
      # compile without selecting an identity / provisioning profile.
      # Fork PRs (where GitHub strips secrets) and same-repo PRs alike get
      # the same fast "does this build?" signal. Skipped when run-tests: the
      # `test` job builds the app as part of running the tests.
      - name: Compile (no signing)
        if: ${{ !inputs.run-tests }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild build \
            -scheme "$SCHEME" \
            -configuration "${{ inputs.configuration-direct }}" \
            -destination "generic/platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            ${{ inputs.extra-xcodebuild-args }}

  # ── Tests (opt-in) — red PR check on failure, no Jira ticket ─────────────
  test:
    if: inputs.run-tests
    uses: LeanBytes/workflows-macos/.github/workflows/_test.yml@v0.3.45
    with:
      test-runner: ${{ inputs.test-runner }}
      runs-on: ${{ inputs.runs-on-build }}
      test-scheme: ${{ inputs.test-scheme != '' && inputs.test-scheme || inputs.scheme-name }}
      test-plan: ${{ inputs.test-plan }}
      use-tuist: ${{ inputs.use-tuist }}
      xcodebuild-test-args: ${{ inputs.xcodebuild-test-args }}
      app-name: ${{ inputs.app-name }}
      swift-package-path: ${{ inputs.swift-package-path }}
      swift-test-filter: ${{ inputs.swift-test-filter }}
      coverage-min: ${{ inputs.coverage-min }}
      pre-build-cache-path: ${{ inputs.pre-build-cache-path }}
      pre-build-cache-key: ${{ inputs.pre-build-cache-key }}
      pre-build-script: ${{ inputs.pre-build-script }}
      file-jira-on-failure: false
      gate-on-new-commit: false
    secrets:
      SHARED_WORKFLOWS_TOKEN: ${{ secrets.SHARED_WORKFLOWS_TOKEN }}
