# ── Alpha (invite-only) Distribution Orchestrator ────────────────────────────
# Called from a per-app shell triggered MANUALLY (workflow_dispatch), run against
# a feature branch (e.g. a "3.0" / "v3" branch). Cuts a signed + notarized Direct
# build and hands it out PRIVATELY — deliberately OFF the public machinery:
#
#   * NO Sparkle appcast update      (invitees get the build by hand, not auto-update)
#   * NO Changelog.json write/upload (the changelog/website are untouched)
#   * NO GitHub Release object       (only an unlisted S3 URL + a git tag)
#
# The artifact is built byte-for-byte like a real release (Developer ID signed,
# notarytool-notarized, stapled) so it runs cleanly on an invitee's Mac — only
# the DISTRIBUTION is private.
#
# Identity + base version: pass **`product-id`** to source both from
# `Config/products/<id>.json` (the v0.4.0 source of truth) — its
# `changelog.versions[0].version` is the base, its scheme/bundle-id/etc. drive
# the build, and the tag is **`<id>-v<base>-alpha.<N>`**. For a repo without
# product files, pass `scheme`/`bundle-id`/`product-name` directly instead and
# the tag is the legacy `v<base>-alpha.<N>`.
#   * <base> may be overridden with `version-base`.
#   * <N> counts existing `<prefix><base>-alpha.*` tags — the tag IS the durable
#     record + next-run counter and pins the exact commit handed out.
#
# IMPORTANT — the alpha tag must NOT fire the release flow. Your per-app
# distribute-release.yml tag filter must exclude `!*-v*-alpha.*` (it already
# excludes betas), or the tag push triggers a real release.
#
# Per-app shell example:
#
#   on:
#     workflow_dispatch:
#   jobs:
#     alpha:
#       uses: LeanBytes/workflows-macos/.github/workflows/distribute-alpha.yml@v0.4.4
#       with:
#         product-id: main          # sources identity + base from Config/products/main.json
#       secrets:
#         # … Direct subset only (no Sparkle key, no App Store secrets)
# ─────────────────────────────────────────────────────────────────────────────
name: distribute-alpha

on:
  workflow_call:
    inputs:
      product-id:
        description: "Product id → sources identity + base version from Config/products/<id>.json, tags <id>-v<base>-alpha.N. Empty = use the scheme/bundle-id/product-name inputs (legacy v<base>-alpha.N)."
        type: string
        default: ""
      products-dir:
        description: "Directory of per-product Config/products/<id>.json files (used with product-id)."
        type: string
        default: "Config/products"
      version-base:
        description: "Base version for the alpha (e.g. '3.0.0'). Empty = the product file's (or Changelog.json's) versions[0].version."
        type: string
        default: ""
      changelog-path:
        description: "Path to Changelog.json (read-only — only used to derive the base version when product-id AND version-base are both empty)."
        type: string
        default: "Config/Changelog.json"

      # ── Product identity (used only when product-id is empty) ──────────────
      scheme:
        description: "Xcode scheme to archive (when product-id is empty)."
        type: string
        default: ""
      bundle-id:
        description: "App bundle identifier (when product-id is empty)."
        type: string
        default: ""
      product-name:
        description: "Product name — drives the .app name and DMG/ZIP filenames (when product-id is empty)."
        type: string
        default: ""
      bundle-id-finder:
        description: "Finder extension bundle id (only when has-finder-extension)."
        type: string
        default: ""
      bundle-id-quicklook:
        description: "Quick Look extension bundle id (only when has-quicklook-extension)."
        type: string
        default: ""
      s3-subpath:
        description: "S3 sub-prefix (when product-id is empty; a product file supplies its own). Uploads to <dist>/<subpath>/alpha/<version>/."
        type: string
        default: ""

      # ── Per-app build flags (same meaning as the other orchestrators) ──────
      use-tuist:
        type: boolean
        default: false
      lfs:
        description: "Pull the caller repo's git LFS files on checkout. Off by default."
        type: boolean
        default: false
      pre-build-cache-path:
        type: string
        default: ""
      pre-build-cache-key:
        type: string
        default: ""
      pre-build-script:
        type: string
        default: ""
      has-finder-extension:
        description: "Finder extension (when product-id is empty; a product file supplies its own has-finder)."
        type: boolean
        default: false
      has-quicklook-extension:
        description: "Quick Look extension (when product-id is empty; a product file supplies its own has-quicklook)."
        type: boolean
        default: false
      configuration-direct:
        description: "Xcode build configuration for the Direct archive. Default 'Release'."
        type: string
        default: "Release"
      extra-xcodebuild-args:
        type: string
        default: ""
      runs-on-build:
        type: string
        default: '"macos-26"'
      runs-on-publish:
        description: "Publish job runner. Ubuntu is fine (only AWS CLI + git tag push), but defaults to macOS for parity."
        type: string
        default: '"macos-26"'

    # Direct subset only — no Sparkle key, no App Store certs/profiles.
    secrets:
      DEVELOPER_ID_P12_BASE64:        { required: false }
      DEVELOPER_ID_PASSWORD:          { required: false }
      KEYCHAIN_PASSWORD:              { required: false }
      PROV_PROF_DEVID_BASE64:         { required: false }
      PROV_PROF_DEVID_FINDER_BASE64:  { required: false }
      PROV_PROF_DEVID_QL_BASE64:      { required: false }
      # A product file may name its Developer ID profile secret via
      # devid-profile-secret; unset falls back to PROV_PROF_DEVID_BASE64.
      PROV_PROF_DEVID_PRO_BASE64:     { required: false }
      # …and its Developer ID CERTIFICATE via devid-cert-secret /
      # devid-cert-password-secret; unset falls back to DEVELOPER_ID_P12_BASE64 /
      # DEVELOPER_ID_PASSWORD (e.g. a legacy team kept after an account transfer).
      DEVELOPER_ID_P12_ALT_BASE64:    { required: false }
      DEVELOPER_ID_PASSWORD_ALT:      { required: false }
      ASC_KEY_ID:                     { required: false }
      ASC_ISSUER_ID:                  { required: false }
      ASC_KEY_BASE64:                 { required: false }
      AWS_ACCESS_KEY_ID:              { required: false }
      AWS_SECRET_ACCESS_KEY:          { required: false }
      SHARED_WORKFLOWS_TOKEN:         { required: false }

permissions:
  contents: write          # to push the <prefix><base>-alpha.<N> tag

# Serialize alpha runs across the repo so two manual dispatches can't race on a
# product's alpha counter.
concurrency:
  group: distribute-alpha-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      scheme: ${{ steps.compute.outputs.scheme }}
      bundle-id: ${{ steps.compute.outputs.bundle-id }}
      product-name: ${{ steps.compute.outputs.product-name }}
      bundle-id-finder: ${{ steps.compute.outputs.bundle-id-finder }}
      bundle-id-quicklook: ${{ steps.compute.outputs.bundle-id-quicklook }}
      has-finder: ${{ steps.compute.outputs.has-finder }}
      has-quicklook: ${{ steps.compute.outputs.has-quicklook }}
      s3-subpath: ${{ steps.compute.outputs.s3-subpath }}
      devid-secret: ${{ steps.compute.outputs.devid-secret }}
      devid-cert-secret: ${{ steps.compute.outputs.devid-cert-secret }}
      devid-cert-password-secret: ${{ steps.compute.outputs.devid-cert-password-secret }}
      marketing: ${{ steps.compute.outputs.marketing }}
      build-number: ${{ steps.compute.outputs.build-number }}
      artifact-label: ${{ steps.compute.outputs.artifact-label }}
      alpha-tag: ${{ steps.compute.outputs.alpha-tag }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full tag history for the alpha counter + safeguard

      - name: Resolve identity + compute alpha version
        id: compute
        shell: bash
        env:
          PRODUCT_ID: ${{ inputs.product-id }}
          PRODUCTS_DIR: ${{ inputs.products-dir }}
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
          VERSION_BASE: ${{ inputs.version-base }}
          IN_SCHEME: ${{ inputs.scheme }}
          IN_BUNDLE_ID: ${{ inputs.bundle-id }}
          IN_PRODUCT_NAME: ${{ inputs.product-name }}
          IN_BUNDLE_ID_FINDER: ${{ inputs.bundle-id-finder }}
          IN_BUNDLE_ID_QL: ${{ inputs.bundle-id-quicklook }}
          IN_S3_SUBPATH: ${{ inputs.s3-subpath }}
          IN_HAS_FINDER: ${{ inputs.has-finder-extension }}
          IN_HAS_QL: ${{ inputs.has-quicklook-extension }}
        run: |
          set -euo pipefail
          # Resolve identity + base: from Config/products/<id>.json when product-id
          # is set, else from the direct inputs. shlex.quote keeps values safe.
          eval "$(python3 - <<'PY'
          import json, os, shlex
          def sh(k, v): print(f'{k}={shlex.quote(str(v))}')
          pid = os.environ.get("PRODUCT_ID", "").strip()
          if pid:
              p = json.load(open(f'{os.environ["PRODUCTS_DIR"]}/{pid}.json'))
              base = os.environ.get("VERSION_BASE") or p["changelog"]["versions"][0]["version"]
              sh("R_SCHEME", p.get("scheme") or p.get("scheme-store") or "")
              sh("R_BUNDLE_ID", p.get("bundle-id", ""))
              sh("R_PRODUCT_NAME", p.get("product-name", ""))
              sh("R_BUNDLE_ID_FINDER", p.get("bundle-id-finder", ""))
              sh("R_BUNDLE_ID_QL", p.get("bundle-id-quicklook", ""))
              sh("R_S3_SUBPATH", (p.get("s3-subpath") or "").strip("/"))
              sh("R_HAS_FINDER", "true" if p.get("has-finder") else "false")
              sh("R_HAS_QL", "true" if p.get("has-quicklook") else "false")
              sh("R_DEVID_SECRET", p.get("devid-profile-secret", ""))
              sh("R_DEVID_CERT_SECRET", p.get("devid-cert-secret", ""))
              sh("R_DEVID_CERT_PW_SECRET", p.get("devid-cert-password-secret", ""))
              # Bare 'v' when the product omits 'id' (primary), '<id>-v' otherwise.
              file_id = str(p.get("id") or "").strip()
              sh("R_PREFIX", f"{file_id}-v" if file_id else "v")
              sh("R_BASE", base)
          else:
              base = os.environ.get("VERSION_BASE", "")
              if not base:
                  d = json.load(open(os.environ["CHANGELOG_PATH"]))
                  vs = d.get("versions") or []
                  base = vs[0].get("version", "") if vs else ""
              sh("R_SCHEME", os.environ.get("IN_SCHEME", ""))
              sh("R_BUNDLE_ID", os.environ.get("IN_BUNDLE_ID", ""))
              sh("R_PRODUCT_NAME", os.environ.get("IN_PRODUCT_NAME", ""))
              sh("R_BUNDLE_ID_FINDER", os.environ.get("IN_BUNDLE_ID_FINDER", ""))
              sh("R_BUNDLE_ID_QL", os.environ.get("IN_BUNDLE_ID_QL", ""))
              sh("R_S3_SUBPATH", (os.environ.get("IN_S3_SUBPATH", "") or "").strip("/"))
              sh("R_HAS_FINDER", os.environ.get("IN_HAS_FINDER", "false"))
              sh("R_HAS_QL", os.environ.get("IN_HAS_QL", "false"))
              sh("R_DEVID_SECRET", "")
              sh("R_DEVID_CERT_SECRET", "")
              sh("R_DEVID_CERT_PW_SECRET", "")
              sh("R_PREFIX", "v")
              sh("R_BASE", base)
          PY
          )"

          [ -n "${R_SCHEME:-}" ] || { echo "::error::no scheme resolved — set product-id or the scheme input."; exit 1; }
          [ -n "${R_BASE:-}" ]   || { echo "::error::no base version resolved — set product-id, version-base, or a valid Changelog.json."; exit 1; }

          # Safeguard (parity with beta): base must be UNreleased for this product.
          if git rev-parse "refs/tags/${R_PREFIX}${R_BASE}" >/dev/null 2>&1; then
            echo "::error::${R_PREFIX}${R_BASE} is already released — alphas are for an unreleased version. Bump the base first."
            exit 1
          fi

          N=$(( $(git tag --list "${R_PREFIX}${R_BASE}-alpha.*" | wc -l | tr -d ' ') + 1 ))
          BUILD_NUMBER=$(date -u +%y%m%d%H%M%S)
          MARKETING="${R_BASE}-alpha.${N}"            # e.g. 3.0.0-alpha.1
          ALPHA_TAG="${R_PREFIX}${R_BASE}-alpha.${N}"  # e.g. main-v3.0.0-alpha.1 or v3.0.0-alpha.1

          {
            echo "scheme=${R_SCHEME}"
            echo "bundle-id=${R_BUNDLE_ID}"
            echo "product-name=${R_PRODUCT_NAME}"
            echo "bundle-id-finder=${R_BUNDLE_ID_FINDER}"
            echo "bundle-id-quicklook=${R_BUNDLE_ID_QL}"
            echo "has-finder=${R_HAS_FINDER}"
            echo "has-quicklook=${R_HAS_QL}"
            echo "s3-subpath=${R_S3_SUBPATH}"
            echo "devid-secret=${R_DEVID_SECRET}"
            echo "devid-cert-secret=${R_DEVID_CERT_SECRET}"
            echo "devid-cert-password-secret=${R_DEVID_CERT_PW_SECRET}"
            echo "marketing=${MARKETING}"
            echo "build-number=${BUILD_NUMBER}"
            echo "artifact-label=${MARKETING}"
            echo "alpha-tag=${ALPHA_TAG}"
          } >> "$GITHUB_OUTPUT"

          echo "Alpha prepared: ${ALPHA_TAG}  (scheme=${R_SCHEME}, build=${BUILD_NUMBER})"

  build-direct:
    needs: prepare
    if: needs.prepare.result == 'success'
    uses: LeanBytes/workflows-macos/.github/workflows/_build-direct.yml@v0.4.4
    with:
      version: ${{ needs.prepare.outputs.marketing }}        # e.g. "3.0.0-alpha.1"
      build-number: ${{ needs.prepare.outputs.build-number }}
      artifact-label: ${{ needs.prepare.outputs.artifact-label }}
      scheme-name: ${{ needs.prepare.outputs.scheme }}
      bundle-id: ${{ needs.prepare.outputs.bundle-id }}
      product-name: ${{ needs.prepare.outputs.product-name }}
      bundle-id-finder: ${{ needs.prepare.outputs.bundle-id-finder }}
      bundle-id-quicklook: ${{ needs.prepare.outputs.bundle-id-quicklook }}
      use-tuist: ${{ inputs.use-tuist }}
      pre-build-cache-path: ${{ inputs.pre-build-cache-path }}
      pre-build-cache-key: ${{ inputs.pre-build-cache-key }}
      pre-build-script: ${{ inputs.pre-build-script }}
      has-finder-extension: ${{ needs.prepare.outputs.has-finder == 'true' }}
      has-quicklook-extension: ${{ needs.prepare.outputs.has-quicklook == 'true' }}
      runs-on: ${{ inputs.runs-on-build }}
      extra-xcodebuild-args: ${{ inputs.extra-xcodebuild-args }}
      configuration: ${{ inputs.configuration-direct }}
      lfs: ${{ inputs.lfs }}
    secrets:
      DEVELOPER_ID_P12_BASE64:        ${{ needs.prepare.outputs.devid-cert-secret != '' && secrets[needs.prepare.outputs.devid-cert-secret] || secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_PASSWORD:          ${{ needs.prepare.outputs.devid-cert-password-secret != '' && secrets[needs.prepare.outputs.devid-cert-password-secret] || secrets.DEVELOPER_ID_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_DEVID_BASE64:         ${{ needs.prepare.outputs.devid-secret != '' && secrets[needs.prepare.outputs.devid-secret] || secrets.PROV_PROF_DEVID_BASE64 }}
      PROV_PROF_DEVID_FINDER_BASE64:  ${{ secrets.PROV_PROF_DEVID_FINDER_BASE64 }}
      PROV_PROF_DEVID_QL_BASE64:      ${{ secrets.PROV_PROF_DEVID_QL_BASE64 }}
      ASC_KEY_ID:                     ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID:                  ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_BASE64:                 ${{ secrets.ASC_KEY_BASE64 }}
      SHARED_WORKFLOWS_TOKEN:         ${{ secrets.SHARED_WORKFLOWS_TOKEN }}

  publish-alpha:
    needs: [prepare, build-direct]
    if: needs.build-direct.result == 'success'
    runs-on: ${{ fromJSON(inputs.runs-on-publish) }}
    timeout-minutes: 20
    env:
      MARKETING: ${{ needs.prepare.outputs.marketing }}
      BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}
      ARTIFACT_LABEL: ${{ needs.prepare.outputs.artifact-label }}
      ALPHA_TAG: ${{ needs.prepare.outputs.alpha-tag }}
      S3_SUBPATH: ${{ needs.prepare.outputs.s3-subpath }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need the branch ref to push the tag

      - name: Download direct-build artifact
        uses: actions/download-artifact@v8
        with:
          name: direct-build
          path: ./artifacts/direct

      - name: Install AWS CLI
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws &>/dev/null; then
            curl "https://awscli.amazonaws.com/AWSCLIV2.pkg" -o /tmp/AWSCLIV2.pkg
            sudo installer -pkg /tmp/AWSCLIV2.pkg -target /
            rm -f /tmp/AWSCLIV2.pkg
          fi
          aws --version

      # Upload to an UNLISTED `alpha/<version>/` prefix — hand-out-the-URL only.
      - name: Upload DMG + ZIP to S3 (unlisted alpha prefix)
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
        run: |
          set -euo pipefail
          DEST="${S3_DISTRIBUTION_PATH}${S3_SUBPATH:+/$S3_SUBPATH}/alpha/${MARKETING}"
          for f in ./artifacts/direct/*.dmg ./artifacts/direct/*.zip; do
            [ -e "$f" ] || continue
            BASENAME=$(basename "$f")
            aws s3 cp "$f" "${DEST}/${BASENAME}"
            echo "Uploaded ${BASENAME} → ${DEST}/"
          done

      # The tag is the durable record + counter source. It does NOT create a GH
      # Release. (Your distribute-release.yml MUST exclude `*-v*-alpha.*`.)
      - name: Push alpha tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$ALPHA_TAG" -m "Alpha ${ALPHA_TAG}"
          git push origin "$ALPHA_TAG"
          echo "Pushed tag $ALPHA_TAG"

      - name: Write alpha build summary
        shell: bash
        env:
          PRODUCT_NAME: ${{ needs.prepare.outputs.product-name }}
          S3_DOWNLOAD_URL: ${{ vars.S3_DOWNLOAD_URL }}
        run: |
          BASE_URL="${S3_DOWNLOAD_URL}${S3_SUBPATH:+/$S3_SUBPATH}/alpha/${MARKETING}"
          {
            echo "## Alpha build ready 🧪"
            echo
            echo "Private invite build — **not** published to the appcast, the changelog, or GitHub Releases."
            echo
            echo "**Version:** \`${MARKETING}\` · **Build:** \`${BUILD_NUMBER}\` · **Tag:** \`${ALPHA_TAG}\` · **Commit:** \`${GITHUB_SHA}\`"
            echo
            echo "Hand this link to invited testers (notarized — opens without Gatekeeper warnings):"
            echo
            echo "| Artifact | Download |"
            echo "|---|---|"
            echo "| DMG | [${PRODUCT_NAME}_${ARTIFACT_LABEL}.dmg](${BASE_URL}/${PRODUCT_NAME}_${ARTIFACT_LABEL}.dmg) |"
            echo "| ZIP | [${PRODUCT_NAME}_${ARTIFACT_LABEL}.zip](${BASE_URL}/${PRODUCT_NAME}_${ARTIFACT_LABEL}.zip) |"
          } >> "$GITHUB_STEP_SUMMARY"
