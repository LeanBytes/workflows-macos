# ── Alpha (invite-only) Distribution Orchestrator ────────────────────────────
# Called from a per-app shell triggered MANUALLY (workflow_dispatch), run against
# a feature branch (e.g. a "3.0" / "v3" branch). Cuts a signed + notarized Direct
# build and hands it out PRIVATELY — it is deliberately OFF the public machinery:
#
#   * NO Sparkle appcast update      (invitees get the build by hand, not auto-update)
#   * NO Changelog.json write/upload (the changelog/website are untouched)
#   * NO GitHub Release object       (only an unlisted S3 URL + a git tag)
#
# Think of it as "cut a private release out of this branch." The artifact is built
# byte-for-byte like a real release (Developer ID signed, notarytool-notarized,
# stapled) so it runs cleanly on an invitee's Mac without Gatekeeper warnings —
# only the DISTRIBUTION is private.
#
# Identity: `<base>-alpha.<N>` (e.g. 3.0.0-alpha.1).
#   * <base> is read from the branch's Changelog.json versions[0].version
#     (READ-ONLY — alphas are never written back), or the `version-base` input.
#   * <N> is counted from existing `v<base>-alpha.*` git tags — exactly like the
#     beta counter. The tag IS the durable record + the next-run counter, and
#     pins the exact commit handed out. No S3 meta-file needed.
#
# IMPORTANT — the alpha tag must NOT fire the release flow. Add `!v*-alpha.*` to
# your per-app distribute-release.yml tag filter (mirrors the existing
# `!v*-beta.*`), or the `v<base>-alpha.<N>` tag push triggers a real release.
#
# Per-app shell example:
#
#   on:
#     workflow_dispatch:
#   jobs:
#     alpha:
#       uses: LeanBytes/workflows-macos/.github/workflows/distribute-alpha.yml@v0.3.50
#       secrets:
#         # … Direct subset only (no Sparkle key, no App Store secrets)
# ─────────────────────────────────────────────────────────────────────────────
name: distribute-alpha

on:
  workflow_call:
    inputs:
      version-base:
        description: "Base version for the alpha (e.g. '3.0.0'). Empty = read from the branch's Changelog.json versions[0].version."
        type: string
        default: ""
      changelog-path:
        description: "Path to Changelog.json in the caller repo (read-only — only used to derive the base version when version-base is empty)."
        type: string
        default: "Config/Changelog.json"

      # ── Per-app build flags (same meaning as the other orchestrators) ──────
      use-tuist:
        type: boolean
        default: false
      lfs:
        description: "Pull the caller repo's git LFS files on checkout (e.g. an LFS-tracked model). Off by default."
        type: boolean
        default: false
      pre-build-cache-path:
        type: string
        default: ""
      pre-build-cache-key:
        type: string
        default: ""
      pre-build-script:
        type: string
        default: ""
      has-finder-extension:
        type: boolean
        default: false
      has-quicklook-extension:
        type: boolean
        default: false
      configuration-direct:
        description: "Xcode build configuration for the Direct archive. Default 'Release'."
        type: string
        default: "Release"
      extra-xcodebuild-args:
        type: string
        default: ""
      runs-on-build:
        type: string
        default: '"macos-26"'
      runs-on-publish:
        description: "Publish job runner. Ubuntu is fine (only AWS CLI + git tag push), but defaults to macOS for parity."
        type: string
        default: '"macos-26"'

    # Declared so cross-org / cross-account callers (where `secrets: inherit`
    # silently passes nothing) can pass secrets explicitly. Direct subset only —
    # no Sparkle key, no App Store certs/profiles.
    secrets:
      DEVELOPER_ID_P12_BASE64:        { required: false }
      DEVELOPER_ID_PASSWORD:          { required: false }
      KEYCHAIN_PASSWORD:              { required: false }
      PROV_PROF_DEVID_BASE64:         { required: false }
      PROV_PROF_DEVID_FINDER_BASE64:  { required: false }
      PROV_PROF_DEVID_QL_BASE64:      { required: false }
      ASC_KEY_ID:                     { required: false }
      ASC_ISSUER_ID:                  { required: false }
      ASC_KEY_BASE64:                 { required: false }
      AWS_ACCESS_KEY_ID:              { required: false }
      AWS_SECRET_ACCESS_KEY:          { required: false }
      SHARED_WORKFLOWS_TOKEN:         { required: false }

permissions:
  contents: write          # to push the v<base>-alpha.<N> tag

# Serialize alpha runs across the repository so two manual dispatches can't race
# on the alpha counter (both reading "1 existing v3.0.0-alpha.* tag" then both
# trying to push v3.0.0-alpha.2).
concurrency:
  group: distribute-alpha-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      marketing: ${{ steps.compute.outputs.marketing }}
      build-number: ${{ steps.compute.outputs.build-number }}
      artifact-label: ${{ steps.compute.outputs.artifact-label }}
      alpha-tag: ${{ steps.compute.outputs.alpha-tag }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need full tag history for the alpha counter + safeguard

      - name: Compute alpha version
        id: compute
        shell: bash
        env:
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
          VERSION_BASE: ${{ inputs.version-base }}
        run: |
          set -euo pipefail

          BASE="$VERSION_BASE"
          if [ -z "$BASE" ]; then
            BASE=$(python3 -c "
          import json, sys
          data = json.load(open('$CHANGELOG_PATH'))
          versions = data.get('versions') or []
          if not versions or 'version' not in versions[0]:
              print('::error::$CHANGELOG_PATH has no versions[0].version (and no version-base input given)', file=sys.stderr)
              sys.exit(1)
          print(versions[0]['version'])
          ")
          fi

          # Safeguard (parity with the beta flow): an alpha is a pre-release of an
          # UNreleased version. If v<base> already shipped, refuse — the operator
          # almost certainly meant to bump the base first.
          if git rev-parse "refs/tags/v${BASE}" >/dev/null 2>&1; then
            echo "::error::v${BASE} is already released — alphas are for an unreleased version. Pass a higher version-base or bump Changelog.json versions[0]."
            exit 1
          fi

          ALPHA_COUNT=$(git tag --list "v${BASE}-alpha.*" | wc -l | tr -d ' ')
          NEXT_ALPHA=$((ALPHA_COUNT + 1))

          BUILD_NUMBER=$(date -u +%y%m%d%H%M%S)
          MARKETING="${BASE}-alpha.${NEXT_ALPHA}"     # e.g. 3.0.0-alpha.1
          ALPHA_TAG="v${MARKETING}"                   # e.g. v3.0.0-alpha.1
          ARTIFACT_LABEL="${MARKETING}"               # clean filename label (no leading 'v')

          echo "marketing=${MARKETING}"           >> "$GITHUB_OUTPUT"
          echo "build-number=${BUILD_NUMBER}"     >> "$GITHUB_OUTPUT"
          echo "artifact-label=${ARTIFACT_LABEL}" >> "$GITHUB_OUTPUT"
          echo "alpha-tag=${ALPHA_TAG}"           >> "$GITHUB_OUTPUT"

          echo "Alpha build prepared:"
          echo "  Base version:     ${BASE}"
          echo "  Marketing:        ${MARKETING}"
          echo "  Build number:     ${BUILD_NUMBER}"
          echo "  Alpha tag:        ${ALPHA_TAG}"

  build-direct:
    needs: prepare
    if: needs.prepare.result == 'success'
    uses: LeanBytes/workflows-macos/.github/workflows/_build-direct.yml@v0.3.50
    with:
      version: ${{ needs.prepare.outputs.marketing }}        # e.g. "3.0.0-alpha.1"
      build-number: ${{ needs.prepare.outputs.build-number }}
      artifact-label: ${{ needs.prepare.outputs.artifact-label }}
      use-tuist: ${{ inputs.use-tuist }}
      pre-build-cache-path: ${{ inputs.pre-build-cache-path }}
      pre-build-cache-key: ${{ inputs.pre-build-cache-key }}
      pre-build-script: ${{ inputs.pre-build-script }}
      has-finder-extension: ${{ inputs.has-finder-extension }}
      has-quicklook-extension: ${{ inputs.has-quicklook-extension }}
      runs-on: ${{ inputs.runs-on-build }}
      extra-xcodebuild-args: ${{ inputs.extra-xcodebuild-args }}
      configuration: ${{ inputs.configuration-direct }}
      lfs: ${{ inputs.lfs }}
    # Explicit secret passing (not `inherit`) — see comment on workflow_call.secrets above.
    secrets:
      DEVELOPER_ID_P12_BASE64:        ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_PASSWORD:          ${{ secrets.DEVELOPER_ID_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_DEVID_BASE64:         ${{ secrets.PROV_PROF_DEVID_BASE64 }}
      PROV_PROF_DEVID_FINDER_BASE64:  ${{ secrets.PROV_PROF_DEVID_FINDER_BASE64 }}
      PROV_PROF_DEVID_QL_BASE64:      ${{ secrets.PROV_PROF_DEVID_QL_BASE64 }}
      ASC_KEY_ID:                     ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID:                  ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_BASE64:                 ${{ secrets.ASC_KEY_BASE64 }}
      SHARED_WORKFLOWS_TOKEN:         ${{ secrets.SHARED_WORKFLOWS_TOKEN }}

  publish-alpha:
    needs: [prepare, build-direct]
    if: needs.build-direct.result == 'success'
    runs-on: ${{ fromJSON(inputs.runs-on-publish) }}
    timeout-minutes: 20
    env:
      MARKETING: ${{ needs.prepare.outputs.marketing }}
      BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}
      ARTIFACT_LABEL: ${{ needs.prepare.outputs.artifact-label }}
      ALPHA_TAG: ${{ needs.prepare.outputs.alpha-tag }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need the branch ref to push the tag

      - name: Download direct-build artifact
        uses: actions/download-artifact@v8
        with:
          name: direct-build
          path: ./artifacts/direct

      - name: Install AWS CLI
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws &>/dev/null; then
            curl "https://awscli.amazonaws.com/AWSCLIV2.pkg" -o /tmp/AWSCLIV2.pkg
            sudo installer -pkg /tmp/AWSCLIV2.pkg -target /
            rm -f /tmp/AWSCLIV2.pkg
          fi
          aws --version

      # Upload to an UNLISTED `alpha/<version>/` prefix. Nothing references this
      # path (no appcast, no Releases page) — it's hand-out-the-URL distribution.
      - name: Upload DMG + ZIP to S3 (unlisted alpha prefix)
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
        run: |
          set -euo pipefail
          DEST="${S3_DISTRIBUTION_PATH}/alpha/${MARKETING}"
          for f in ./artifacts/direct/*.dmg ./artifacts/direct/*.zip; do
            [ -e "$f" ] || continue
            BASENAME=$(basename "$f")
            aws s3 cp "$f" "${DEST}/${BASENAME}"
            echo "Uploaded ${BASENAME} → ${DEST}/"
          done

      # The tag is the durable record that this alpha was cut and doubles as the
      # counter source for the next run. It does NOT create a GitHub Release.
      # (Your distribute-release.yml MUST exclude `v*-alpha.*` or this fires it.)
      - name: Push alpha tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$ALPHA_TAG" -m "Alpha ${ALPHA_TAG#v}"
          git push origin "$ALPHA_TAG"
          echo "Pushed tag $ALPHA_TAG"

      # ── Workflow run summary — the handable download link ──────────────────
      - name: Write alpha build summary
        shell: bash
        env:
          PRODUCT_NAME: ${{ vars.PRODUCT_NAME }}
          S3_DOWNLOAD_URL: ${{ vars.S3_DOWNLOAD_URL }}
        run: |
          {
            echo "## Alpha build ready 🧪"
            echo
            echo "Private invite build — **not** published to the appcast, the changelog, or GitHub Releases."
            echo
            echo "**Version:** \`${MARKETING}\` · **Build:** \`${BUILD_NUMBER}\` · **Tag:** \`${ALPHA_TAG}\` · **Commit:** \`${GITHUB_SHA}\`"
            echo
            echo "Hand this link to invited testers (notarized — opens without Gatekeeper warnings):"
            echo
            echo "| Artifact | Download |"
            echo "|---|---|"
            echo "| DMG | [${PRODUCT_NAME}_${ARTIFACT_LABEL}.dmg](${S3_DOWNLOAD_URL}/alpha/${MARKETING}/${PRODUCT_NAME}_${ARTIFACT_LABEL}.dmg) |"
            echo "| ZIP | [${PRODUCT_NAME}_${ARTIFACT_LABEL}.zip](${S3_DOWNLOAD_URL}/alpha/${MARKETING}/${PRODUCT_NAME}_${ARTIFACT_LABEL}.zip) |"
          } >> "$GITHUB_STEP_SUMMARY"
