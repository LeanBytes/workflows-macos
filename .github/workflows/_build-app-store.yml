# ── Internal Build Callee — App Store Distribution ───────────────────────────
# Produces a signed .pkg for App Store / TestFlight upload, published as a
# GitHub Actions workflow artifact named "app-store-build". An orchestrator
# (distribute-beta/release.yml) downloads the artifact and pushes it via
# xcrun altool.
#
# No notarization step — App Store has its own review pipeline.
# No DMG/ZIP packaging — App Store wants the .pkg directly.
#
# Underscore prefix marks this as an internal callee — per-app shells should
# call distribute-beta.yml / distribute-release.yml, not this file directly.
#
# Required caller secrets:
#   APPLE_DISTR_P12_BASE64  — Apple Distribution cert + private key (signs the .app)
#   APPLE_DISTR_PASSWORD    — password for the Apple Distribution p12
#   MAC_DISTR_P12_BASE64    — Mac Installer Distribution cert + private key (signs the .pkg)
#   MAC_DISTR_PASSWORD      — password for the Mac Installer Distribution p12
#   KEYCHAIN_PASSWORD       — ephemeral build keychain password
#   PROV_PROF_STORE_BASE64  — main App Store provisioning profile
#
# Required caller vars:
#   SCHEME_NAME_STORE, BUNDLE_ID, PRODUCT_NAME
#
# Optional (gated by inputs):
#   has-finder-extension     → PROV_PROF_STORE_FINDER_BASE64, vars.BUNDLE_ID_FINDER
#   has-quicklook-extension  → PROV_PROF_STORE_QL_BASE64,     vars.BUNDLE_ID_QUICKLOOK
# ─────────────────────────────────────────────────────────────────────────────
name: _build-app-store

on:
  workflow_call:
    inputs:
      # ── Required ───────────────────────────────────────────────────────────
      version:
        description: "Marketing version (CFBundleShortVersionString)"
        required: true
        type: string
      build-number:
        description: "Build number (CFBundleVersion), timestamp-based"
        required: true
        type: string
      artifact-label:
        description: "Label for artifact filenames"
        required: true
        type: string

      # ── Runner ─────────────────────────────────────────────────────────────
      runs-on:
        description: "JSON-encoded runner label or array"
        type: string
        default: '"macos-26"'

      # ── Project type ───────────────────────────────────────────────────────
      use-tuist:
        description: "Project is generated by Tuist (runs tuist install + generate before build)"
        type: boolean
        default: false

      # ── Extensions ─────────────────────────────────────────────────────────
      has-finder-extension:
        description: "App has a Finder Sync extension. Expects PROV_PROF_STORE_FINDER_BASE64 secret + vars.BUNDLE_ID_FINDER."
        type: boolean
        default: false
      has-quicklook-extension:
        description: "App has a Quick Look extension. Expects PROV_PROF_STORE_QL_BASE64 secret + vars.BUNDLE_ID_QUICKLOOK."
        type: boolean
        default: false

      # ── Escape hatch ───────────────────────────────────────────────────────
      extra-xcodebuild-args:
        description: "Additional xcodebuild settings appended to archive command"
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      # ── Tuist (opt-in) ─────────────────────────────────────────────────────
      - name: Install Tuist
        if: inputs.use-tuist
        shell: bash
        run: |
          brew tap tuist/tuist
          brew install --formula tuist

      - name: Fetch Swift package dependencies (Tuist)
        if: inputs.use-tuist
        shell: bash
        run: tuist install

      - name: Generate Xcode project (Tuist)
        if: inputs.use-tuist
        shell: bash
        run: tuist generate --no-open

      # ── SwiftPM (when not Tuist) ───────────────────────────────────────────
      - name: Resolve Swift package dependencies
        if: ${{ !inputs.use-tuist }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -scheme "${{ vars.SCHEME_NAME_STORE }}" \
            -configuration Release

      # ── Diagnostic: verify .p12 envelope before security import ────────────
      # `security import` only says "MAC verification failed (wrong password?)"
      # which conflates: bad base64, wrong password, incompatible crypto.
      # We run openssl to get a clearer signal — but DON'T trust its exit code:
      # OpenSSL 3.x exits non-zero on legacy cert PBE algorithms (e.g. RC2)
      # even when the MAC verified fine, because the default provider can't
      # enumerate the safebags. Instead we look for explicit "Mac verify error"
      # in the output, which is the only reliable wrong-password signal.
      - name: Verify .p12 envelope (diagnostic)
        shell: bash
        env:
          APPLE_DISTR_P12_BASE64: ${{ secrets.APPLE_DISTR_P12_BASE64 }}
          APPLE_DISTR_PASSWORD: ${{ secrets.APPLE_DISTR_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$APPLE_DISTR_P12_BASE64" | base64 --decode > /tmp/certificate-check.p12

          SIZE=$(wc -c < /tmp/certificate-check.p12)
          echo "Decoded .p12 size: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "::error::.p12 is suspiciously small ($SIZE bytes) — likely a base64 encoding issue with APPLE_DISTR_P12_BASE64"
            exit 1
          fi

          # Don't fail on non-zero exit; we evaluate the output instead.
          # -nokeys: never print private keys (essential).
          # -nocerts: also suppress cert PEM blocks. Certs are public so this
          # is paranoid but trims the log to envelope metadata only.
          openssl pkcs12 -in /tmp/certificate-check.p12 -info -nokeys -nocerts \
            -passin "pass:$APPLE_DISTR_PASSWORD" > /tmp/p12-info.txt 2>&1 || true

          echo "── openssl output ──────────────────────────────────────────"
          cat /tmp/p12-info.txt
          echo "────────────────────────────────────────────────────────────"

          if grep -qE "Mac verify error|invalid password" /tmp/p12-info.txt; then
            echo "::error::Password mismatch — APPLE_DISTR_PASSWORD does not match the .p12"
            rm -f /tmp/certificate-check.p12 /tmp/p12-info.txt
            exit 1
          fi

          echo "Envelope check passed — no MAC verification error. (security import will validate the rest.)"
          rm -f /tmp/certificate-check.p12 /tmp/p12-info.txt

      # ── Keychain ───────────────────────────────────────────────────────────
      # Mac App Store distribution needs TWO certs in the keychain:
      #   - Apple Distribution            → signs the .app    (codesign)
      #   - Mac Installer Distribution    → signs the .pkg    (productbuild)
      # Both must be present or `xcodebuild -exportArchive` fails with
      # "No signing certificate 'Mac Installer Distribution' found".
      - name: Set up keychain
        shell: bash
        env:
          APPLE_DISTR_P12_BASE64: ${{ secrets.APPLE_DISTR_P12_BASE64 }}
          APPLE_DISTR_PASSWORD: ${{ secrets.APPLE_DISTR_PASSWORD }}
          MAC_DISTR_P12_BASE64: ${{ secrets.MAC_DISTR_P12_BASE64 }}
          MAC_DISTR_PASSWORD: ${{ secrets.MAC_DISTR_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          echo "$APPLE_DISTR_P12_BASE64" | base64 --decode > /tmp/apple-distr.p12
          echo "$MAC_DISTR_P12_BASE64"   | base64 --decode > /tmp/mac-distr.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          security import /tmp/apple-distr.p12 \
            -k build.keychain \
            -P "$APPLE_DISTR_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild

          security import /tmp/mac-distr.p12 \
            -k build.keychain \
            -P "$MAC_DISTR_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" \
            build.keychain
          security list-keychains -d user -s build.keychain login.keychain

          rm /tmp/apple-distr.p12 /tmp/mac-distr.p12

      # ── Provisioning profiles ──────────────────────────────────────────────
      - name: Install main provisioning profile
        shell: bash
        env:
          STORE_PROFILE_BASE64: ${{ secrets.PROV_PROF_STORE_BASE64 }}
        run: |
          set -euo pipefail

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          echo "$STORE_PROFILE_BASE64" | base64 --decode \
            > "$PROFILE_DIR/pp-store.provisionprofile"

          PROFILE_NAME=$(security cms -D \
            -i "$PROFILE_DIR/pp-store.provisionprofile" \
            | plutil -extract Name raw -)

          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          echo "Main App Store profile: $PROFILE_NAME"

      - name: Install Finder extension provisioning profile
        if: inputs.has-finder-extension
        shell: bash
        env:
          STORE_PROFILE_FINDER_BASE64: ${{ secrets.PROV_PROF_STORE_FINDER_BASE64 }}
        run: |
          set -euo pipefail

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          echo "$STORE_PROFILE_FINDER_BASE64" | base64 --decode \
            > "$PROFILE_DIR/pp-store-finder.provisionprofile"

          PROFILE_NAME_FINDER=$(security cms -D \
            -i "$PROFILE_DIR/pp-store-finder.provisionprofile" \
            | plutil -extract Name raw -)

          echo "PROFILE_NAME_FINDER=$PROFILE_NAME_FINDER" >> $GITHUB_ENV
          echo "Finder Extension App Store profile: $PROFILE_NAME_FINDER"

      - name: Install Quick Look extension provisioning profile
        if: inputs.has-quicklook-extension
        shell: bash
        env:
          STORE_PROFILE_QL_BASE64: ${{ secrets.PROV_PROF_STORE_QL_BASE64 }}
        run: |
          set -euo pipefail

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          echo "$STORE_PROFILE_QL_BASE64" | base64 --decode \
            > "$PROFILE_DIR/pp-store-quicklook.provisionprofile"

          PROFILE_NAME_QUICKLOOK=$(security cms -D \
            -i "$PROFILE_DIR/pp-store-quicklook.provisionprofile" \
            | plutil -extract Name raw -)

          echo "PROFILE_NAME_QUICKLOOK=$PROFILE_NAME_QUICKLOOK" >> $GITHUB_ENV
          echo "Quick Look Extension App Store profile: $PROFILE_NAME_QUICKLOOK"

      # ── Verify signing identity (debug) ────────────────────────────────────
      - name: Verify signing identity
        shell: bash
        run: security find-identity -v -p codesigning build.keychain

      # ── Archive ────────────────────────────────────────────────────────────
      - name: Archive
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          # App Store Connect requires CFBundleShortVersionString to be 1-3
          # dotted integers (e.g. "2.10.0"). Strip any git-describe suffix
          # like "-34-g9e090ee" that beta builds carry. Build-number remains
          # the per-build differentiator (CFBundleVersion).
          MARKETING_VERSION="${INPUT_VERSION%%-*}"
          echo "Marketing version (stripped for ASC): ${MARKETING_VERSION}"
          echo "Build number:                          ${{ inputs.build-number }}"

          xcodebuild archive \
            -scheme "${{ vars.SCHEME_NAME_STORE }}" \
            -configuration Release \
            -archivePath /tmp/build/app.xcarchive \
            -destination "generic/platform=macOS" \
            MARKETING_VERSION=${MARKETING_VERSION} \
            CURRENT_PROJECT_VERSION=${{ inputs.build-number }} \
            ${{ inputs.extra-xcodebuild-args }}

      # ── Export ─────────────────────────────────────────────────────────────
      - name: Export for App Store distribution
        shell: bash
        env:
          BUNDLE_ID: ${{ vars.BUNDLE_ID }}
          BUNDLE_ID_FINDER: ${{ vars.BUNDLE_ID_FINDER }}
          BUNDLE_ID_QUICKLOOK: ${{ vars.BUNDLE_ID_QUICKLOOK }}
          HAS_FINDER: ${{ inputs.has-finder-extension }}
          HAS_QUICKLOOK: ${{ inputs.has-quicklook-extension }}
        run: |
          set -euo pipefail

          PROFILES_XML="<key>${BUNDLE_ID}</key><string>${PROFILE_NAME}</string>"

          if [ "$HAS_FINDER" = "true" ]; then
            PROFILES_XML="${PROFILES_XML}<key>${BUNDLE_ID_FINDER}</key><string>${PROFILE_NAME_FINDER}</string>"
          fi

          if [ "$HAS_QUICKLOOK" = "true" ]; then
            PROFILES_XML="${PROFILES_XML}<key>${BUNDLE_ID_QUICKLOOK}</key><string>${PROFILE_NAME_QUICKLOOK}</string>"
          fi

          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>installerSigningCertificate</key>
            <string>3rd Party Mac Developer Installer</string>
            <key>provisioningProfiles</key>
            <dict>
              ${PROFILES_XML}
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath /tmp/build/app.xcarchive \
            -exportPath /tmp/build/export \
            -exportOptionsPlist /tmp/ExportOptions.plist

          ls -lh /tmp/build/export/

      # ── Diagnostic on export failure ───────────────────────────────────────
      # xcodebuild writes detailed logs to a temp .xcdistributionlogs directory.
      # Print key info inline (keychain identities + log contents) and stage
      # the directory for upload in the next step. Only runs on failure so it
      # doesn't pollute successful runs.
      - name: Diagnose export failure
        if: failure()
        shell: bash
        run: |
          echo "── Keychain identities (codesigning policy) ───────────────"
          security find-identity -v -p codesigning build.keychain || true
          echo ""
          echo "── Keychain identities (basic policy — installer certs) ──"
          security find-identity -v -p basic build.keychain || true
          echo ""
          echo "── ALL keychain identities (no policy filter) ────────────"
          security find-identity -v build.keychain || true
          echo ""
          echo "── xcdistributionlogs ────────────────────────────────────"
          # find through /var/folders triggers permission warnings → noisy
          # exits under pipefail. Search $TMPDIR first (where xcodebuild
          # actually writes), fall back to /var/folders with || true so a
          # failed find doesn't kill the diagnostic.
          LOG_DIR=""
          if [ -n "${TMPDIR:-}" ]; then
            LOG_DIR=$(find "$TMPDIR" -maxdepth 2 -name "*.xcdistributionlogs" -type d 2>/dev/null | head -1 || true)
          fi
          if [ -z "$LOG_DIR" ]; then
            LOG_DIR=$(find /var/folders -maxdepth 6 -name "*.xcdistributionlogs" -type d 2>/dev/null | head -1 || true)
          fi
          if [ -z "$LOG_DIR" ]; then
            echo "No xcdistributionlogs directory found"
            exit 0
          fi
          echo "Found: $LOG_DIR"
          echo ""
          ls -la "$LOG_DIR"
          for f in "$LOG_DIR"/*; do
            [ -f "$f" ] || continue
            echo ""
            echo "── $(basename "$f") ──────────────────────────────────"
            cat "$f"
          done
          # Stage for the upload step (paths in /var/folders aren't artifact-friendly)
          mkdir -p /tmp/diag-logs
          cp -R "$LOG_DIR" /tmp/diag-logs/

      - name: Upload xcdistributionlogs as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcdistributionlogs-app-store
          path: /tmp/diag-logs/
          if-no-files-found: warn
          retention-days: 7

      # ── Publish as workflow artifact ───────────────────────────────────────
      - name: Upload .pkg as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-store-build
          path: /tmp/build/export/*.pkg
          if-no-files-found: error
          retention-days: 7

      # ── Cleanup ────────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          security delete-keychain build.keychain || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/pp-store.provisionprofile"
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/pp-store-finder.provisionprofile"
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/pp-store-quicklook.provisionprofile"
          rm -rf /tmp/build /tmp/diag-logs
          rm -f /tmp/ExportOptions.plist
          security list-keychains -d user -s login.keychain
