# ── Release Distribution Orchestrator ────────────────────────────────────────
# Called from a per-app shell triggered on tag push (vX.Y or vX.Y.Z, with
# v*-beta.* excluded). The pushed tag's version must match versions[0].version
# in Config/Changelog.json — validated in the prepare job; mismatch fails fast
# before any build work.
#
# Strict fail-safe publish order — the GH Release object is created LAST, so a
# failed build never leaves a dangling release on the tag:
#
#   1. Read release notes from Config/Changelog.json
#   2. altool → ASC                  (if distribute-app-store)         ← GATE 1
#   3. S3 upload of DMG/ZIP          (if build-direct; silent)
#   4. S3 upload of Changelog.json   (if build-direct; the website reads it for the latest version)
#   5. Stable appcast update + upload (if distribute-stable-appcast)   ← MAKES STABLE VISIBLE
#   6. gh release create                                                ← visible
#   7. gh release upload (DMG + ZIP)  attach assets to the release object
#
# Toggles:
#   build-direct                build the .app/DMG/ZIP   (default true)
#   build-app-store             build the .pkg            (default false)
#   distribute-app-store        altool → ASC              (default false; needs build-app-store)
#   distribute-stable-appcast   Sparkle stable channel    (default true; needs build-direct)
#
# Optional inputs of note (see the inputs block for the full list):
#   configuration-direct        Xcode config for the Direct archive    (default "Release")
#   configuration-app-store     Xcode config for the App Store archive (default "Release")
#   discussion-category         GH Discussions category for auto-created discussion (default: skip)
#
# Per-app shell example (drop into your repo at .github/workflows/distribute-release.yml):
#
#   on:
#     push:
#       tags:
#         - 'v*'
#         - '!v*-beta.*'
#   jobs:
#     release:
#       uses: LeanBytes/workflows-macos/.github/workflows/distribute-release.yml@v0.3.44
#       with:
#         build-app-store: true         # macpacker, filefillet
#         distribute-app-store: true    # macpacker, filefillet
#       secrets:
#         # Pass each secret explicitly. `secrets: inherit` does not pass
#         # secrets across org boundaries (e.g. sarensw/macpacker calling
#         # LeanBytes/workflows-macos), so the explicit form is universal.
#         DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
#         # … see examples/per-app/distribute-release.yml for the full list.
# ─────────────────────────────────────────────────────────────────────────────
name: distribute-release

on:
  workflow_call:
    inputs:
      build-direct:
        description: "Build the Direct (.app/DMG/ZIP) artifact"
        type: boolean
        default: true
      build-app-store:
        description: "Build the App Store (.pkg) artifact"
        type: boolean
        default: false
      distribute-app-store:
        description: "Upload .pkg to App Store Connect via altool. Requires build-app-store."
        type: boolean
        default: false
      distribute-stable-appcast:
        description: "Update Sparkle's stable appcast with the Direct build. Requires build-direct."
        type: boolean
        default: true
      use-tuist:
        type: boolean
        default: false
      pre-build-cache-path:
        type: string
        default: ""
      pre-build-cache-key:
        type: string
        default: ""
      pre-build-script:
        type: string
        default: ""
      has-finder-extension:
        type: boolean
        default: false
      has-quicklook-extension:
        type: boolean
        default: false
      extra-xcodebuild-args:
        type: string
        default: ""
      runs-on-build:
        type: string
        default: '"macos-26"'
      runs-on-publish:
        type: string
        default: '"macos-26"'
      appcast-filename:
        type: string
        default: "appcast.xml"
      appcast-seed-path:
        type: string
        default: "Config/appcast.xml"
      changelog-path:
        description: "Path to Changelog.json in the caller repo (source for appcast description + GH Release body)"
        type: string
        default: "Config/Changelog.json"
      configuration-direct:
        description: "Xcode build configuration for the Direct archive. Default 'Release'."
        type: string
        default: "Release"
      configuration-app-store:
        description: "Xcode build configuration for the App Store archive. Default 'Release'; set to e.g. 'Release Store' if your project uses a separate config for App Store builds."
        type: string
        default: "Release"
      create-discussion:
        description: |
          Whether to auto-create a GitHub Discussion alongside the release.
          OFF by default to keep the release flow simple — the discussion
          creation path through `gh release create --discussion-category`
          is fragile (depends on repo Discussions being enabled, an exact
          category-name match, and `discussions: write` token scope) and a
          failure here will abort the entire release. Turn it on only after
          you've validated the setup in a sandbox repo.
        type: boolean
        default: false
      discussion-category:
        description: |
          GitHub Discussions category name to use when `create-discussion`
          is true. Defaults to "Announcements" (GitHub's default category).
          Ignored when `create-discussion` is false.
        type: string
        default: "Announcements"
    # Declared so cross-org / cross-account callers (where `secrets: inherit`
    # silently passes nothing) can pass secrets explicitly. Same-org callers
    # can keep using `secrets: inherit` — the declarations are no-ops for them.
    secrets:
      DEVELOPER_ID_P12_BASE64:        { required: false }
      DEVELOPER_ID_PASSWORD:          { required: false }
      KEYCHAIN_PASSWORD:              { required: false }
      PROV_PROF_DEVID_BASE64:         { required: false }
      PROV_PROF_DEVID_FINDER_BASE64:  { required: false }
      PROV_PROF_DEVID_QL_BASE64:      { required: false }
      APPLE_DISTR_P12_BASE64:         { required: false }
      APPLE_DISTR_PASSWORD:           { required: false }
      MAC_DISTR_P12_BASE64:           { required: false }
      MAC_DISTR_PASSWORD:             { required: false }
      PROV_PROF_STORE_BASE64:         { required: false }
      PROV_PROF_STORE_FINDER_BASE64:  { required: false }
      PROV_PROF_STORE_QL_BASE64:      { required: false }
      ASC_KEY_ID:                     { required: false }
      ASC_ISSUER_ID:                  { required: false }
      ASC_KEY_BASE64:                 { required: false }
      AWS_ACCESS_KEY_ID:              { required: false }
      AWS_SECRET_ACCESS_KEY:          { required: false }
      SPARKLE_ED_PRIVATE_KEY:         { required: false }
      SHARED_WORKFLOWS_TOKEN:         { required: false }

permissions:
  contents: write          # to create GH Release + push tag + upload assets

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.compute.outputs.version }}
      build-number: ${{ steps.compute.outputs.build-number }}
      artifact-label: ${{ steps.compute.outputs.artifact-label }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute + validate release version
        id: compute
        shell: bash
        env:
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"
          # Accept 2-part (vX.Y) or 3-part (vX.Y.Z) semver. Apple's
          # CFBundleShortVersionString spec allows either.
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Tag '$TAG' is not a bare semver release tag (expected vX.Y or vX.Y.Z)."
            exit 1
          fi
          TAG_VERSION="${TAG#v}"

          JSON_VERSION=$(python3 -c "
          import json, sys
          data = json.load(open('$CHANGELOG_PATH'))
          versions = data.get('versions') or []
          if not versions or 'version' not in versions[0]:
              print('::error::$CHANGELOG_PATH has no versions[0].version', file=sys.stderr)
              sys.exit(1)
          print(versions[0]['version'])
          ")

          if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
            echo "::error::Tag '$TAG' (=$TAG_VERSION) does not match Config/Changelog.json versions[0].version (=$JSON_VERSION). Update Changelog.json to put $TAG_VERSION at versions[0] before tagging — or delete and re-tag once Changelog.json is correct."
            exit 1
          fi

          BUILD_NUMBER=$(date -u +%y%m%d%H%M%S)
          ARTIFACT_LABEL="v${TAG_VERSION}"

          echo "version=${TAG_VERSION}"         >> "$GITHUB_OUTPUT"
          echo "build-number=${BUILD_NUMBER}"   >> "$GITHUB_OUTPUT"
          echo "artifact-label=${ARTIFACT_LABEL}" >> "$GITHUB_OUTPUT"

          echo "Release build prepared:"
          echo "  Marketing version: ${TAG_VERSION}"
          echo "  Build number:      ${BUILD_NUMBER}"
          echo "  Artifact label:    ${ARTIFACT_LABEL}"

  build-direct:
    if: inputs.build-direct
    needs: prepare
    uses: LeanBytes/workflows-macos/.github/workflows/_build-direct.yml@v0.3.44
    with:
      version: ${{ needs.prepare.outputs.version }}
      build-number: ${{ needs.prepare.outputs.build-number }}
      artifact-label: ${{ needs.prepare.outputs.artifact-label }}
      use-tuist: ${{ inputs.use-tuist }}
      pre-build-cache-path: ${{ inputs.pre-build-cache-path }}
      pre-build-cache-key: ${{ inputs.pre-build-cache-key }}
      pre-build-script: ${{ inputs.pre-build-script }}
      has-finder-extension: ${{ inputs.has-finder-extension }}
      has-quicklook-extension: ${{ inputs.has-quicklook-extension }}
      runs-on: ${{ inputs.runs-on-build }}
      extra-xcodebuild-args: ${{ inputs.extra-xcodebuild-args }}
      configuration: ${{ inputs.configuration-direct }}
    # Explicit secret passing (not `inherit`) — see comment on workflow_call.secrets above.
    secrets:
      DEVELOPER_ID_P12_BASE64:        ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_PASSWORD:          ${{ secrets.DEVELOPER_ID_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_DEVID_BASE64:         ${{ secrets.PROV_PROF_DEVID_BASE64 }}
      PROV_PROF_DEVID_FINDER_BASE64:  ${{ secrets.PROV_PROF_DEVID_FINDER_BASE64 }}
      PROV_PROF_DEVID_QL_BASE64:      ${{ secrets.PROV_PROF_DEVID_QL_BASE64 }}
      ASC_KEY_ID:                     ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID:                  ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_BASE64:                 ${{ secrets.ASC_KEY_BASE64 }}
      SHARED_WORKFLOWS_TOKEN:         ${{ secrets.SHARED_WORKFLOWS_TOKEN }}

  build-app-store:
    if: inputs.build-app-store
    needs: prepare
    uses: LeanBytes/workflows-macos/.github/workflows/_build-app-store.yml@v0.3.44
    with:
      version: ${{ needs.prepare.outputs.version }}
      build-number: ${{ needs.prepare.outputs.build-number }}
      artifact-label: ${{ needs.prepare.outputs.artifact-label }}
      use-tuist: ${{ inputs.use-tuist }}
      has-finder-extension: ${{ inputs.has-finder-extension }}
      has-quicklook-extension: ${{ inputs.has-quicklook-extension }}
      runs-on: ${{ inputs.runs-on-build }}
      extra-xcodebuild-args: ${{ inputs.extra-xcodebuild-args }}
      configuration: ${{ inputs.configuration-app-store }}
    # Explicit secret passing (not `inherit`) — see comment on workflow_call.secrets above.
    secrets:
      APPLE_DISTR_P12_BASE64:         ${{ secrets.APPLE_DISTR_P12_BASE64 }}
      APPLE_DISTR_PASSWORD:           ${{ secrets.APPLE_DISTR_PASSWORD }}
      MAC_DISTR_P12_BASE64:           ${{ secrets.MAC_DISTR_P12_BASE64 }}
      MAC_DISTR_PASSWORD:             ${{ secrets.MAC_DISTR_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_STORE_BASE64:         ${{ secrets.PROV_PROF_STORE_BASE64 }}
      PROV_PROF_STORE_FINDER_BASE64:  ${{ secrets.PROV_PROF_STORE_FINDER_BASE64 }}
      PROV_PROF_STORE_QL_BASE64:      ${{ secrets.PROV_PROF_STORE_QL_BASE64 }}

  publish-release:
    needs: [prepare, build-direct, build-app-store]
    # Tolerate skipped builds; require at least one to have succeeded.
    if: |
      always() &&
      needs.build-direct.result != 'failure' &&
      needs.build-app-store.result != 'failure' &&
      (needs.build-direct.result == 'success' || needs.build-app-store.result == 'success')
    runs-on: ${{ fromJSON(inputs.runs-on-publish) }}
    timeout-minutes: 30
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}
      ARTIFACT_LABEL: ${{ needs.prepare.outputs.artifact-label }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout shared scripts
        uses: actions/checkout@v6
        with:
          repository: LeanBytes/workflows-macos
          ref: ${{ github.job_workflow_sha }}
          path: .shared-ci
          token: ${{ secrets.SHARED_WORKFLOWS_TOKEN || github.token }}

      - name: Download direct-build artifact
        if: inputs.build-direct
        uses: actions/download-artifact@v8
        with:
          name: direct-build
          path: ./artifacts/direct

      - name: Download app-store-build artifact
        if: inputs.build-app-store
        uses: actions/download-artifact@v8
        with:
          name: app-store-build
          path: ./artifacts/app-store

      # ── Read release notes from Changelog.json ────────────────────────────
      # Curated, customer-facing notes from the caller's Changelog.json (same
      # file the app reads for its What's New view). Feeds both the appcast
      # description and the GH Release body downstream.
      - name: Read release notes from Changelog.json
        shell: bash
        env:
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
          MARKETING_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          CHANGELOG_PATH="$CHANGELOG_PATH" VERSION="$MARKETING_VERSION" \
            .shared-ci/.github/scripts/changelog-from-json.sh > /tmp/notes.md
          echo "Notes written ($(wc -c < /tmp/notes.md) bytes)"
          cat /tmp/notes.md

      # ── GATE 1: App Store upload ──────────────────────────────────────────
      - name: Install App Store Connect API key (for altool)
        if: inputs.build-app-store && inputs.distribute-app-store
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Upload to App Store Connect
        if: inputs.build-app-store && inputs.distribute-app-store
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -uo pipefail
          PKG=$(ls ./artifacts/app-store/*.pkg | head -1)
          [ -f "$PKG" ] || { echo "::error::No .pkg in app-store artifact"; exit 1; }

          # altool exits 0 even on some upload failures, so decide success on its
          # POSITIVE terminal marker (UPLOAD SUCCEEDED) — NOT on the absence of an
          # "ERROR:" line. App Store Connect can return a transient 5xx that altool
          # logs as "ERROR: … status code 500" and then retries + recovers; that
          # recovered line must not fail the job (it used to — a false failure on a
          # successful upload).
          OUTPUT=$(xcrun altool --upload-app \
            --type macos \
            --file "$PKG" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" 2>&1)
          RC=$?
          echo "$OUTPUT"

          if grep -qE "UPLOAD SUCCEEDED|No errors uploading" <<<"$OUTPUT"; then
            echo "App Store Connect upload accepted: $(basename "$PKG")"
            exit 0
          fi

          # A re-run where the build is already in App Store Connect is not a failure.
          if grep -qiE "already been (used|uploaded)|redundant binary upload|ITMS-90189" <<<"$OUTPUT"; then
            echo "Build already present in App Store Connect — treating as success."
            exit 0
          fi

          echo "::error::altool reported failure on App Store Connect upload (exit ${RC})"
          exit 1

      # ── S3 upload of DMG/ZIP (still silent — appcast hasn't moved) ────────
      - name: Install AWS CLI
        if: inputs.build-direct
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws &>/dev/null; then
            curl "https://awscli.amazonaws.com/AWSCLIV2.pkg" -o /tmp/AWSCLIV2.pkg
            sudo installer -pkg /tmp/AWSCLIV2.pkg -target /
            rm -f /tmp/AWSCLIV2.pkg
          fi
          aws --version

      - name: Upload DMG + ZIP to S3
        if: inputs.build-direct
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
        run: |
          set -euo pipefail
          for f in ./artifacts/direct/*.dmg ./artifacts/direct/*.zip; do
            [ -e "$f" ] || continue
            BASENAME=$(basename "$f")
            aws s3 cp "$f" "${S3_DISTRIBUTION_PATH}/${BASENAME}"
            echo "Uploaded ${BASENAME}"
          done

      # ── Changelog.json → S3 (the website reads this for the latest version) ─
      - name: Upload Changelog.json to S3
        if: inputs.build-direct
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
        run: |
          set -euo pipefail
          # On a release, Changelog.json versions[0] is the version just tagged,
          # so the website can read the latest released version + notes from S3.
          BASENAME=$(basename "$CHANGELOG_PATH")
          aws s3 cp "$CHANGELOG_PATH" "${S3_DISTRIBUTION_PATH}/${BASENAME}" \
            --content-type "application/json"
          echo "Uploaded ${BASENAME}"

      # ── GATE 2: Stable appcast update + upload ────────────────────────────
      - name: Download Sparkle
        if: inputs.build-direct && inputs.distribute-stable-appcast
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SPARKLE_TAG=$(gh api /repos/sparkle-project/Sparkle/releases/latest --jq '.tag_name')
          echo "Sparkle version: ${SPARKLE_TAG}"
          curl -fL -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TAG}/Sparkle-${SPARKLE_TAG}.tar.xz"
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          chmod +x /tmp/sparkle/bin/generate_appcast

      - name: Prepare appcast workdir
        if: inputs.build-direct && inputs.distribute-stable-appcast
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
          APPCAST_FILENAME: ${{ inputs.appcast-filename }}
          APPCAST_SEED_PATH: ${{ inputs.appcast-seed-path }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/appcast-work
          cp ./artifacts/direct/*.zip /tmp/appcast-work/

          if aws s3 cp "${S3_DISTRIBUTION_PATH}/${APPCAST_FILENAME}" "/tmp/appcast-work/${APPCAST_FILENAME}"; then
            echo "Downloaded existing ${APPCAST_FILENAME} from S3"
          else
            echo "No ${APPCAST_FILENAME} on S3, using seed: ${APPCAST_SEED_PATH}"
            cp "${APPCAST_SEED_PATH}" "/tmp/appcast-work/${APPCAST_FILENAME}"
          fi

      - name: Run generate_appcast (stable channel)
        if: inputs.build-direct && inputs.distribute-stable-appcast
        shell: bash
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # No --channel flag → stable channel (default).
          echo "$SPARKLE_ED_PRIVATE_KEY" | /tmp/sparkle/bin/generate_appcast \
            --ed-key-file - \
            /tmp/appcast-work/

      - name: Inject release notes into appcast item
        if: inputs.build-direct && inputs.distribute-stable-appcast
        shell: bash
        env:
          APPCAST_FILENAME: ${{ inputs.appcast-filename }}
        run: |
          set -euo pipefail
          NOTES=""
          if [ -f /tmp/notes.md ]; then
            NOTES=$(cat /tmp/notes.md)
          fi

          # Match by marketing version — stable items have unique versions.
          VERSION="$VERSION" \
          NOTES="$NOTES" \
          APPCAST_PATH="/tmp/appcast-work/${APPCAST_FILENAME}" \
          .shared-ci/.github/scripts/update-appcast.sh

      - name: Upload appcast.xml to S3
        if: inputs.build-direct && inputs.distribute-stable-appcast
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
          APPCAST_FILENAME: ${{ inputs.appcast-filename }}
        run: |
          set -euo pipefail
          aws s3 cp "/tmp/appcast-work/${APPCAST_FILENAME}" \
            "${S3_DISTRIBUTION_PATH}/${APPCAST_FILENAME}" \
            --content-type "application/xml"
          echo "Uploaded ${APPCAST_FILENAME} → S3 (stable channel now live)"

      # ── FINAL: GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CREATE_DISCUSSION: ${{ inputs.create-discussion }}
          DISCUSSION_CATEGORY: ${{ inputs.discussion-category }}
        run: |
          set -euo pipefail

          ARGS=(--repo "${{ github.repository }}" --title "${{ github.ref_name }}")

          if [ -f /tmp/notes.md ]; then
            ARGS+=(--notes-file /tmp/notes.md)
          else
            ARGS+=(--notes "Release ${ARTIFACT_LABEL}")
          fi

          # Discussion creation is opt-in. `gh release create --discussion-category`
          # is a single atomic call: if the category lookup / discussions API errors
          # for any reason, the WHOLE release create fails and the tag has no
          # release object. Keep this off by default; flip on per-consumer once
          # you've validated the Discussions setup works end-to-end.
          if [ "$CREATE_DISCUSSION" = "true" ] && [ -n "$DISCUSSION_CATEGORY" ]; then
            ARGS+=(--discussion-category "$DISCUSSION_CATEGORY")
          fi

          gh release create "${{ github.ref_name }}" "${ARGS[@]}"

      # ── Attach DMG + ZIP to the GH Release ────────────────────────────────
      # Lets anyone browsing the repo's Releases tab download the build
      # directly, in addition to the Sparkle stable channel and S3.
      - name: Attach DMG + ZIP to GH Release
        if: inputs.build-direct && needs.build-direct.result == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --clobber \
            ./artifacts/direct/*.dmg \
            ./artifacts/direct/*.zip

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf /tmp/sparkle /tmp/sparkle.tar.xz /tmp/appcast-work /tmp/notes.md
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8
