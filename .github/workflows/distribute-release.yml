# ── Release Distribution Orchestrator ────────────────────────────────────────
# Called from a per-app shell triggered on a per-product tag push
# `<id>-v<X.Y.Z>` (e.g. `main-v2.13.0`), with beta/alpha variants excluded.
#
# v0.4.0: products are DISCOVERED from Config/products/<id>.json (self-contained
# per-product files, each with an inline changelog) and each product releases
# INDEPENDENTLY. `products.py plan-release` parses the pushed tag → the single
# target product, validates the version against THAT product's changelog, and
# scopes the build + publish to it. Its DMG/ZIP + appcast + extracted
# Changelog.json land under its own s3-subpath; a GitHub Release is created for
# the tag.
#
# Strict fail-safe publish order — the GH Release is created LAST:
#   1. Read notes from the product's inline changelog
#   2. altool → ASC                  (if the product distributes App Store)   ← GATE 1
#   3. S3 upload of DMG/ZIP          (silent)
#   4. S3 upload of the product's Changelog.json (extracted from its file)
#   5. Stable appcast update         (if the product distributes appcast)     ← visible
#   6. gh release create             (for `<id>-v*`)
#   7. gh release upload (DMG + ZIP)
#
# Per-app shell (drop into your repo at .github/workflows/distribute-release.yml):
#
#   on:
#     push:
#       tags:
#         - '*-v*'
#         - '!*-v*-beta.*'
#         - '!*-v*-alpha.*'
#   jobs:
#     release:
#       uses: LeanBytes/workflows-macos/.github/workflows/distribute-release.yml@v0.4.3
#       secrets:
#         DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
#         # … see examples/per-app/distribute-release.yml for the full list.
# ─────────────────────────────────────────────────────────────────────────────
name: distribute-release

on:
  workflow_call:
    inputs:
      products-dir:
        description: "Directory of per-product Config/products/<id>.json files."
        type: string
        default: "Config/products"
      build-direct:
        description: "Default build-direct for product files that omit it."
        type: boolean
        default: true
      build-app-store:
        description: "Default build-app-store for product files that omit it."
        type: boolean
        default: false
      distribute-app-store:
        description: "Default distribute-app-store (altool → ASC) for files that omit it."
        type: boolean
        default: false
      distribute-stable-appcast:
        description: "Default distribute-appcast (Sparkle stable channel) for files that omit it."
        type: boolean
        default: true
      use-tuist:
        type: boolean
        default: false
      pre-build-cache-path:
        type: string
        default: ""
      pre-build-cache-key:
        type: string
        default: ""
      pre-build-script:
        type: string
        default: ""
      has-finder-extension:
        description: "Default has-finder for product files that omit it."
        type: boolean
        default: false
      has-quicklook-extension:
        description: "Default has-quicklook for product files that omit it."
        type: boolean
        default: false
      extra-xcodebuild-args:
        type: string
        default: ""
      runs-on-build:
        type: string
        default: '"macos-26"'
      runs-on-publish:
        type: string
        default: '"macos-26"'
      lfs:
        description: "Pull the caller repo's git LFS files on checkout. Off by default."
        type: boolean
        default: false
      appcast-filename:
        description: "Default appcast XML filename for files that omit it."
        type: string
        default: "appcast.xml"
      appcast-seed-path:
        description: "Default seed appcast.xml path for files that omit it."
        type: string
        default: "Config/appcast.xml"
      configuration-direct:
        description: "Xcode build configuration for the Direct archive. Default 'Release'."
        type: string
        default: "Release"
      configuration-app-store:
        description: "Xcode build configuration for the App Store archive. Default 'Release'."
        type: string
        default: "Release"
      create-discussion:
        description: |
          Auto-create a GitHub Discussion alongside the release. OFF by default —
          `gh release create --discussion-category` is a single atomic call, and
          if the category lookup fails the WHOLE release create fails. Validate in
          a sandbox before enabling.
        type: boolean
        default: false
      discussion-category:
        description: 'Discussions category name when create-discussion is true (default "Announcements").'
        type: string
        default: "Announcements"
    # Declared so cross-org / cross-account callers (where `secrets: inherit`
    # silently passes nothing) can pass secrets explicitly.
    secrets:
      DEVELOPER_ID_P12_BASE64:        { required: false }
      DEVELOPER_ID_PASSWORD:          { required: false }
      KEYCHAIN_PASSWORD:              { required: false }
      PROV_PROF_DEVID_BASE64:         { required: false }
      PROV_PROF_DEVID_FINDER_BASE64:  { required: false }
      PROV_PROF_DEVID_QL_BASE64:      { required: false }
      # Per-product profiles: a product file names the secret via
      # devid-profile-secret / store-profile-secret; unset falls back to the main
      # PROV_PROF_*_BASE64. Add more as needed.
      PROV_PROF_DEVID_PRO_BASE64:     { required: false }
      PROV_PROF_STORE_PRO_BASE64:     { required: false }
      # Per-product Developer ID CERTIFICATE (p12 + password). A product names
      # them via devid-cert-secret / devid-cert-password-secret; unset falls back
      # to DEVELOPER_ID_P12_BASE64 / DEVELOPER_ID_PASSWORD. Use when a product
      # signs under a different team (e.g. an app kept its legacy Developer ID
      # after an account transfer). Add more alternates as needed.
      DEVELOPER_ID_P12_ALT_BASE64:    { required: false }
      DEVELOPER_ID_PASSWORD_ALT:      { required: false }
      APPLE_DISTR_P12_BASE64:         { required: false }
      APPLE_DISTR_PASSWORD:           { required: false }
      MAC_DISTR_P12_BASE64:           { required: false }
      MAC_DISTR_PASSWORD:             { required: false }
      PROV_PROF_STORE_BASE64:         { required: false }
      PROV_PROF_STORE_FINDER_BASE64:  { required: false }
      PROV_PROF_STORE_QL_BASE64:      { required: false }
      ASC_KEY_ID:                     { required: false }
      ASC_ISSUER_ID:                  { required: false }
      ASC_KEY_BASE64:                 { required: false }
      AWS_ACCESS_KEY_ID:              { required: false }
      AWS_SECRET_ACCESS_KEY:          { required: false }
      SPARKLE_ED_PRIVATE_KEY:         { required: false }
      SHARED_WORKFLOWS_TOKEN:         { required: false }

permissions:
  contents: write          # create GH Release + upload assets
  discussions: write       # opt-in create-discussion

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      target-id: ${{ steps.plan.outputs.target-id }}
      version: ${{ steps.plan.outputs.version }}
      build-number: ${{ steps.plan.outputs.build-number }}
      artifact-label: ${{ steps.plan.outputs.artifact-label }}
      products: ${{ steps.plan.outputs.products }}
      direct-products: ${{ steps.plan.outputs.direct-products }}
      store-products: ${{ steps.plan.outputs.store-products }}
      has-direct: ${{ steps.plan.outputs.has-direct }}
      has-store: ${{ steps.plan.outputs.has-store }}
      has-appcast: ${{ steps.plan.outputs.has-appcast }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout shared scripts
        uses: actions/checkout@v6
        with:
          repository: LeanBytes/workflows-macos
          ref: ${{ github.job_workflow_sha }}
          path: .shared-ci
          token: ${{ secrets.SHARED_WORKFLOWS_TOKEN || github.token }}

      - name: Plan release (parse <id>-v* tag → scoped product, validate vs its changelog)
        id: plan
        env:
          PRODUCTS_DIR: ${{ inputs.products-dir }}
          TAG: ${{ github.ref_name }}
          DEF_BUILD_DIRECT: ${{ inputs.build-direct }}
          DEF_BUILD_STORE: ${{ inputs.build-app-store }}
          DEF_DIST_STORE: ${{ inputs.distribute-app-store }}
          DEF_DIST_APPCAST: ${{ inputs.distribute-stable-appcast }}
          DEF_HAS_FINDER: ${{ inputs.has-finder-extension }}
          DEF_HAS_QL: ${{ inputs.has-quicklook-extension }}
          DEF_APPCAST_FILENAME: ${{ inputs.appcast-filename }}
          DEF_APPCAST_SEED: ${{ inputs.appcast-seed-path }}
        run: python3 .shared-ci/.github/scripts/products.py plan-release >> "$GITHUB_OUTPUT"

      - name: Show target
        run: echo "Releasing '${{ steps.plan.outputs.target-id }}' v${{ steps.plan.outputs.version }} from tag '${{ github.ref_name }}'"

  build-direct:
    if: needs.prepare.outputs.has-direct == 'true'
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        product: ${{ fromJSON(needs.prepare.outputs.direct-products) }}
    uses: LeanBytes/workflows-macos/.github/workflows/_build-direct.yml@v0.4.3
    with:
      version: ${{ needs.prepare.outputs.version }}
      build-number: ${{ needs.prepare.outputs.build-number }}
      artifact-label: ${{ needs.prepare.outputs.artifact-label }}
      artifact-name: direct-build-${{ matrix.product.id }}
      scheme-name: ${{ matrix.product.scheme }}
      bundle-id: ${{ matrix.product.bundle-id }}
      product-name: ${{ matrix.product.product-name }}
      bundle-id-finder: ${{ matrix.product.bundle-id-finder }}
      bundle-id-quicklook: ${{ matrix.product.bundle-id-quicklook }}
      has-finder-extension: ${{ matrix.product.has-finder }}
      has-quicklook-extension: ${{ matrix.product.has-quicklook }}
      use-tuist: ${{ inputs.use-tuist }}
      pre-build-cache-path: ${{ inputs.pre-build-cache-path }}
      pre-build-cache-key: ${{ inputs.pre-build-cache-key }}
      pre-build-script: ${{ inputs.pre-build-script }}
      runs-on: ${{ inputs.runs-on-build }}
      extra-xcodebuild-args: ${{ inputs.extra-xcodebuild-args }}
      configuration: ${{ inputs.configuration-direct }}
      lfs: ${{ inputs.lfs }}
    secrets:
      DEVELOPER_ID_P12_BASE64:        ${{ matrix.product.devid-cert-secret != '' && secrets[matrix.product.devid-cert-secret] || secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_PASSWORD:          ${{ matrix.product.devid-cert-password-secret != '' && secrets[matrix.product.devid-cert-password-secret] || secrets.DEVELOPER_ID_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_DEVID_BASE64:         ${{ matrix.product.devid-profile-secret != '' && secrets[matrix.product.devid-profile-secret] || secrets.PROV_PROF_DEVID_BASE64 }}
      PROV_PROF_DEVID_FINDER_BASE64:  ${{ secrets.PROV_PROF_DEVID_FINDER_BASE64 }}
      PROV_PROF_DEVID_QL_BASE64:      ${{ secrets.PROV_PROF_DEVID_QL_BASE64 }}
      ASC_KEY_ID:                     ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID:                  ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_BASE64:                 ${{ secrets.ASC_KEY_BASE64 }}
      SHARED_WORKFLOWS_TOKEN:         ${{ secrets.SHARED_WORKFLOWS_TOKEN }}

  build-app-store:
    if: needs.prepare.outputs.has-store == 'true'
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        product: ${{ fromJSON(needs.prepare.outputs.store-products) }}
    uses: LeanBytes/workflows-macos/.github/workflows/_build-app-store.yml@v0.4.3
    with:
      version: ${{ needs.prepare.outputs.version }}
      build-number: ${{ needs.prepare.outputs.build-number }}
      artifact-label: ${{ needs.prepare.outputs.artifact-label }}
      artifact-name: app-store-build-${{ matrix.product.id }}
      scheme-name-store: ${{ matrix.product.scheme-store }}
      bundle-id: ${{ matrix.product.bundle-id }}
      bundle-id-store: ${{ matrix.product.bundle-id-store }}
      bundle-id-finder: ${{ matrix.product.bundle-id-finder }}
      bundle-id-finder-store: ${{ matrix.product.bundle-id-finder-store }}
      bundle-id-quicklook: ${{ matrix.product.bundle-id-quicklook }}
      bundle-id-quicklook-store: ${{ matrix.product.bundle-id-quicklook-store }}
      has-finder-extension: ${{ matrix.product.has-finder }}
      has-quicklook-extension: ${{ matrix.product.has-quicklook }}
      use-tuist: ${{ inputs.use-tuist }}
      runs-on: ${{ inputs.runs-on-build }}
      extra-xcodebuild-args: ${{ inputs.extra-xcodebuild-args }}
      configuration: ${{ inputs.configuration-app-store }}
      lfs: ${{ inputs.lfs }}
    secrets:
      APPLE_DISTR_P12_BASE64:         ${{ secrets.APPLE_DISTR_P12_BASE64 }}
      APPLE_DISTR_PASSWORD:           ${{ secrets.APPLE_DISTR_PASSWORD }}
      MAC_DISTR_P12_BASE64:           ${{ secrets.MAC_DISTR_P12_BASE64 }}
      MAC_DISTR_PASSWORD:             ${{ secrets.MAC_DISTR_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_STORE_BASE64:         ${{ matrix.product.store-profile-secret != '' && secrets[matrix.product.store-profile-secret] || secrets.PROV_PROF_STORE_BASE64 }}
      PROV_PROF_STORE_FINDER_BASE64:  ${{ secrets.PROV_PROF_STORE_FINDER_BASE64 }}
      PROV_PROF_STORE_QL_BASE64:      ${{ secrets.PROV_PROF_STORE_QL_BASE64 }}

  publish-release:
    needs: [prepare, build-direct, build-app-store]
    if: |
      always() &&
      needs.build-direct.result != 'failure' &&
      needs.build-app-store.result != 'failure' &&
      (needs.build-direct.result == 'success' || needs.build-app-store.result == 'success')
    runs-on: ${{ fromJSON(inputs.runs-on-publish) }}
    timeout-minutes: 30
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}
      ARTIFACT_LABEL: ${{ needs.prepare.outputs.artifact-label }}
      PRODUCTS_JSON: ${{ needs.prepare.outputs.products }}
      PRODUCTS_DIR: ${{ inputs.products-dir }}
      TARGET_ID: ${{ needs.prepare.outputs.target-id }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout shared scripts
        uses: actions/checkout@v6
        with:
          repository: LeanBytes/workflows-macos
          ref: ${{ github.job_workflow_sha }}
          path: .shared-ci
          token: ${{ secrets.SHARED_WORKFLOWS_TOKEN || github.token }}

      - name: Download direct-build artifacts
        if: needs.build-direct.result == 'success'
        uses: actions/download-artifact@v8
        with:
          pattern: direct-build-*
          path: ./artifacts/direct

      - name: Download app-store-build artifacts
        if: needs.build-app-store.result == 'success'
        uses: actions/download-artifact@v8
        with:
          pattern: app-store-build-*
          path: ./artifacts/app-store

      - name: Expand products
        shell: bash
        run: |
          set -euo pipefail
          # \x1f (Unit Separator), NOT tab — tab is IFS-whitespace and `read`
          # would collapse empty fields (e.g. an empty s3-subpath), shifting
          # every later column. \x1f is non-whitespace and never in the data.
          python3 - "$PRODUCTS_JSON" > /tmp/products.tsv <<'PY'
          import json, sys
          fields = ["id","product-name","s3-subpath","appcast-filename","appcast-seed-path",
                    "changelog-filename","build-direct","build-app-store",
                    "distribute-app-store","distribute-appcast"]
          for p in json.loads(sys.argv[1]):
              print("\x1f".join(str(p.get(k, "")) for k in fields))
          PY
          echo "Products:"; tr '\037' '\t' < /tmp/products.tsv

      # ── Release notes from the (single) target product's inline changelog ──
      - name: Read release notes from the product changelog
        shell: bash
        env:
          MARKETING_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          while IFS=$'\x1f' read -r id pname sub afile aseed clfile bd bas das dap; do
            CHANGELOG_PATH="${PRODUCTS_DIR}/$id.json" VERSION="$MARKETING_VERSION" \
              .shared-ci/.github/scripts/changelog-from-json.sh > "/tmp/notes-$id.md" || true
          done < /tmp/products.tsv
          # Per-product release → the target product's notes drive the GH body.
          cp "/tmp/notes-${TARGET_ID}.md" /tmp/notes.md 2>/dev/null || : > /tmp/notes.md
          echo "Notes ($(wc -c < /tmp/notes.md) bytes):"; cat /tmp/notes.md

      # ── GATE 1: App Store upload ──────────────────────────────────────────
      - name: Install App Store Connect API key (for altool)
        if: needs.build-app-store.result == 'success'
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Upload to App Store Connect (per product)
        if: needs.build-app-store.result == 'success'
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -uo pipefail
          while IFS=$'\x1f' read -r id pname sub afile aseed clfile bd bas das dap; do
            { [ "$bas" = "True" ] && [ "$das" = "True" ]; } || continue
            echo "::group::App Store upload — product=$id"
            PKG=$(ls ./artifacts/app-store/app-store-build-$id/*.pkg 2>/dev/null | head -1 || true)
            if [ -z "$PKG" ] || [ ! -f "$PKG" ]; then
              echo "::error::No .pkg for product $id"; echo "::endgroup::"; exit 1
            fi
            set +e
            OUTPUT=$(xcrun altool --upload-app --type macos --file "$PKG" \
              --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" 2>&1)
            RC=$?
            set -e
            echo "$OUTPUT"
            if grep -qE "UPLOAD SUCCEEDED|No errors uploading" <<<"$OUTPUT"; then
              echo "App Store upload accepted for $id"; echo "::endgroup::"; continue
            fi
            if grep -qiE "already been (used|uploaded)|redundant binary upload|ITMS-90189" <<<"$OUTPUT"; then
              echo "Build for $id already present — treating as success."; echo "::endgroup::"; continue
            fi
            echo "::error::altool failed for $id (exit ${RC})"; echo "::endgroup::"; exit 1
          done < /tmp/products.tsv

      - name: Install AWS CLI
        if: needs.build-direct.result == 'success'
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws &>/dev/null; then
            curl "https://awscli.amazonaws.com/AWSCLIV2.pkg" -o /tmp/AWSCLIV2.pkg
            sudo installer -pkg /tmp/AWSCLIV2.pkg -target /
            rm -f /tmp/AWSCLIV2.pkg
          fi
          aws --version

      - name: Upload DMG + ZIP to S3 (per product)
        if: needs.build-direct.result == 'success'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
        run: |
          set -euo pipefail
          while IFS=$'\x1f' read -r id pname sub afile aseed clfile bd bas das dap; do
            [ "$bd" = "True" ] || continue
            echo "::group::S3 upload — product=$id"
            DEST="${S3_DISTRIBUTION_PATH}${sub:+/$sub}"
            for f in ./artifacts/direct/direct-build-$id/*.dmg ./artifacts/direct/direct-build-$id/*.zip; do
              [ -e "$f" ] || continue
              aws s3 cp "$f" "${DEST}/$(basename "$f")"
              echo "Uploaded $(basename "$f") → ${DEST}/"
            done
            echo "::endgroup::"
          done < /tmp/products.tsv

      # ── Changelog.json → S3, extracted from the product's inline changelog ─
      - name: Upload Changelog.json to S3 (per product)
        if: needs.build-direct.result == 'success'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
        run: |
          set -euo pipefail
          while IFS=$'\x1f' read -r id pname sub afile aseed clfile bd bas das dap; do
            [ "$bd" = "True" ] || continue
            # Publish ONLY the product's .changelog (schema-identical to the old
            # Changelog.json) — never the build identity in the product file.
            python3 -c 'import json,sys; json.dump(json.load(open(sys.argv[1]))["changelog"], open(sys.argv[2],"w"))' \
              "${PRODUCTS_DIR}/$id.json" "/tmp/cl-$id.json"
            DEST="${S3_DISTRIBUTION_PATH}${sub:+/$sub}"
            aws s3 cp "/tmp/cl-$id.json" "${DEST}/${clfile}" --content-type "application/json"
            echo "Uploaded ${clfile} → ${DEST}/"
          done < /tmp/products.tsv

      # ── GATE 2: Stable appcast update ─────────────────────────────────────
      - name: Download Sparkle
        if: needs.prepare.outputs.has-appcast == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SPARKLE_TAG=$(gh api /repos/sparkle-project/Sparkle/releases/latest --jq '.tag_name')
          echo "Sparkle version: ${SPARKLE_TAG}"
          curl -fL -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TAG}/Sparkle-${SPARKLE_TAG}.tar.xz"
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          chmod +x /tmp/sparkle/bin/generate_appcast

      - name: Update Sparkle stable appcast (per product)
        if: needs.prepare.outputs.has-appcast == 'true'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          while IFS=$'\x1f' read -r id pname sub afile aseed clfile bd bas das dap; do
            { [ "$bd" = "True" ] && [ "$dap" = "True" ]; } || continue
            echo "::group::Stable appcast — product=$id"
            WORK="/tmp/appcast-$id"
            rm -rf "$WORK"; mkdir -p "$WORK"   # LB-459: start clean (persistent self-hosted /tmp)
            cp ./artifacts/direct/direct-build-$id/*.zip "$WORK"/
            DEST="${S3_DISTRIBUTION_PATH}${sub:+/$sub}"
            if aws s3 cp "${DEST}/${afile}" "${WORK}/${afile}"; then
              echo "Downloaded existing ${afile}"
            else
              echo "No ${afile} on S3, seeding from ${aseed}"
              cp "${aseed}" "${WORK}/${afile}"
            fi
            echo "$SPARKLE_ED_PRIVATE_KEY" | /tmp/sparkle/bin/generate_appcast --ed-key-file - "${WORK}/"
            NOTES=""
            [ -f "/tmp/notes-$id.md" ] && NOTES=$(cat "/tmp/notes-$id.md")
            VERSION="$VERSION" NOTES="$NOTES" APPCAST_PATH="${WORK}/${afile}" \
              .shared-ci/.github/scripts/update-appcast.sh
            aws s3 cp "${WORK}/${afile}" "${DEST}/${afile}" --content-type "application/xml"
            echo "Uploaded ${afile} → ${DEST}/ (stable live for $id)"
            echo "::endgroup::"
          done < /tmp/products.tsv

      # ── FINAL: GitHub Release for `<id>-v*` ───────────────────────────────
      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CREATE_DISCUSSION: ${{ inputs.create-discussion }}
          DISCUSSION_CATEGORY: ${{ inputs.discussion-category }}
        run: |
          set -euo pipefail
          ARGS=(--repo "${{ github.repository }}" --title "${{ github.ref_name }}")
          if [ -f /tmp/notes.md ] && [ -s /tmp/notes.md ]; then
            ARGS+=(--notes-file /tmp/notes.md)
          else
            ARGS+=(--notes "Release ${{ github.ref_name }}")
          fi
          if [ "$CREATE_DISCUSSION" = "true" ] && [ -n "$DISCUSSION_CATEGORY" ]; then
            ARGS+=(--discussion-category "$DISCUSSION_CATEGORY")
          fi
          gh release create "${{ github.ref_name }}" "${ARGS[@]}"

      - name: Attach DMG + ZIP to GH Release
        if: needs.build-direct.result == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          ASSETS=( ./artifacts/direct/direct-build-*/*.dmg ./artifacts/direct/direct-build-*/*.zip )
          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "No DMG/ZIP assets to attach"; exit 0
          fi
          gh release upload "${{ github.ref_name }}" --repo "${{ github.repository }}" --clobber "${ASSETS[@]}"

      - name: Write release summary
        if: needs.build-direct.result == 'success'
        shell: bash
        env:
          S3_DOWNLOAD_URL: ${{ vars.S3_DOWNLOAD_URL }}
        run: |
          set -euo pipefail
          {
            echo "## Release ${{ github.ref_name }} published ✅"
            echo
            echo "**Product:** \`${TARGET_ID}\` · **Version:** \`${VERSION}\` · **Build:** \`${BUILD_NUMBER}\`"
            echo
            echo "| Artifact | Download |"
            echo "|---|---|"
            while IFS=$'\x1f' read -r id pname sub afile aseed clfile bd bas das dap; do
              [ "$bd" = "True" ] || continue
              BASE="${S3_DOWNLOAD_URL}${sub:+/$sub}"
              echo "| DMG | [${pname}_${ARTIFACT_LABEL}.dmg](${BASE}/${pname}_${ARTIFACT_LABEL}.dmg) |"
              echo "| ZIP | [${pname}_${ARTIFACT_LABEL}.zip](${BASE}/${pname}_${ARTIFACT_LABEL}.zip) |"
            done < /tmp/products.tsv
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf /tmp/sparkle /tmp/sparkle.tar.xz /tmp/appcast-* /tmp/notes.md /tmp/notes-*.md /tmp/cl-*.json /tmp/products.tsv
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8
