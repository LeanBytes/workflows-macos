name: selftest

# CI for workflows-macos itself (the repo has no other self-CI): lint every
# workflow and run the products.py offline suite whenever .github/** or tests/**
# change. The `job_workflow_sha` context and shellcheck style findings are
# ignored (the former is an actionlint gap; the latter are the intentional
# "read all TSV columns, use a subset" publish loops).

on:
  pull_request:
    paths:
      - '.github/**'
      - 'tests/**'
  push:
    branches: [main]
    paths:
      - '.github/**'
      - 'tests/**'

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install actionlint
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Lint workflows
        run: |
          ./actionlint \
            -ignore 'property "job_workflow_sha" is not defined' \
            -ignore 'shellcheck reported issue' \
            .github/workflows/*.yml

      - name: products.py offline tests
        run: bash tests/run.sh
