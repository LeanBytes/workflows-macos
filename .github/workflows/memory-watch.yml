# ── Memory-leak Watch (reusable) ─────────────────────────────────────────────
# Builds a macOS app UNSIGNED, runs it for an extended period on a runner, and
# samples its resident memory to catch unbounded growth (leaks). This is NOT a
# release pipeline — no signing/notarizing; just build → run → watch → report.
#
# Called from a per-app shell that owns the schedule (see
# examples/per-app/nightly-memory-watch.yml). The build/run knowledge (Tuist
# install+generate, runner selection, the shared .shared-ci scripts) is the
# same this repo uses for its release builds — so a calling app only sets a few
# inputs, not a whole CI.
#
# Outcome semantics (deliberately: a leak is a SUCCESSFUL watch):
#   • healthy            → job success
#   • leak detected      → file a ticket (if file-jira-on-leak) → job SUCCESS
#   • infra/watch error  → job FAIL  (build failed, app wouldn't launch, the
#     watcher lost the process / crashed / got bad args). memory_watch.py exit
#     codes: 0 healthy, 2 leak, 3 error.
#
# Required caller vars:  SCHEME_NAME (or input `scheme`), PRODUCT_NAME (or input `app-name`)
# Optional caller vars (only when file-jira-on-leak: true):
#   JIRA_BASE_URL, JIRA_PROJECT_KEY, JIRA_USER_EMAIL, JIRA_ISSUE_TYPE
# Optional caller secrets:
#   JIRA_API_TOKEN          (only when file-jira-on-leak: true)
#   SHARED_WORKFLOWS_TOKEN  (only when consuming a PRIVATE fork of workflows-macos)
# ─────────────────────────────────────────────────────────────────────────────
name: memory-watch

on:
  workflow_call:
    inputs:
      # ── Runner ─────────────────────────────────────────────────────────────
      runs-on:
        description: "JSON-encoded runner for the (long) watch job. Multi-hour watches need self-hosted — GitHub-hosted macOS caps jobs at 6h. e.g. '\"macos-26\"' or '[\"self-hosted\",\"agent-alex\"]'."
        type: string
        default: '"macos-26"'
      job-timeout-minutes:
        description: "Hard ceiling for the watch job. Must exceed duration-minutes + build time."
        type: number
        default: 360

      # ── What to build/run ──────────────────────────────────────────────────
      scheme:
        description: "Xcode scheme to build. Defaults to the SCHEME_NAME repo var."
        type: string
        default: ""
      app-name:
        description: "Product name of the .app (and process name). Defaults to the PRODUCT_NAME repo var."
        type: string
        default: ""
      process-name:
        description: "Process name to watch, if it differs from app-name. Defaults to app-name."
        type: string
        default: ""
      configuration:
        description: "Xcode build configuration (unsigned). Default 'Release'."
        type: string
        default: "Release"
      use-tuist:
        description: "Project is generated by Tuist (runs tuist install + generate before build)."
        type: boolean
        default: false
      extra-xcodebuild-args:
        description: "Extra xcodebuild settings appended to the build (word-split)."
        type: string
        default: ""

      # ── Pre-build hooks (asset downloads, codegen) ─────────────────────────
      pre-build-cache-path:
        type: string
        default: ""
      pre-build-cache-key:
        type: string
        default: ""
      pre-build-script:
        type: string
        default: ""

      # ── Watch thresholds (memory_watch.py). Strings so a shell's
      #    workflow_dispatch override passes straight through without number
      #    coercion; the script + bash arithmetic parse them. ──
      duration-minutes:
        type: string
        default: "270"
      interval-seconds:
        type: string
        default: "300"
      warmup-seconds:
        type: string
        default: "900"
      hard-cap-mb:
        type: string
        default: "2048"
      slope-mb-per-hour:
        type: string
        default: "150"
      min-growth-mb:
        type: string
        default: "400"

      # ── Behaviour ──────────────────────────────────────────────────────────
      file-jira-on-leak:
        description: "On a leak, file a Jira ticket (needs the JIRA_* vars + JIRA_API_TOKEN). Off = just record the samples artifact."
        type: boolean
        default: false
      gate-on-new-commit:
        description: "Only watch a given commit on main once (a per-commit cache marker). Off = run every time."
        type: boolean
        default: true
      force:
        description: "Run even if this commit was already watched (wire to the shell's workflow_dispatch input)."
        type: boolean
        default: false

    secrets:
      JIRA_API_TOKEN:         { required: false }
      SHARED_WORKFLOWS_TOKEN: { required: false }

permissions:
  contents: read

# One watch at a time per repo — they're long and contend for the runner.
concurrency:
  group: memory-watch-${{ github.repository }}
  cancel-in-progress: false

jobs:
  # Cheap gate on ubuntu (like the distribute-* prepare jobs). A per-commit cache
  # marker makes each commit on main get watched exactly once; `force` overrides.
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      sha: ${{ steps.check.outputs.sha }}
      short_sha: ${{ steps.check.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Look up "already watched this commit" marker
        id: marker
        if: inputs.gate-on-new-commit
        uses: actions/cache/restore@v4
        with:
          path: .memory-watch-marker
          key: memory-watch-tested-${{ github.sha }}
          lookup-only: true

      - id: check
        name: Decide whether to run
        shell: bash
        run: |
          set -euo pipefail
          SHA=$(git rev-parse HEAD)
          SHORT=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.force }}" = "true" ]; then
            echo "force=true → run."; echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ "${{ inputs.gate-on-new-commit }}" != "true" ]; then
            echo "Gating disabled → run."; echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "Ref ${{ github.ref }} is not refs/heads/main → skip."
            echo "should_run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ "${{ steps.marker.outputs.cache-hit }}" = "true" ]; then
            echo "Commit $SHORT on main was already watched → skip."
            echo "should_run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "New, unwatched commit $SHORT on main → run."
          echo "should_run=true" >> "$GITHUB_OUTPUT"

  watch:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: ${{ inputs.job-timeout-minutes }}
    env:
      SCHEME: ${{ inputs.scheme || vars.SCHEME_NAME }}
      APP_NAME: ${{ inputs.app-name || vars.PRODUCT_NAME }}
      PROCESS_NAME: ${{ inputs.process-name || inputs.app-name || vars.PRODUCT_NAME }}
      CONFIGURATION: ${{ inputs.configuration }}
      EXTRA_ARGS: ${{ inputs.extra-xcodebuild-args }}
      DURATION_MINUTES: ${{ inputs.duration-minutes }}
      INTERVAL_SECONDS: ${{ inputs.interval-seconds }}
      WARMUP_SECONDS: ${{ inputs.warmup-seconds }}
      HARD_CAP_MB: ${{ inputs.hard-cap-mb }}
      SLOPE_MB_PER_HOUR: ${{ inputs.slope-mb-per-hour }}
      MIN_GROWTH_MB: ${{ inputs.min-growth-mb }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Checkout shared scripts
        uses: actions/checkout@v6
        with:
          repository: LeanBytes/workflows-macos
          ref: ${{ github.job_workflow_sha }}
          path: .shared-ci
          token: ${{ secrets.SHARED_WORKFLOWS_TOKEN || github.token }}

      - name: Resolve dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.use-tuist }}" = "true" ]; then
            command -v tuist >/dev/null 2>&1 || { brew tap tuist/tuist; brew install --formula tuist; }
            tuist install
            tuist generate --no-open
          else
            : "${SCHEME:?scheme is required (input 'scheme' or the SCHEME_NAME repo var)}"
            xcodebuild -resolvePackageDependencies -scheme "$SCHEME" -configuration "$CONFIGURATION"
          fi

      - name: Pre-build cache
        if: inputs.pre-build-cache-path != ''
        uses: actions/cache@v5
        with:
          path: ${{ inputs.pre-build-cache-path }}
          key: ${{ inputs.pre-build-cache-key }}

      - name: Pre-build script
        if: inputs.pre-build-script != ''
        shell: bash
        run: bash "${{ inputs.pre-build-script }}"

      - name: Build (unsigned)
        shell: bash
        run: |
          set -euo pipefail
          : "${SCHEME:?scheme is required (input 'scheme' or the SCHEME_NAME repo var)}"
          : "${APP_NAME:?app-name is required (input 'app-name' or the PRODUCT_NAME repo var)}"

          # Locate the Xcode container (Tuist generates a .xcworkspace). Empty
          # array → let xcodebuild resolve a lone project itself.
          container=()
          shopt -s nullglob
          ws=( *.xcworkspace ); proj=( *.xcodeproj )
          if [ "${#ws[@]}" -eq 1 ]; then
            container=(-workspace "${ws[0]}")
          elif [ "${#proj[@]}" -eq 1 ]; then
            container=(-project "${proj[0]}")
          fi
          shopt -u nullglob
          echo "Container: ${container[*]:-<auto>}"

          rm -rf ./DerivedData
          # EXTRA_ARGS intentionally unquoted (word-split into build settings).
          if ! xcodebuild build \
              ${container[@]+"${container[@]}"} \
              -scheme "$SCHEME" \
              -configuration "$CONFIGURATION" \
              -derivedDataPath ./DerivedData \
              -destination 'platform=macOS' \
              CODE_SIGNING_ALLOWED=NO \
              $EXTRA_ARGS > build.log 2>&1; then
            echo "::error::Build failed"; tail -150 build.log; exit 1
          fi

          APP="$PWD/DerivedData/Build/Products/${CONFIGURATION}/${APP_NAME}.app"
          if [ ! -d "$APP" ]; then
            echo "::error::App not found at $APP"
            ls -la "DerivedData/Build/Products/${CONFIGURATION}/" 2>/dev/null || true
            exit 1
          fi
          echo "APP_PATH=$APP" >> "$GITHUB_ENV"
          echo "Built $APP"

      - name: Launch app and watch memory
        id: watch
        shell: bash
        run: |
          set -uo pipefail
          pkill -x "$PROCESS_NAME" 2>/dev/null || true
          sleep 2
          # `open` launches the GUI app; caffeinate keeps the Mac awake for the
          # whole window so capture and sampling never pause.
          open -n "$APP_PATH"
          sleep 8
          PID=$(pgrep -n -x "$PROCESS_NAME" || true)
          if [ -z "$PID" ]; then
            echo "::warning::$PROCESS_NAME did not start"
            echo "watch_exit=3" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "Watching pid $PID ($PROCESS_NAME) for ${DURATION_MINUTES} min."
          set +e
          caffeinate -dimsu python3 .shared-ci/.github/scripts/memory_watch.py \
            --pid "$PID" \
            --process-name "$PROCESS_NAME" \
            --duration-seconds $(( DURATION_MINUTES * 60 )) \
            --interval-seconds "$INTERVAL_SECONDS" \
            --warmup-seconds "$WARMUP_SECONDS" \
            --hard-cap-mb "$HARD_CAP_MB" \
            --slope-mb-per-hour "$SLOPE_MB_PER_HOUR" \
            --min-growth-mb "$MIN_GROWTH_MB" \
            --out memory-samples.json
          WATCH_EXIT=$?
          set -e
          echo "watch_exit=$WATCH_EXIT" >> "$GITHUB_OUTPUT"
          pkill -x "$PROCESS_NAME" 2>/dev/null || true
          exit 0

      - name: Upload memory samples
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: memory-samples-${{ needs.gate.outputs.short_sha }}
          path: memory-samples.json
          if-no-files-found: warn

      # Leak → file a ticket (if configured). A ticket POST failure fails the job
      # so a real leak is never silently unreported; no Jira configured = a
      # warning + the samples artifact is the record, job still succeeds.
      - name: File Jira ticket on leak
        if: steps.watch.outputs.watch_exit == '2' && inputs.file-jira-on-leak
        shell: bash
        env:
          JIRA_BASE_URL:    ${{ vars.JIRA_BASE_URL }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
          JIRA_USER_EMAIL:  ${{ vars.JIRA_USER_EMAIL }}
          JIRA_ISSUE_TYPE:  ${{ vars.JIRA_ISSUE_TYPE }}
          JIRA_API_TOKEN:   ${{ secrets.JIRA_API_TOKEN }}
          COMMIT_SHA:       ${{ needs.gate.outputs.sha }}
          SHORT_SHA:        ${{ needs.gate.outputs.short_sha }}
          RUN_URL:          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${JIRA_API_TOKEN:-}" ]; then
            echo "::warning::Leak detected but JIRA_API_TOKEN is unset — skipping ticket. The memory-samples artifact has the evidence."
            exit 0
          fi
          python3 .shared-ci/.github/scripts/create_jira_ticket.py --samples memory-samples.json

      # Mark this commit watched (so a future run with no new commit skips) only
      # on a real verdict — healthy (0) or leak (2). A watch error (3) is left
      # unmarked so it retries next run.
      - name: Mark this commit as watched
        if: steps.watch.outputs.watch_exit == '0' || steps.watch.outputs.watch_exit == '2'
        shell: bash
        run: echo "${{ needs.gate.outputs.sha }}" > .memory-watch-marker
      - name: Save watched-commit marker
        if: steps.watch.outputs.watch_exit == '0' || steps.watch.outputs.watch_exit == '2'
        uses: actions/cache/save@v4
        with:
          path: .memory-watch-marker
          key: memory-watch-tested-${{ needs.gate.outputs.sha }}

      - name: Determine result
        shell: bash
        run: |
          EXIT="${{ steps.watch.outputs.watch_exit }}"
          case "$EXIT" in
            0) echo "Healthy — no leak over the watch window. ✅" ;;
            2) echo "Leak detected and reported — a leak is a successful watch outcome. ✅" ;;
            *) echo "::error::memory watch could not complete (exit=$EXIT; 3 = watch/infra error)"; exit 1 ;;
          esac
