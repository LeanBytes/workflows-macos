# ── Internal Build Callee — Direct Distribution ──────────────────────────────
# Produces a notarized, stapled .app packaged as DMG + ZIP, uploaded as a
# GitHub Actions workflow artifact named "direct-build". An orchestrator
# (distribute-pr/beta/release.yml) downloads the artifact and decides what
# to do with it (S3, appcast, GH release).
#
# The actual build/sign/notarize/package logic lives in the shared script
# `.github/scripts/build-direct.sh` (the single source of truth — also run
# directly by `scripts/build-local.sh` for local builds). This workflow checks
# workflows-macos out into `.shared-ci/` at the same commit (via
# github.job_workflow_sha) and calls ONE phase of that script per named step,
# so the Actions UI keeps its per-step names, timings, and pass/fail icons.
#
# Underscore prefix marks this as an internal callee — per-app shells should
# call distribute-pr.yml / distribute-beta.yml / distribute-release.yml,
# not this file directly.
#
# Required caller secrets:
#   DEVELOPER_ID_P12_BASE64  — Developer ID Application cert + private key
#   DEVELOPER_ID_PASSWORD    — password for the Developer ID p12
#   KEYCHAIN_PASSWORD        — ephemeral build keychain password
#   PROV_PROF_DEVID_BASE64   — main Developer ID provisioning profile
#   ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_BASE64  — ASC API key for notarization
#
# Required caller vars:
#   SCHEME_NAME, BUNDLE_ID, PRODUCT_NAME
#
# Optional (gated by inputs):
#   has-finder-extension     → PROV_PROF_DEVID_FINDER_BASE64, vars.BUNDLE_ID_FINDER
#   has-quicklook-extension  → PROV_PROF_DEVID_QL_BASE64,     vars.BUNDLE_ID_QUICKLOOK
#   SHARED_WORKFLOWS_TOKEN   → only when consuming a PRIVATE fork of workflows-macos
#                              (the shared-scripts checkout falls back to github.token)
# ─────────────────────────────────────────────────────────────────────────────
name: _build-direct

on:
  workflow_call:
    inputs:
      # ── Required ───────────────────────────────────────────────────────────
      version:
        description: "Marketing version (CFBundleShortVersionString)"
        required: true
        type: string
      build-number:
        description: "Build number (CFBundleVersion), timestamp-based"
        required: true
        type: string
      artifact-label:
        description: "Label for artifact filenames (e.g. '1.3.0' or 'build-260406143022')"
        required: true
        type: string

      # ── Runner ─────────────────────────────────────────────────────────────
      runs-on:
        description: "JSON-encoded runner label or array (e.g. '\"macos-26\"' or '[\"self-hosted\",\"agent-alex\"]')"
        type: string
        default: '"macos-26"'

      # ── Checkout ───────────────────────────────────────────────────────────
      lfs:
        description: "Pull the caller repo's git LFS files on checkout (e.g. an LFS-tracked model). Off by default."
        type: boolean
        default: false

      # ── Project type ───────────────────────────────────────────────────────
      use-tuist:
        description: "Project is generated by Tuist (runs tuist install + generate before build)"
        type: boolean
        default: false

      # ── Pre-build hooks (caller-provided) ──────────────────────────────────
      # Asset downloads, codegen, etc. that an app needs ON the build runner
      # before xcodebuild archive. Keeps the shared workflow app-agnostic.
      pre-build-cache-path:
        description: "Path to cache via actions/cache@v4 (e.g. 'MyApp/Models/asset.bin'). Empty = no cache."
        type: string
        default: ""
      pre-build-cache-key:
        description: "Cache key. Required when pre-build-cache-path is set."
        type: string
        default: ""
      pre-build-script:
        description: "Path (relative to caller repo) of a bash script to run before archive. Sees the cache-restored files."
        type: string
        default: ""

      # ── Extensions ─────────────────────────────────────────────────────────
      has-finder-extension:
        description: "App has a Finder Sync extension. Expects PROV_PROF_DEVID_FINDER_BASE64 secret + vars.BUNDLE_ID_FINDER."
        type: boolean
        default: false
      has-quicklook-extension:
        description: "App has a Quick Look extension. Expects PROV_PROF_DEVID_QL_BASE64 secret + vars.BUNDLE_ID_QUICKLOOK."
        type: boolean
        default: false

      # ── Build configuration ────────────────────────────────────────────────
      configuration:
        description: "Xcode build configuration to archive (e.g. Release, Release Store). Must match a configuration declared in the caller's .xcodeproj."
        type: string
        default: "Release"

      # ── Escape hatch ───────────────────────────────────────────────────────
      extra-xcodebuild-args:
        description: "Additional xcodebuild settings appended to archive command (e.g. 'BUILD_RELEASE_DATE=...')"
        type: string
        default: ""

    # Secrets must be declared (not just inherited) when the originating
    # caller of the reusable-workflow chain is in a different org than this
    # repo — `secrets: inherit` is org-scoped against the OUTERMOST caller,
    # not the immediate caller, so it refuses at every hop in the chain
    # when the chain crosses an org boundary anywhere.
    secrets:
      DEVELOPER_ID_P12_BASE64:        { required: true }
      DEVELOPER_ID_PASSWORD:          { required: true }
      KEYCHAIN_PASSWORD:              { required: true }
      PROV_PROF_DEVID_BASE64:         { required: true }
      PROV_PROF_DEVID_FINDER_BASE64:  { required: false }
      PROV_PROF_DEVID_QL_BASE64:      { required: false }
      ASC_KEY_ID:                     { required: true }
      ASC_ISSUER_ID:                  { required: true }
      ASC_KEY_BASE64:                 { required: true }
      # Only needed when the originating caller consumes a PRIVATE fork of
      # workflows-macos; the shared-scripts checkout falls back to github.token.
      SHARED_WORKFLOWS_TOKEN:         { required: false }

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: 60

    # Set once at the job level; every build-direct.sh phase reads these. The
    # script reconstructs all paths + the profile name from this env, so each
    # step (a separate process) needs no state from the previous one.
    env:
      VERSION: ${{ inputs.version }}
      BUILD_NUMBER: ${{ inputs.build-number }}
      ARTIFACT_LABEL: ${{ inputs.artifact-label }}
      SCHEME_NAME: ${{ vars.SCHEME_NAME }}
      BUNDLE_ID: ${{ vars.BUNDLE_ID }}
      PRODUCT_NAME: ${{ vars.PRODUCT_NAME }}
      BUNDLE_ID_FINDER: ${{ vars.BUNDLE_ID_FINDER }}
      BUNDLE_ID_QUICKLOOK: ${{ vars.BUNDLE_ID_QUICKLOOK }}
      USE_TUIST: ${{ inputs.use-tuist }}
      CONFIGURATION: ${{ inputs.configuration }}
      EXTRA_ARGS: ${{ inputs.extra-xcodebuild-args }}
      HAS_FINDER: ${{ inputs.has-finder-extension }}
      HAS_QUICKLOOK: ${{ inputs.has-quicklook-extension }}
      WORK_DIR: /tmp/build/_work
      OUTPUT_DIR: /tmp/build
      DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_DEVID_BASE64: ${{ secrets.PROV_PROF_DEVID_BASE64 }}
      PROV_PROF_DEVID_FINDER_BASE64: ${{ secrets.PROV_PROF_DEVID_FINDER_BASE64 }}
      PROV_PROF_DEVID_QL_BASE64: ${{ secrets.PROV_PROF_DEVID_QL_BASE64 }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          lfs: ${{ inputs.lfs }}

      # workflows-macos itself (this repo) — pinned to the SAME commit as this
      # reusable workflow, so build-direct.sh can never skew from the YAML.
      - name: Checkout shared scripts
        uses: actions/checkout@v6
        with:
          repository: LeanBytes/workflows-macos
          ref: ${{ github.job_workflow_sha }}
          path: .shared-ci
          token: ${{ secrets.SHARED_WORKFLOWS_TOKEN || github.token }}

      - name: Resolve dependencies
        shell: bash
        run: bash .shared-ci/.github/scripts/build-direct.sh setup

      # ── Pre-build hooks (caller-provided) — kept as native steps so
      #    actions/cache works and the script stays app-agnostic ──
      - name: Pre-build cache
        if: inputs.pre-build-cache-path != ''
        uses: actions/cache@v5
        with:
          path: ${{ inputs.pre-build-cache-path }}
          key: ${{ inputs.pre-build-cache-key }}

      - name: Pre-build script
        if: inputs.pre-build-script != ''
        shell: bash
        run: bash "${{ inputs.pre-build-script }}"

      - name: Set up signing
        shell: bash
        run: bash .shared-ci/.github/scripts/build-direct.sh signing

      - name: Archive
        shell: bash
        run: bash .shared-ci/.github/scripts/build-direct.sh archive

      - name: Export
        shell: bash
        run: bash .shared-ci/.github/scripts/build-direct.sh export

      - name: Notarize
        shell: bash
        run: bash .shared-ci/.github/scripts/build-direct.sh notarize

      - name: Staple
        shell: bash
        run: bash .shared-ci/.github/scripts/build-direct.sh staple

      - name: Verify (pre-package)
        shell: bash
        run: bash .shared-ci/.github/scripts/build-direct.sh verify

      - name: Create DMG and ZIP
        shell: bash
        run: bash .shared-ci/.github/scripts/build-direct.sh package

      - name: Verify packaged DMG and ZIP
        shell: bash
        run: bash .shared-ci/.github/scripts/build-direct.sh verify-packages

      - name: Upload DMG + ZIP as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: direct-build
          path: |
            /tmp/build/*.dmg
            /tmp/build/*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Cleanup
        if: always()
        shell: bash
        run: bash .shared-ci/.github/scripts/build-direct.sh cleanup
