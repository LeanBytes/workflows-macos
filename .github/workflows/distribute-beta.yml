# ── Beta Distribution Orchestrator ───────────────────────────────────────────
# Called from a per-app shell triggered on pull_request: closed (merged to main).
# Five independent toggles control what builds and what gets distributed:
#
#   build-direct              build the .app/DMG/ZIP   (default true)
#   build-app-store           build the .pkg            (default false)
#   distribute-app-store      altool → ASC / TestFlight (default false; needs build-app-store)
#   distribute-beta-appcast   Sparkle beta channel      (default false; needs build-direct)
#
# Strict fail-safe publish order (in publish-beta job):
#   1. altool → ASC                  (if distribute-app-store)        ← GATE 1
#   2. S3 upload of DMG/ZIP          (if build-direct; silent)
#   3. Beta appcast update + upload  (if distribute-beta-appcast)     ← MAKES BETA VISIBLE
#   4. GitHub pre-release creation
#   5. PR comment with download links
#
# Per-app shell example:
#
#   on:
#     pull_request:
#       types: [closed]
#       branches: [main]
#   jobs:
#     beta:
#       if: github.event.pull_request.merged == true
#       uses: LeanBytes/workflows-macos/.github/workflows/distribute-beta.yml@v0.2
#       with:
#         build-app-store: true         # macpacker, filefillet
#         distribute-app-store: true    # macpacker, filefillet
#         distribute-beta-appcast: true # FlowMoose
#       secrets: inherit
# ─────────────────────────────────────────────────────────────────────────────
name: distribute-beta

on:
  workflow_call:
    inputs:
      build-direct:
        description: "Build the Direct (.app/DMG/ZIP) artifact"
        type: boolean
        default: true
      build-app-store:
        description: "Build the App Store (.pkg) artifact"
        type: boolean
        default: false
      distribute-app-store:
        description: "Upload .pkg to App Store Connect via altool (TestFlight beta tracks). Requires build-app-store."
        type: boolean
        default: false
      distribute-beta-appcast:
        description: "Update Sparkle's beta appcast channel with the Direct build. Requires build-direct."
        type: boolean
        default: false
      use-tuist:
        type: boolean
        default: false
      pre-build-cache-path:
        type: string
        default: ""
      pre-build-cache-key:
        type: string
        default: ""
      pre-build-script:
        type: string
        default: ""
      has-finder-extension:
        type: boolean
        default: false
      has-quicklook-extension:
        type: boolean
        default: false
      extra-xcodebuild-args:
        type: string
        default: ""
      runs-on-build:
        type: string
        default: '"macos-26"'
      runs-on-publish:
        description: "Publish job needs macOS for altool + Sparkle generate_appcast"
        type: string
        default: '"macos-26"'
      appcast-filename:
        description: "Appcast XML filename on S3 (Sparkle uses one file with channel-tagged items)"
        type: string
        default: "appcast.xml"
      appcast-seed-path:
        description: "Path to seed appcast.xml in caller repo, used when S3 has no existing file"
        type: string
        default: "Config/appcast.xml"
      changelog-path:
        description: "Path to Changelog.json in the caller repo (source for appcast description + GH pre-release body)"
        type: string
        default: "Config/Changelog.json"

permissions:
  contents: write          # to create GH pre-release and push beta tag
  pull-requests: write     # to comment on merged PR

# Serialize beta runs across the repository so two PR merges can't race on
# the beta counter (both reading "3 existing v2.12.0-beta.*" tags then both
# trying to push v2.12.0-beta.4).
concurrency:
  group: distribute-beta-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      next-version: ${{ steps.compute.outputs.next-version }}
      direct-marketing: ${{ steps.compute.outputs.direct-marketing }}
      store-marketing: ${{ steps.compute.outputs.store-marketing }}
      build-number: ${{ steps.compute.outputs.build-number }}
      artifact-label: ${{ steps.compute.outputs.artifact-label }}
      beta-tag: ${{ steps.compute.outputs.beta-tag }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need full tag history for the safeguard + beta counter

      - name: Compute beta version
        id: compute
        shell: bash
        env:
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
        run: |
          set -euo pipefail

          NEXT_VERSION=$(python3 -c "
          import json, sys
          data = json.load(open('$CHANGELOG_PATH'))
          versions = data.get('versions') or []
          if not versions or 'version' not in versions[0]:
              print('::error::$CHANGELOG_PATH has no versions[0].version', file=sys.stderr)
              sys.exit(1)
          print(versions[0]['version'])
          ")

          # Defensive backstop. The PR-build workflow (distribute-pr.yml)
          # already enforces this on every PR open/push; by the time a merge
          # reaches here the PR check should have caught it. Keep the check
          # in case a PR was merged through a path that bypassed PR builds
          # (admin override, force-merge, etc.).
          if git rev-parse "refs/tags/v${NEXT_VERSION}" >/dev/null 2>&1; then
            echo "::error::v${NEXT_VERSION} is already released. Config/Changelog.json's versions[0] needs a new entry. (This should have been caught by the PR check — investigate why it wasn't.)"
            exit 1
          fi

          BETA_COUNT=$(git tag --list "v${NEXT_VERSION}-beta.*" | wc -l | tr -d ' ')
          NEXT_BETA=$((BETA_COUNT + 1))

          BUILD_NUMBER=$(date -u +%y%m%d%H%M%S)
          DIRECT_MARKETING="${NEXT_VERSION}-beta.${NEXT_BETA}"
          STORE_MARKETING="${NEXT_VERSION}"
          BETA_TAG="v${NEXT_VERSION}-beta.${NEXT_BETA}"
          ARTIFACT_LABEL="${BETA_TAG}"

          echo "next-version=${NEXT_VERSION}"          >> "$GITHUB_OUTPUT"
          echo "direct-marketing=${DIRECT_MARKETING}"  >> "$GITHUB_OUTPUT"
          echo "store-marketing=${STORE_MARKETING}"    >> "$GITHUB_OUTPUT"
          echo "build-number=${BUILD_NUMBER}"          >> "$GITHUB_OUTPUT"
          echo "artifact-label=${ARTIFACT_LABEL}"      >> "$GITHUB_OUTPUT"
          echo "beta-tag=${BETA_TAG}"                  >> "$GITHUB_OUTPUT"

          echo "Beta build prepared:"
          echo "  Next version:        ${NEXT_VERSION}"
          echo "  Direct marketing:    ${DIRECT_MARKETING}"
          echo "  App Store marketing: ${STORE_MARKETING}"
          echo "  Build number:        ${BUILD_NUMBER}"
          echo "  Beta tag:            ${BETA_TAG}"

  build-direct:
    if: inputs.build-direct
    needs: prepare
    uses: LeanBytes/workflows-macos/.github/workflows/_build-direct.yml@v0.3.18
    with:
      version: ${{ needs.prepare.outputs.direct-marketing }}   # e.g. "2.12.0-beta.4"
      build-number: ${{ needs.prepare.outputs.build-number }}
      artifact-label: ${{ needs.prepare.outputs.artifact-label }}
      use-tuist: ${{ inputs.use-tuist }}
      pre-build-cache-path: ${{ inputs.pre-build-cache-path }}
      pre-build-cache-key: ${{ inputs.pre-build-cache-key }}
      pre-build-script: ${{ inputs.pre-build-script }}
      has-finder-extension: ${{ inputs.has-finder-extension }}
      has-quicklook-extension: ${{ inputs.has-quicklook-extension }}
      runs-on: ${{ inputs.runs-on-build }}
      extra-xcodebuild-args: ${{ inputs.extra-xcodebuild-args }}
    secrets: inherit

  build-app-store:
    if: inputs.build-app-store
    needs: prepare
    uses: LeanBytes/workflows-macos/.github/workflows/_build-app-store.yml@v0.3.18
    with:
      version: ${{ needs.prepare.outputs.store-marketing }}    # clean "2.12.0" (Apple rejects suffixes)
      build-number: ${{ needs.prepare.outputs.build-number }}
      artifact-label: ${{ needs.prepare.outputs.artifact-label }}
      use-tuist: ${{ inputs.use-tuist }}
      has-finder-extension: ${{ inputs.has-finder-extension }}
      has-quicklook-extension: ${{ inputs.has-quicklook-extension }}
      runs-on: ${{ inputs.runs-on-build }}
      extra-xcodebuild-args: ${{ inputs.extra-xcodebuild-args }}
    secrets: inherit

  publish-beta:
    needs: [prepare, build-direct, build-app-store]
    # Tolerate skipped builds; require at least one to have succeeded.
    if: |
      always() &&
      needs.build-direct.result != 'failure' &&
      needs.build-app-store.result != 'failure' &&
      (needs.build-direct.result == 'success' || needs.build-app-store.result == 'success')
    runs-on: ${{ fromJSON(inputs.runs-on-publish) }}
    timeout-minutes: 30
    env:
      NEXT_VERSION: ${{ needs.prepare.outputs.next-version }}
      DIRECT_MARKETING: ${{ needs.prepare.outputs.direct-marketing }}
      BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}
      ARTIFACT_LABEL: ${{ needs.prepare.outputs.artifact-label }}
      BETA_TAG: ${{ needs.prepare.outputs.beta-tag }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout shared scripts
        uses: actions/checkout@v6
        with:
          repository: LeanBytes/workflows-macos
          ref: ${{ github.job_workflow_sha }}
          path: .shared-ci
          token: ${{ secrets.SHARED_WORKFLOWS_TOKEN || github.token }}

      - name: Download direct-build artifact
        if: inputs.build-direct
        uses: actions/download-artifact@v8
        with:
          name: direct-build
          path: ./artifacts/direct

      - name: Download app-store-build artifact
        if: inputs.build-app-store
        uses: actions/download-artifact@v8
        with:
          name: app-store-build
          path: ./artifacts/app-store

      # ── GATE 1: App Store / TestFlight upload ─────────────────────────────
      - name: Install App Store Connect API key (for altool)
        if: inputs.build-app-store && inputs.distribute-app-store
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Upload to TestFlight
        if: inputs.build-app-store && inputs.distribute-app-store
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          PKG=$(ls ./artifacts/app-store/*.pkg | head -1)
          [ -f "$PKG" ] || { echo "::error::No .pkg in app-store artifact"; exit 1; }

          # altool exits 0 even on upload failures — we have to grep the
          # output for explicit error markers to detect failure.
          OUTPUT=$(xcrun altool --upload-app \
            --type macos \
            --file "$PKG" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" 2>&1)

          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -qE "ERROR:|UPLOAD FAILED|Failed to upload"; then
            echo "::error::altool reported failure on TestFlight upload"
            exit 1
          fi

          echo "TestFlight upload accepted: $(basename "$PKG")"

      # ── Read release notes from Changelog.json ────────────────────────────
      # Beta builds always use versions[0] (the in-progress entry). NEXT_VERSION
      # at the job level already holds this value; we pass the literal "NEXT"
      # sentinel to the script as a convenience so it doesn't re-parse the JSON
      # for the version itself.
      - name: Read release notes from Changelog.json
        shell: bash
        env:
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
        run: |
          set -euo pipefail
          CHANGELOG_PATH="$CHANGELOG_PATH" VERSION="NEXT" \
            .shared-ci/.github/scripts/changelog-from-json.sh > /tmp/notes.md
          echo "Notes written ($(wc -c < /tmp/notes.md) bytes)"
          cat /tmp/notes.md

      # ── S3 upload of DMG/ZIP (still silent — appcast hasn't moved yet) ────
      - name: Install AWS CLI
        if: inputs.build-direct
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws &>/dev/null; then
            curl "https://awscli.amazonaws.com/AWSCLIV2.pkg" -o /tmp/AWSCLIV2.pkg
            sudo installer -pkg /tmp/AWSCLIV2.pkg -target /
            rm -f /tmp/AWSCLIV2.pkg
          fi
          aws --version

      - name: Upload DMG + ZIP to S3
        if: inputs.build-direct
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
        run: |
          set -euo pipefail
          for f in ./artifacts/direct/*.dmg ./artifacts/direct/*.zip; do
            [ -e "$f" ] || continue
            BASENAME=$(basename "$f")
            aws s3 cp "$f" "${S3_DISTRIBUTION_PATH}/${BASENAME}"
            echo "Uploaded ${BASENAME}"
          done

      # ── GATE 2: Beta appcast update + upload (THIS makes Sparkle visible) ─
      - name: Download Sparkle
        if: inputs.build-direct && inputs.distribute-beta-appcast
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SPARKLE_TAG=$(gh api /repos/sparkle-project/Sparkle/releases/latest --jq '.tag_name')
          echo "Sparkle version: ${SPARKLE_TAG}"
          curl -fL -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TAG}/Sparkle-${SPARKLE_TAG}.tar.xz"
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          chmod +x /tmp/sparkle/bin/generate_appcast

      - name: Prepare appcast workdir
        if: inputs.build-direct && inputs.distribute-beta-appcast
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
          APPCAST_FILENAME: ${{ inputs.appcast-filename }}
          APPCAST_SEED_PATH: ${{ inputs.appcast-seed-path }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/appcast-work
          cp ./artifacts/direct/*.zip /tmp/appcast-work/

          if aws s3 cp "${S3_DISTRIBUTION_PATH}/${APPCAST_FILENAME}" "/tmp/appcast-work/${APPCAST_FILENAME}"; then
            echo "Downloaded existing ${APPCAST_FILENAME} from S3"
          else
            echo "No ${APPCAST_FILENAME} on S3, using seed from caller repo: ${APPCAST_SEED_PATH}"
            cp "${APPCAST_SEED_PATH}" "/tmp/appcast-work/${APPCAST_FILENAME}"
          fi

      - name: Run generate_appcast (beta channel)
        if: inputs.build-direct && inputs.distribute-beta-appcast
        shell: bash
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          echo "$SPARKLE_ED_PRIVATE_KEY" | /tmp/sparkle/bin/generate_appcast \
            --ed-key-file - \
            --channel beta \
            /tmp/appcast-work/

      - name: Inject release notes into appcast item
        if: inputs.build-direct && inputs.distribute-beta-appcast
        shell: bash
        env:
          APPCAST_FILENAME: ${{ inputs.appcast-filename }}
        run: |
          set -euo pipefail
          NOTES=""
          if [ -f /tmp/notes.md ]; then
            NOTES=$(cat /tmp/notes.md)
          fi

          # Match by build number — beta items repeat marketing version across PR merges.
          VERSION="$BUILD_NUMBER" \
          NOTES="$NOTES" \
          APPCAST_PATH="/tmp/appcast-work/${APPCAST_FILENAME}" \
          .shared-ci/.github/scripts/update-appcast.sh

      - name: Upload appcast.xml to S3
        if: inputs.build-direct && inputs.distribute-beta-appcast
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
          APPCAST_FILENAME: ${{ inputs.appcast-filename }}
        run: |
          set -euo pipefail
          aws s3 cp "/tmp/appcast-work/${APPCAST_FILENAME}" \
            "${S3_DISTRIBUTION_PATH}/${APPCAST_FILENAME}" \
            --content-type "application/xml"
          echo "Uploaded ${APPCAST_FILENAME} → S3 (beta channel now live)"

      # ── Push the beta tag ─────────────────────────────────────────────────
      # The tag is the durable record that this beta was cut and doubles as
      # the counter source for the next run. Push BEFORE the GH pre-release
      # so the release attaches to an existing tag rather than gh fabricating
      # one from --target.
      - name: Push beta tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$BETA_TAG" -m "Beta ${BETA_TAG#v}"
          git push origin "$BETA_TAG"
          echo "Pushed tag $BETA_TAG"

      # ── Final step: GitHub pre-release ────────────────────────────────────
      - name: Create GitHub pre-release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOTES_ARG=""
          if [ -f /tmp/notes.md ]; then
            NOTES_ARG="--notes-file /tmp/notes.md"
          else
            NOTES_ARG="--notes \"Beta build ${BETA_TAG}\""
          fi

          gh release create "$BETA_TAG" \
            --repo "${{ github.repository }}" \
            --title "Beta ${BETA_TAG#v}" \
            --prerelease \
            $NOTES_ARG

      # ── PR comment ─────────────────────────────────────────────────────────
      - name: Comment on merged PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ARTIFACT_LABEL: ${{ needs.prepare.outputs.artifact-label }}
          S3_DOWNLOAD_URL: ${{ vars.S3_DOWNLOAD_URL }}
          PRODUCT_NAME: ${{ vars.PRODUCT_NAME }}
          VERSION: ${{ needs.prepare.outputs.direct-marketing }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}
          DISTRIBUTE_APP_STORE: ${{ inputs.build-app-store && inputs.distribute-app-store }}
          DISTRIBUTE_BETA_APPCAST: ${{ inputs.build-direct && inputs.distribute-beta-appcast }}
        with:
          script: |
            const label = process.env.ARTIFACT_LABEL;
            const baseUrl = process.env.S3_DOWNLOAD_URL;
            const productName = process.env.PRODUCT_NAME;
            const version = process.env.VERSION;
            const build = process.env.BUILD_NUMBER;
            const appStore = process.env.DISTRIBUTE_APP_STORE === 'true';
            const betaAppcast = process.env.DISTRIBUTE_BETA_APPCAST === 'true';

            const channels = [];
            if (betaAppcast) channels.push("Sparkle **beta** appcast");
            if (appStore) channels.push("**TestFlight**");
            const channelLine = channels.length
              ? `Published to: ${channels.join(" + ")}.`
              : `Build artifacts uploaded (no appcast / TestFlight).`;

            const body = [
              `**Beta build ready** ✅`,
              ``,
              channelLine,
              ``,
              `| Artifact | Link |`,
              `|----------|------|`,
              `| DMG | [${productName}_${label}.dmg](${baseUrl}/${productName}_${label}.dmg) |`,
              `| ZIP | [${productName}_${label}.zip](${baseUrl}/${productName}_${label}.zip) |`,
              ``,
              `Version: \`${version}\` · Build: \`${build}\``,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf /tmp/sparkle /tmp/sparkle.tar.xz /tmp/appcast-work /tmp/notes.md
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8
