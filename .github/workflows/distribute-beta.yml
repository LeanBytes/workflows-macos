# ── Beta Distribution Orchestrator ───────────────────────────────────────────
# Called from a per-app shell triggered on push to main. `push: branches: [main]`
# is a trusted base-branch event, so GitHub passes secrets + vars (unlike a
# fork's `pull_request: closed`).
#
# v0.4.0: products are DISCOVERED from Config/products/<id>.json (self-contained
# per-product files, each with an inline changelog). Every product is
# INDEPENDENT and beta is CHANGELOG-DRIVEN: `products.py plan-beta` cuts a
# product's next beta ONLY when its version is unreleased AND its own file
# changed since its last beta. Each cut product builds, publishes under its own
# s3-subpath, and pushes its OWN `<id>-v<ver>-beta.N` tag + pre-release.
#
# Strict fail-safe publish order (in publish-beta), across the cutting set:
#   1. altool → ASC for every store product           ← GATE 1
#   2. S3 upload of DMG/ZIP for every direct product   (silent)
#   3. Beta appcast update for every appcast product   ← MAKES BETA VISIBLE
#   4. Per product: push <id>-v<ver>-beta.N tag + a pre-release (assets attached)
#
# `[skip ci]` in a commit message skips the run entirely (GitHub-native).
#
# Per-app shell (trigger-only):
#
#   on:
#     push:
#       branches: [main]
#   jobs:
#     beta:
#       uses: LeanBytes/workflows-macos/.github/workflows/distribute-beta.yml@v0.4.7
#       secrets:
#         # …
# ─────────────────────────────────────────────────────────────────────────────
name: distribute-beta

on:
  workflow_call:
    inputs:
      products-dir:
        description: "Directory of per-product Config/products/<id>.json files."
        type: string
        default: "Config/products"
      build-direct:
        description: "Default build-direct for product files that omit it."
        type: boolean
        default: true
      build-app-store:
        description: "Default build-app-store for product files that omit it."
        type: boolean
        default: false
      distribute-app-store:
        description: "Default distribute-app-store (altool → TestFlight) for files that omit it."
        type: boolean
        default: false
      distribute-beta-appcast:
        description: "Default distribute-appcast (Sparkle beta channel) for files that omit it."
        type: boolean
        default: false
      use-tuist:
        type: boolean
        default: false
      pre-build-cache-path:
        type: string
        default: ""
      pre-build-cache-key:
        type: string
        default: ""
      pre-build-script:
        type: string
        default: ""
      has-finder-extension:
        description: "Default has-finder for product files that omit it."
        type: boolean
        default: false
      has-quicklook-extension:
        description: "Default has-quicklook for product files that omit it."
        type: boolean
        default: false
      extra-xcodebuild-args:
        type: string
        default: ""
      runs-on-build:
        type: string
        default: '["self-hosted","macOS"]'
      runs-on-publish:
        description: "Publish job needs macOS for altool + Sparkle generate_appcast"
        type: string
        default: '["self-hosted","macOS"]'
      lfs:
        description: "Pull the caller repo's git LFS files on checkout. Off by default."
        type: boolean
        default: false
      artifact-retention-days:
        description: "Days to keep uploaded build/test artifacts (default 7). They're consumed within the run, so this is mostly for post-hoc debugging — raise it per app if you need longer."
        type: number
        default: 7
      appcast-filename:
        description: "Default appcast XML filename for files that omit it."
        type: string
        default: "appcast.xml"
      appcast-seed-path:
        description: "Default seed appcast.xml path for files that omit it."
        type: string
        default: "Config/appcast.xml"
      configuration-direct:
        description: "Xcode build configuration for the Direct archive. Default 'Release'."
        type: string
        default: "Release"
      configuration-app-store:
        description: "Xcode build configuration for the App Store archive. Default 'Release'."
        type: string
        default: "Release"
      attach-release-assets:
        description: "Attach the DMG/ZIP to the GitHub pre-release. Default true. Set false to save GitHub storage/bandwidth — the DMG/ZIP still upload to S3 (the real distribution) and the appcast points there; only the redundant GitHub copy is skipped. Notes + tag are still created."
        type: boolean
        default: true

      # ── Tests (opt-in) — gate the beta on the app's Swift tests ────────────
      run-tests:
        description: "Run tests before building; if they fail, no beta is published and a Jira ticket is filed."
        type: boolean
        default: false
      test-runner:
        description: "xcodebuild | swift | both."
        type: string
        default: "xcodebuild"
      test-scheme:
        description: "Scheme for xcodebuild tests. Defaults to the first discovered product's scheme."
        type: string
        default: ""
      test-plan:
        type: string
        default: ""
      xcodebuild-test-args:
        type: string
        default: ""
      app-name:
        description: "App name for tests. Defaults to the first discovered product's product-name."
        type: string
        default: ""
      swift-package-path:
        type: string
        default: "."
      swift-test-filter:
        type: string
        default: ""
      coverage-min:
        type: string
        default: ""
    secrets:
      DEVELOPER_ID_P12_BASE64:        { required: false }
      DEVELOPER_ID_PASSWORD:          { required: false }
      KEYCHAIN_PASSWORD:              { required: false }
      PROV_PROF_DEVID_BASE64:         { required: false }
      PROV_PROF_DEVID_FINDER_BASE64:  { required: false }
      PROV_PROF_DEVID_QL_BASE64:      { required: false }
      # Per-product profiles: a product file names the secret via
      # devid-profile-secret / store-profile-secret; unset → the main one.
      PROV_PROF_DEVID_PRO_BASE64:     { required: false }
      PROV_PROF_STORE_PRO_BASE64:     { required: false }
      # Per-product Developer ID CERTIFICATE (p12 + password). A product names
      # them via devid-cert-secret / devid-cert-password-secret; unset falls back
      # to DEVELOPER_ID_P12_BASE64 / DEVELOPER_ID_PASSWORD. Use when a product
      # signs under a different team (e.g. an app kept its legacy Developer ID
      # after an account transfer). Add more alternates as needed.
      DEVELOPER_ID_P12_ALT_BASE64:    { required: false }
      DEVELOPER_ID_PASSWORD_ALT:      { required: false }
      APPLE_DISTR_P12_BASE64:         { required: false }
      APPLE_DISTR_PASSWORD:           { required: false }
      MAC_DISTR_P12_BASE64:           { required: false }
      MAC_DISTR_PASSWORD:             { required: false }
      PROV_PROF_STORE_BASE64:         { required: false }
      PROV_PROF_STORE_FINDER_BASE64:  { required: false }
      PROV_PROF_STORE_QL_BASE64:      { required: false }
      ASC_KEY_ID:                     { required: false }
      ASC_ISSUER_ID:                  { required: false }
      ASC_KEY_BASE64:                 { required: false }
      AWS_ACCESS_KEY_ID:              { required: false }
      AWS_SECRET_ACCESS_KEY:          { required: false }
      SPARKLE_ED_PRIVATE_KEY:         { required: false }
      JIRA_API_TOKEN:                 { required: false }
      SHARED_WORKFLOWS_TOKEN:         { required: false }

permissions:
  contents: write          # create per-product pre-releases + push beta tags

# Serialize beta runs across the repo so two pushes can't race on a product's
# beta counter. Repo-wide covers every product's disjoint tag namespace.
concurrency:
  group: distribute-beta-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: [self-hosted, macOS]
    timeout-minutes: 5
    outputs:
      products: ${{ steps.plan.outputs.beta-products }}
      direct-products: ${{ steps.plan.outputs.direct-products }}
      store-products: ${{ steps.plan.outputs.store-products }}
      has-direct: ${{ steps.plan.outputs.has-direct }}
      has-store: ${{ steps.plan.outputs.has-store }}
      has-appcast: ${{ steps.plan.outputs.has-appcast }}
      has-any: ${{ steps.plan.outputs.has-any }}
      build-number: ${{ steps.plan.outputs.build-number }}
      test-scheme: ${{ steps.plan.outputs.test-scheme }}
      test-app-name: ${{ steps.plan.outputs.test-app-name }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0       # full history + tags for the changelog-diff
          fetch-tags: true

      - name: Checkout shared scripts
        uses: actions/checkout@v6
        with:
          repository: LeanBytes/workflows-macos
          ref: ${{ github.job_workflow_sha }}
          path: .shared-ci
          token: ${{ secrets.SHARED_WORKFLOWS_TOKEN || github.token }}

      - name: Plan betas (changelog-driven cutting set)
        id: plan
        env:
          PRODUCTS_DIR: ${{ inputs.products-dir }}
          DEF_BUILD_DIRECT: ${{ inputs.build-direct }}
          DEF_BUILD_STORE: ${{ inputs.build-app-store }}
          DEF_DIST_STORE: ${{ inputs.distribute-app-store }}
          DEF_DIST_APPCAST: ${{ inputs.distribute-beta-appcast }}
          DEF_HAS_FINDER: ${{ inputs.has-finder-extension }}
          DEF_HAS_QL: ${{ inputs.has-quicklook-extension }}
          DEF_APPCAST_FILENAME: ${{ inputs.appcast-filename }}
          DEF_APPCAST_SEED: ${{ inputs.appcast-seed-path }}
        run: python3 .shared-ci/.github/scripts/products.py plan-beta >> "$GITHUB_OUTPUT"

      - name: Show cutting set
        run: |
          echo "has-any = ${{ steps.plan.outputs.has-any }}"
          echo '${{ steps.plan.outputs.products }}' | python3 -m json.tool || echo "(empty)"

  # ── Tests (opt-in) — gate before build/publish ───────────────────────────
  test:
    if: inputs.run-tests
    needs: prepare
    uses: LeanBytes/workflows-macos/.github/workflows/_test.yml@v0.4.7
    with:
      test-runner: ${{ inputs.test-runner }}
      runs-on: ${{ inputs.runs-on-build }}
      lfs: ${{ inputs.lfs }}
      artifact-retention-days: ${{ inputs.artifact-retention-days }}
      test-scheme: ${{ inputs.test-scheme != '' && inputs.test-scheme || needs.prepare.outputs.test-scheme }}
      test-plan: ${{ inputs.test-plan }}
      use-tuist: ${{ inputs.use-tuist }}
      xcodebuild-test-args: ${{ inputs.xcodebuild-test-args }}
      app-name: ${{ inputs.app-name != '' && inputs.app-name || needs.prepare.outputs.test-app-name }}
      swift-package-path: ${{ inputs.swift-package-path }}
      swift-test-filter: ${{ inputs.swift-test-filter }}
      coverage-min: ${{ inputs.coverage-min }}
      pre-build-cache-path: ${{ inputs.pre-build-cache-path }}
      pre-build-cache-key: ${{ inputs.pre-build-cache-key }}
      pre-build-script: ${{ inputs.pre-build-script }}
      file-jira-on-failure: true
      gate-on-new-commit: false
    secrets:
      JIRA_API_TOKEN:         ${{ secrets.JIRA_API_TOKEN }}
      SHARED_WORKFLOWS_TOKEN: ${{ secrets.SHARED_WORKFLOWS_TOKEN }}

  build-direct:
    if: ${{ always() && needs.prepare.result == 'success' && needs.test.result != 'failure' && needs.prepare.outputs.has-direct == 'true' }}
    needs: [prepare, test]
    strategy:
      fail-fast: false
      matrix:
        product: ${{ fromJSON(needs.prepare.outputs.direct-products) }}
    uses: LeanBytes/workflows-macos/.github/workflows/_build-direct.yml@v0.4.7
    with:
      version: ${{ matrix.product.marketing-direct }}         # per product, e.g. "2.14.0-beta.5"
      build-number: ${{ needs.prepare.outputs.build-number }}
      artifact-label: ${{ matrix.product.artifact-label }}
      artifact-name: direct-build-${{ matrix.product.id }}
      scheme-name: ${{ matrix.product.scheme }}
      bundle-id: ${{ matrix.product.bundle-id }}
      product-name: ${{ matrix.product.product-name }}
      bundle-id-finder: ${{ matrix.product.bundle-id-finder }}
      bundle-id-quicklook: ${{ matrix.product.bundle-id-quicklook }}
      has-finder-extension: ${{ matrix.product.has-finder }}
      has-quicklook-extension: ${{ matrix.product.has-quicklook }}
      use-tuist: ${{ inputs.use-tuist }}
      pre-build-cache-path: ${{ inputs.pre-build-cache-path }}
      pre-build-cache-key: ${{ inputs.pre-build-cache-key }}
      pre-build-script: ${{ inputs.pre-build-script }}
      runs-on: ${{ inputs.runs-on-build }}
      extra-xcodebuild-args: ${{ inputs.extra-xcodebuild-args }}
      configuration: ${{ inputs.configuration-direct }}
      lfs: ${{ inputs.lfs }}
      artifact-retention-days: ${{ inputs.artifact-retention-days }}
    secrets:
      DEVELOPER_ID_P12_BASE64:        ${{ matrix.product.devid-cert-secret != '' && secrets[matrix.product.devid-cert-secret] || secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_PASSWORD:          ${{ matrix.product.devid-cert-password-secret != '' && secrets[matrix.product.devid-cert-password-secret] || secrets.DEVELOPER_ID_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_DEVID_BASE64:         ${{ matrix.product.devid-profile-secret != '' && secrets[matrix.product.devid-profile-secret] || secrets.PROV_PROF_DEVID_BASE64 }}
      PROV_PROF_DEVID_FINDER_BASE64:  ${{ secrets.PROV_PROF_DEVID_FINDER_BASE64 }}
      PROV_PROF_DEVID_QL_BASE64:      ${{ secrets.PROV_PROF_DEVID_QL_BASE64 }}
      ASC_KEY_ID:                     ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID:                  ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_BASE64:                 ${{ secrets.ASC_KEY_BASE64 }}
      SHARED_WORKFLOWS_TOKEN:         ${{ secrets.SHARED_WORKFLOWS_TOKEN }}

  build-app-store:
    if: ${{ always() && needs.prepare.result == 'success' && needs.test.result != 'failure' && needs.prepare.outputs.has-store == 'true' }}
    needs: [prepare, test]
    strategy:
      fail-fast: false
      matrix:
        product: ${{ fromJSON(needs.prepare.outputs.store-products) }}
    uses: LeanBytes/workflows-macos/.github/workflows/_build-app-store.yml@v0.4.7
    with:
      version: ${{ matrix.product.marketing-store }}          # clean version (Apple rejects suffixes)
      build-number: ${{ needs.prepare.outputs.build-number }}
      artifact-label: ${{ matrix.product.artifact-label }}
      artifact-name: app-store-build-${{ matrix.product.id }}
      scheme-name-store: ${{ matrix.product.scheme-store }}
      bundle-id: ${{ matrix.product.bundle-id }}
      bundle-id-store: ${{ matrix.product.bundle-id-store }}
      bundle-id-finder: ${{ matrix.product.bundle-id-finder }}
      bundle-id-finder-store: ${{ matrix.product.bundle-id-finder-store }}
      bundle-id-quicklook: ${{ matrix.product.bundle-id-quicklook }}
      bundle-id-quicklook-store: ${{ matrix.product.bundle-id-quicklook-store }}
      has-finder-extension: ${{ matrix.product.has-finder }}
      has-quicklook-extension: ${{ matrix.product.has-quicklook }}
      use-tuist: ${{ inputs.use-tuist }}
      runs-on: ${{ inputs.runs-on-build }}
      extra-xcodebuild-args: ${{ inputs.extra-xcodebuild-args }}
      configuration: ${{ inputs.configuration-app-store }}
      lfs: ${{ inputs.lfs }}
      artifact-retention-days: ${{ inputs.artifact-retention-days }}
    secrets:
      APPLE_DISTR_P12_BASE64:         ${{ secrets.APPLE_DISTR_P12_BASE64 }}
      APPLE_DISTR_PASSWORD:           ${{ secrets.APPLE_DISTR_PASSWORD }}
      MAC_DISTR_P12_BASE64:           ${{ secrets.MAC_DISTR_P12_BASE64 }}
      MAC_DISTR_PASSWORD:             ${{ secrets.MAC_DISTR_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_STORE_BASE64:         ${{ matrix.product.store-profile-secret != '' && secrets[matrix.product.store-profile-secret] || secrets.PROV_PROF_STORE_BASE64 }}
      PROV_PROF_STORE_FINDER_BASE64:  ${{ secrets.PROV_PROF_STORE_FINDER_BASE64 }}
      PROV_PROF_STORE_QL_BASE64:      ${{ secrets.PROV_PROF_STORE_QL_BASE64 }}

  publish-beta:
    needs: [prepare, test, build-direct, build-app-store]
    if: |
      always() &&
      needs.test.result != 'failure' &&
      needs.build-direct.result != 'failure' &&
      needs.build-app-store.result != 'failure' &&
      (needs.build-direct.result == 'success' || needs.build-app-store.result == 'success')
    runs-on: ${{ fromJSON(inputs.runs-on-publish) }}
    timeout-minutes: 30
    env:
      BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}
      PRODUCTS_JSON: ${{ needs.prepare.outputs.products }}
      PRODUCTS_DIR: ${{ inputs.products-dir }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      ATTACH_ASSETS: ${{ inputs.attach-release-assets }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout shared scripts
        uses: actions/checkout@v6
        with:
          repository: LeanBytes/workflows-macos
          ref: ${{ github.job_workflow_sha }}
          path: .shared-ci
          token: ${{ secrets.SHARED_WORKFLOWS_TOKEN || github.token }}

      - name: Download direct-build artifacts
        if: needs.build-direct.result == 'success'
        uses: actions/download-artifact@v8
        with:
          pattern: direct-build-*
          path: ./artifacts/direct

      - name: Download app-store-build artifacts
        if: needs.build-app-store.result == 'success'
        uses: actions/download-artifact@v8
        with:
          pattern: app-store-build-*
          path: ./artifacts/app-store

      # Expand the cutting set into a \x1f-delimited table (NOT tab — tab is
      # IFS-whitespace and `read` would collapse an empty s3-subpath, shifting
      # every later column). Read: id pname sub afile aseed bd bas das dap ver mkt label rtag
      - name: Expand products
        shell: bash
        run: |
          set -euo pipefail
          python3 - "$PRODUCTS_JSON" > /tmp/products.tsv <<'PY'
          import json, sys
          fields = ["id","product-name","s3-subpath","appcast-filename","appcast-seed-path",
                    "build-direct","build-app-store","distribute-app-store","distribute-appcast",
                    "version","marketing-direct","artifact-label","release-tag"]
          for p in json.loads(sys.argv[1]):
              print("\x1f".join(str(p.get(k, "")) for k in fields))
          PY
          echo "Cutting set:"; tr '\037' '\t' < /tmp/products.tsv

      - name: Normalize artifact layout
        shell: bash
        run: |
          set -euo pipefail
          # actions/download-artifact extracts a LONE matched artifact flat into
          # the base path (no per-artifact subdir); multiple matches DO get subdirs
          # (merge-multiple defaults false). Re-nest a flattened artifact so the
          # per-product globs below can always assume artifacts/<chan>/<name>/ —
          # otherwise a single-product beta finds "No .pkg / no DMG".
          while IFS=$'\x1f' read -r id _; do
            for pair in "direct:direct-build" "app-store:app-store-build"; do
              chan="${pair%%:*}"; pre="${pair##*:}"
              base="./artifacts/$chan"; want="$base/$pre-$id"
              if [ -d "$base" ] && [ ! -d "$want" ] && [ -n "$(find "$base" -maxdepth 1 -type f 2>/dev/null)" ]; then
                mkdir -p "$want"
                find "$base" -maxdepth 1 -type f -exec mv {} "$want"/ \;
                echo "re-nested flattened $chan artifact → $want/"
              fi
            done
          done < /tmp/products.tsv

      # ── GATE 1: TestFlight upload (every store product) ───────────────────
      - name: Install App Store Connect API key (for altool)
        if: needs.build-app-store.result == 'success'
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Upload to TestFlight (per product)
        if: needs.build-app-store.result == 'success'
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -uo pipefail
          while IFS=$'\x1f' read -r id pname sub afile aseed bd bas das dap ver mkt label rtag; do
            { [ "$bas" = "True" ] && [ "$das" = "True" ]; } || continue
            echo "::group::TestFlight upload — product=$id"
            PKG=$(ls ./artifacts/app-store/app-store-build-$id/*.pkg 2>/dev/null | head -1 || true)
            if [ -z "$PKG" ] || [ ! -f "$PKG" ]; then
              echo "::error::No .pkg for product $id"; echo "::endgroup::"; exit 1
            fi
            set +e
            OUTPUT=$(xcrun altool --upload-app --type macos --file "$PKG" \
              --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" 2>&1)
            RC=$?
            set -e
            echo "$OUTPUT"
            if grep -qE "UPLOAD SUCCEEDED|No errors uploading" <<<"$OUTPUT"; then
              echo "TestFlight upload accepted for $id"; echo "::endgroup::"; continue
            fi
            if grep -qiE "already been (used|uploaded)|redundant binary upload|ITMS-90189" <<<"$OUTPUT"; then
              echo "Build for $id already present — treating as success."; echo "::endgroup::"; continue
            fi
            echo "::error::altool failed for $id (exit ${RC})"; echo "::endgroup::"; exit 1
          done < /tmp/products.tsv

      # ── Release notes: each product's own inline changelog (versions[0]) ──
      - name: Read release notes (per product)
        shell: bash
        run: |
          set -euo pipefail
          while IFS=$'\x1f' read -r id pname sub afile aseed bd bas das dap ver mkt label rtag; do
            CHANGELOG_PATH="${PRODUCTS_DIR}/$id.json" VERSION="NEXT" \
              .shared-ci/.github/scripts/changelog-from-json.sh > "/tmp/notes-$id.md" || true
          done < /tmp/products.tsv

      # ── S3 upload of DMG/ZIP (still silent — appcast hasn't moved yet) ────
      - name: Install AWS CLI
        if: needs.build-direct.result == 'success'
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws &>/dev/null; then
            curl "https://awscli.amazonaws.com/AWSCLIV2.pkg" -o /tmp/AWSCLIV2.pkg
            sudo installer -pkg /tmp/AWSCLIV2.pkg -target /
            rm -f /tmp/AWSCLIV2.pkg
          fi
          aws --version

      - name: Upload DMG + ZIP to S3 (per product)
        if: needs.build-direct.result == 'success'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
        run: |
          set -euo pipefail
          while IFS=$'\x1f' read -r id pname sub afile aseed bd bas das dap ver mkt label rtag; do
            [ "$bd" = "True" ] || continue
            echo "::group::S3 upload — product=$id"
            DEST="${S3_DISTRIBUTION_PATH}${sub:+/$sub}"
            for f in ./artifacts/direct/direct-build-$id/*.dmg ./artifacts/direct/direct-build-$id/*.zip; do
              [ -e "$f" ] || continue
              aws s3 cp "$f" "${DEST}/$(basename "$f")"
              echo "Uploaded $(basename "$f") → ${DEST}/"
            done
            echo "::endgroup::"
          done < /tmp/products.tsv

      # ── GATE 2: Beta appcast update (per product) ─────────────────────────
      - name: Download Sparkle
        if: needs.prepare.outputs.has-appcast == 'true'
        shell: bash
        run: |
          set -euo pipefail
          SPARKLE_TAG=$(gh api /repos/sparkle-project/Sparkle/releases/latest --jq '.tag_name')
          echo "Sparkle version: ${SPARKLE_TAG}"
          curl -fL -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TAG}/Sparkle-${SPARKLE_TAG}.tar.xz"
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          chmod +x /tmp/sparkle/bin/generate_appcast

      - name: Update Sparkle beta appcast (per product)
        if: needs.prepare.outputs.has-appcast == 'true'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          while IFS=$'\x1f' read -r id pname sub afile aseed bd bas das dap ver mkt label rtag; do
            { [ "$bd" = "True" ] && [ "$dap" = "True" ]; } || continue
            echo "::group::Beta appcast — product=$id"
            WORK="/tmp/appcast-$id"
            rm -rf "$WORK"; mkdir -p "$WORK"   # LB-459: start clean (persistent self-hosted /tmp)
            cp ./artifacts/direct/direct-build-$id/*.zip "$WORK"/
            DEST="${S3_DISTRIBUTION_PATH}${sub:+/$sub}"
            if aws s3 cp "${DEST}/${afile}" "${WORK}/${afile}"; then
              echo "Downloaded existing ${afile}"
            else
              echo "No ${afile} on S3, seeding from ${aseed}"
              cp "${aseed}" "${WORK}/${afile}"
            fi
            echo "$SPARKLE_ED_PRIVATE_KEY" | /tmp/sparkle/bin/generate_appcast --ed-key-file - --channel beta "${WORK}/"
            # Match by build number — beta items repeat marketing version across merges.
            NOTES=""
            [ -f "/tmp/notes-$id.md" ] && NOTES=$(cat "/tmp/notes-$id.md")
            VERSION="$BUILD_NUMBER" NOTES="$NOTES" APPCAST_PATH="${WORK}/${afile}" \
              .shared-ci/.github/scripts/update-appcast.sh
            aws s3 cp "${WORK}/${afile}" "${DEST}/${afile}" --content-type "application/xml"
            echo "Uploaded ${afile} → ${DEST}/ (beta live for $id)"
            echo "::endgroup::"
          done < /tmp/products.tsv

      # ── Per product: push its own beta tag + pre-release (+ its assets) ───
      - name: Push beta tag + create pre-release (per product)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          while IFS=$'\x1f' read -r id pname sub afile aseed bd bas das dap ver mkt label rtag; do
            echo "::group::publish $id → $rtag"
            if git rev-parse "refs/tags/$rtag" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "$rtag" >/dev/null 2>&1; then
              echo "tag $rtag already exists — skipping (idempotent re-run)"; echo "::endgroup::"; continue
            fi
            git tag -a "$rtag" -m "Beta $rtag"
            git push origin "$rtag"
            NOTES_ARG=(--notes "Beta $rtag ($pname $mkt)")
            if [ -f "/tmp/notes-$id.md" ] && [ -s "/tmp/notes-$id.md" ]; then
              NOTES_ARG=(--notes-file "/tmp/notes-$id.md")
            fi
            gh release create "$rtag" --repo "$REPO" --title "$rtag" --prerelease "${NOTES_ARG[@]}"
            if [ "$bd" = "True" ] && [ "$ATTACH_ASSETS" = "true" ]; then
              shopt -s nullglob
              ASSETS=( ./artifacts/direct/direct-build-$id/*.dmg ./artifacts/direct/direct-build-$id/*.zip )
              shopt -u nullglob
              [ ${#ASSETS[@]} -gt 0 ] && gh release upload "$rtag" --repo "$REPO" --clobber "${ASSETS[@]}"
            fi
            echo "pushed $rtag + pre-release ✅"; echo "::endgroup::"
          done < /tmp/products.tsv

      # ── Run summary ────────────────────────────────────────────────────────
      - name: Write beta summary
        shell: bash
        env:
          S3_DOWNLOAD_URL: ${{ vars.S3_DOWNLOAD_URL }}
        run: |
          set -euo pipefail
          {
            echo "## Betas cut ✅  (build \`${BUILD_NUMBER}\`)"
            echo
            echo "| Product | Tag | Download |"
            echo "|---|---|---|"
            while IFS=$'\x1f' read -r id pname sub afile aseed bd bas das dap ver mkt label rtag; do
              BASE="${S3_DOWNLOAD_URL}${sub:+/$sub}"
              if [ "$bd" = "True" ]; then
                echo "| ${pname} | \`${rtag}\` | [DMG](${BASE}/${pname}_${label}.dmg) · [ZIP](${BASE}/${pname}_${label}.zip) |"
              else
                echo "| ${pname} | \`${rtag}\` | (App Store) |"
              fi
            done < /tmp/products.tsv
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf /tmp/sparkle /tmp/sparkle.tar.xz /tmp/appcast-* /tmp/notes-*.md /tmp/products.tsv
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8
