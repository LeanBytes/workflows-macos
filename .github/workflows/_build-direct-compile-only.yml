# ── Internal Build Callee — Compile-Only ─────────────────────────────────────
# Compiles the Direct scheme without signing, archiving, notarizing, packaging,
# or uploading anything. Intended for fork-PR builds where the caller
# (distribute-pr.yml) has no access to signing secrets — GitHub strips secrets
# from `pull_request` workflows triggered from forks.
#
# Verifies "does the contributor's change compile?" and nothing more. No
# secrets, no S3, no artifacts.
#
# Underscore prefix marks this as an internal callee — per-app shells should
# not call this directly. distribute-pr.yml routes here automatically when
# the PR's head repo isn't the same as the workflow repo.
# ─────────────────────────────────────────────────────────────────────────────
name: _build-direct-compile-only

on:
  workflow_call:
    inputs:
      runs-on:
        description: "JSON-encoded runner label or array (e.g. '\"macos-26\"')"
        type: string
        default: '"macos-26"'

      use-tuist:
        description: "Project is generated by Tuist (runs tuist install + generate before build)"
        type: boolean
        default: false

      pre-build-cache-path:
        description: "Path to cache via actions/cache@v5. Empty = no cache."
        type: string
        default: ""
      pre-build-cache-key:
        description: "Cache key. Required when pre-build-cache-path is set."
        type: string
        default: ""
      pre-build-script:
        description: "Path of a bash script to run before the compile step."
        type: string
        default: ""

      configuration:
        description: "Xcode build configuration to compile. Default 'Release'."
        type: string
        default: "Release"

      extra-xcodebuild-args:
        description: "Additional xcodebuild settings appended to the build command."
        type: string
        default: ""

    # No secrets declared — this callee is invoked from fork-PR workflows where
    # secrets are stripped by GitHub anyway. Declaring `required: true` would
    # make the workflow fail to start; declaring `required: false` is misleading
    # because nothing here uses them. Cleanest is to declare none.

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      # ── Tuist (opt-in) ─────────────────────────────────────────────────────
      - name: Install Tuist
        if: inputs.use-tuist
        shell: bash
        run: |
          brew tap tuist/tuist
          brew install --formula tuist

      - name: Fetch Swift package dependencies (Tuist)
        if: inputs.use-tuist
        shell: bash
        run: tuist install

      - name: Generate Xcode project (Tuist)
        if: inputs.use-tuist
        shell: bash
        run: tuist generate --no-open

      # ── SwiftPM (when not Tuist) ───────────────────────────────────────────
      - name: Resolve Swift package dependencies
        if: ${{ !inputs.use-tuist }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -scheme "${{ vars.SCHEME_NAME }}" \
            -configuration "${{ inputs.configuration }}"

      # ── Pre-build hooks (caller-provided) ──────────────────────────────────
      - name: Pre-build cache
        if: inputs.pre-build-cache-path != ''
        uses: actions/cache@v5
        with:
          path: ${{ inputs.pre-build-cache-path }}
          key: ${{ inputs.pre-build-cache-key }}

      - name: Pre-build script
        if: inputs.pre-build-script != ''
        shell: bash
        run: bash "${{ inputs.pre-build-script }}"

      # ── Compile (no signing) ───────────────────────────────────────────────
      # CODE_SIGNING_ALLOWED=NO + CODE_SIGNING_REQUIRED=NO let xcodebuild
      # compile without selecting any identity / provisioning profile, which
      # is exactly what fork PRs need: secrets aren't available, so signing
      # would fail anyway.
      - name: Compile-only build
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild build \
            -scheme "${{ vars.SCHEME_NAME }}" \
            -configuration "${{ inputs.configuration }}" \
            -destination "generic/platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            ${{ inputs.extra-xcodebuild-args }}
