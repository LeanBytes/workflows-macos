# ── Snapshot Distribution ────────────────────────────────────────────────────
# Triggered when a PR is merged into main.
# Builds a snapshot, uploads to S3, publishes to the Sparkle BETA appcast
# channel, and comments on the PR with download links.
# ─────────────────────────────────────────────────────────────────────────────
name: Distribute Snapshot

on:
  pull_request:
    types: [closed]
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Determine version info and call the reusable build workflow ────────────
  prepare:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, agent-alex]
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      build-number: ${{ steps.version.outputs.build-number }}
      artifact-label: ${{ steps.version.outputs.artifact-label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # actions/checkout defaults to a shallow clone (depth 1) and
          # does not fetch tags. version-derive.sh runs `git describe
          # --tags` to derive the marketing version from the latest
          # stable tag, which needs both the tag refs and the commit
          # history back to that tag — so fetch everything.
          fetch-depth: 0

      - name: Determine version info
        id: version
        shell: bash
        run: |
          set -euo pipefail

          # Timestamp-based build number in UTC (always increasing)
          BUILD_NUMBER=$(date -u +%y%m%d%H%M%S)

          # Marketing version from `git describe --tags --long` — uniquely
          # identifies each snapshot (LB-402: no more xcconfig bumps).
          VERSION=$(.github/scripts/version-derive.sh snapshot)

          ARTIFACT_LABEL="v${VERSION}-beta-${BUILD_NUMBER}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build-number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "artifact-label=${ARTIFACT_LABEL}" >> $GITHUB_OUTPUT

          echo "Snapshot build"
          echo "  Marketing version: ${VERSION} (from git describe)"
          echo "  Build number:      ${BUILD_NUMBER}"
          echo "  Artifact label:    ${ARTIFACT_LABEL}"

  build:
    needs: prepare
    uses: ./.github/workflows/distribute-build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      build-number: ${{ needs.prepare.outputs.build-number }}
      artifact-label: ${{ needs.prepare.outputs.artifact-label }}
      runs-on: '["self-hosted","agent-alex"]'
    secrets: inherit

  # ── Update Sparkle appcast.xml on the BETA channel ─────────────────────────
  # Mirrors distribute-release.yml's update-appcast job, but:
  #   * generate_appcast --channel beta tags the new item with
  #     <sparkle:channel>beta</sparkle:channel> so only users with
  #     "Include Beta updates" on see it.
  #   * NOTES is the merged PR's title (the natural source for "what
  #     changed" on a per-PR build).
  #   * VERSION passed to update-appcast.sh is the BUILD_NUMBER. Each
  #     snapshot now has a unique MARKETING_VERSION (LB-402, derived from
  #     `git describe`), but the build number remains the simplest stable
  #     key for finding the just-added appcast item, so we keep it.
  update-appcast:
    needs: [prepare, build]
    if: github.event.pull_request.merged == true
    runs-on: [self-hosted, agent-alex]
    timeout-minutes: 15
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      BUILD_NUMBER: ${{ needs.prepare.outputs.build-number }}
      ARTIFACT_LABEL: ${{ needs.prepare.outputs.artifact-label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # actions/checkout defaults to a shallow clone (depth 1) and
          # does not fetch tags. generate-changelog.sh runs `git describe
          # --tags` to find the prior stable tag and walks the commit
          # range from there to HEAD, so it needs the full history.
          fetch-depth: 0

      - name: Install AWS CLI
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws &>/dev/null; then
            echo "AWS CLI not found — installing"
            curl "https://awscli.amazonaws.com/AWSCLIV2.pkg" -o /tmp/AWSCLIV2.pkg
            sudo installer -pkg /tmp/AWSCLIV2.pkg -target /
            rm -f /tmp/AWSCLIV2.pkg
          fi
          aws --version

      - name: Download Sparkle
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          SPARKLE_TAG="$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "User-Agent: github-actions" \
              https://api.github.com/repos/sparkle-project/Sparkle/releases/latest \
            | python3 -c 'import sys, json; print(json.load(sys.stdin)["tag_name"])'
          )"

          echo "Sparkle version: ${SPARKLE_TAG}"

          curl -fL \
            -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TAG}/Sparkle-${SPARKLE_TAG}.tar.xz"

          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          chmod +x /tmp/sparkle/bin/generate_appcast

      - name: Prepare release directory
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/appcast-work

          ZIP_NAME="${{ vars.PRODUCT_NAME }}_${ARTIFACT_LABEL}.zip"
          aws s3 cp "${S3_DISTRIBUTION_PATH}/${ZIP_NAME}" "/tmp/appcast-work/${ZIP_NAME}"

          if aws s3 cp "${S3_DISTRIBUTION_PATH}/appcast.xml" /tmp/appcast-work/appcast.xml; then
            echo "Downloaded existing appcast.xml from S3"
          else
            echo "No appcast.xml on S3, using seed from repo"
            cp Config/appcast.xml /tmp/appcast-work/appcast.xml
          fi

          if aws s3 cp "${S3_DISTRIBUTION_PATH}/CHANGELOG.json" /tmp/appcast-work/CHANGELOG-existing.json; then
            echo "Downloaded existing CHANGELOG.json from S3"
          else
            echo "No CHANGELOG.json on S3, using seed from repo"
            cp Config/CHANGELOG.json /tmp/appcast-work/CHANGELOG-existing.json
          fi

      - name: Generate CHANGELOG.json (beta channel)
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/generate-changelog.sh

          IN_PATH=/tmp/appcast-work/CHANGELOG-existing.json \
          OUT_PATH=/tmp/appcast-work/CHANGELOG.json \
          VERSION="${VERSION}" \
          BUILD_NUMBER="${BUILD_NUMBER}" \
          CHANNEL="beta" \
          PRODUCT_NAME="${{ vars.PRODUCT_NAME }}" \
          PR_TITLE="${PR_TITLE}" \
          PR_NUMBER="${PR_NUMBER}" \
          .github/scripts/generate-changelog.sh

      - name: Enrich CHANGELOG.json with Jira titles (beta channel)
        shell: bash
        env:
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/enrich-changelog-with-jira.sh

          IN_PATH=/tmp/appcast-work/CHANGELOG.json \
          OUT_PATH=/tmp/appcast-work/CHANGELOG.json \
          .github/scripts/enrich-changelog-with-jira.sh

      - name: Run generate_appcast (beta channel)
        shell: bash
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          echo "$SPARKLE_ED_PRIVATE_KEY" | /tmp/sparkle/bin/generate_appcast \
            --ed-key-file - \
            --channel beta \
            /tmp/appcast-work/
          echo "generate_appcast completed"

      - name: Inject changelog and trim appcast
        shell: bash
        run: |
          set -euo pipefail
          chmod +x .github/scripts/update-appcast.sh

          # Latest version in CHANGELOG.json is this beta build (one PR).
          # Customer-facing format: just the (Jira-enriched) title — no PR
          # or Jira link. The metadata stays in CHANGELOG.json for tooling.
          NOTES=$(jq -r '
            if (.versions | length) == 0 then ""
            else
              .versions[0].entries
              | map("- " + .title)
              | join("\n")
            end
          ' /tmp/appcast-work/CHANGELOG.json)

          # Match the appcast item by build number — beta items share the
          # same sparkle:shortVersionString across PR merges.
          VERSION="${BUILD_NUMBER}" \
          NOTES="${NOTES}" \
          APPCAST_PATH=/tmp/appcast-work/appcast.xml \
          .github/scripts/update-appcast.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: changelog-and-appcast-snapshot
          path: |
            /tmp/appcast-work/appcast.xml
            /tmp/appcast-work/CHANGELOG.json

      - name: Upload appcast.xml and CHANGELOG.json to S3
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
        run: |
          set -euo pipefail
          aws s3 cp /tmp/appcast-work/appcast.xml "${S3_DISTRIBUTION_PATH}/appcast.xml" \
            --content-type "application/xml"
          aws s3 cp /tmp/appcast-work/CHANGELOG.json "${S3_DISTRIBUTION_PATH}/CHANGELOG.json" \
            --content-type "application/json"
          echo "Uploaded appcast.xml and CHANGELOG.json to ${S3_DISTRIBUTION_PATH}/"

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf /tmp/sparkle /tmp/sparkle.tar.xz /tmp/appcast-work

  # ── Comment on the merged PR with download links ──────────────────────────
  comment:
    needs: [prepare, build, update-appcast]
    if: github.event.pull_request.merged == true
    runs-on: [self-hosted, agent-alex]
    timeout-minutes: 5
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          ARTIFACT_LABEL: ${{ needs.prepare.outputs.artifact-label }}
          S3_DOWNLOAD_URL: ${{ vars.S3_DOWNLOAD_URL }}
        with:
          script: |
            const label = process.env.ARTIFACT_LABEL;
            const baseUrl = process.env.S3_DOWNLOAD_URL;
            const body = [
              `**Snapshot build ready** ✅`,
              ``,
              `Published to the **beta** appcast channel. Users with "Include Beta updates" on will be offered this build.`,
              ``,
              `| Artifact | Link |`,
              `|----------|------|`,
              `| DMG | [${{ vars.PRODUCT_NAME }}_${label}.dmg](${baseUrl}/${{ vars.PRODUCT_NAME }}_${label}.dmg) |`,
              `| ZIP | [${{ vars.PRODUCT_NAME }}_${label}.zip](${baseUrl}/${{ vars.PRODUCT_NAME }}_${label}.zip) |`,
              ``,
              `Version: \`${{ needs.prepare.outputs.version }}\` · Build: \`${{ needs.prepare.outputs.build-number }}\``,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
