# ── Reusable Build Workflow ──────────────────────────────────────────────────
# Shared build/sign/notarize/upload logic called by both snapshot and release
# caller workflows. Not triggered directly.
# ─────────────────────────────────────────────────────────────────────────────
name: Build & Distribute (macOS)

on:
  workflow_call:
    inputs:
      version:
        description: "Marketing version (CFBundleShortVersionString)"
        required: true
        type: string
      build-number:
        description: "Build number (CFBundleVersion), timestamp-based"
        required: true
        type: string
      artifact-label:
        description: "Label for artifact filenames (e.g. '1.3.0' or 'build-260406143022')"
        required: true
        type: string
      runs-on:
        description: "JSON-encoded runner label or label array (e.g. '\"macos-26\"' or '[\"self-hosted\",\"agent-alex\"]')"
        required: false
        type: string
        default: '"macos-26"'

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # ── Tuist ──────────────────────────────────────────────────────────────
      - name: Install Tuist
        shell: bash
        run: |
          brew tap tuist/tuist
          brew install --formula tuist

      - name: Fetch Swift package dependencies
        shell: bash
        run: tuist install

      - name: Generate Xcode project
        shell: bash
        run: tuist generate --no-open

      # ── Whisper base model ─────────────────────────────────────────────────
      - name: Cache Whisper base model
        uses: actions/cache@v4
        with:
          path: FlowMoose/Models/ggml-base.bin
          key: whisper-base-model-v1

      - name: Download Whisper base model
        shell: bash
        run: |
          set -euo pipefail
          SIZE=$(wc -c < FlowMoose/Models/ggml-base.bin 2>/dev/null || echo 0)
          if [ "$SIZE" -lt 100000000 ]; then
            echo "Downloading ggml-base.bin from HuggingFace..."
            curl -L "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin" \
              -o FlowMoose/Models/ggml-base.bin
          fi
          ls -lh FlowMoose/Models/ggml-base.bin

      # ── Keychain ───────────────────────────────────────────────────────────
      - name: Set up keychain
        shell: bash
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          echo "$DEVELOPER_ID_P12_BASE64" | base64 --decode > /tmp/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$DEVELOPER_ID_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" \
            build.keychain
          security list-keychains -d user -s build.keychain login.keychain

          rm /tmp/certificate.p12

      # ── Provisioning profiles ──────────────────────────────────────────────
      - name: Install provisioning profiles
        shell: bash
        env:
          DEVID_PROFILE_BASE64: ${{ secrets.PROV_PROF_DEVID_BASE64 }}
        run: |
          set -euo pipefail

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          echo "$DEVID_PROFILE_BASE64" | base64 --decode \
            > "$PROFILE_DIR/pp-devid.provisionprofile"

          PROFILE_NAME=$(security cms -D \
            -i "$PROFILE_DIR/pp-devid.provisionprofile" \
            | plutil -extract Name raw -)

          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV

          echo "Main profile: $PROFILE_NAME"

      # ── App Store Connect API key ──────────────────────────────────────────
      - name: Install App Store Connect API key
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      # ── Archive ────────────────────────────────────────────────────────────
      - name: Verify signing identity
        shell: bash
        run: security find-identity -v -p codesigning build.keychain

      - name: Archive
        shell: bash
        run: |
          set -euo pipefail

          # LB-370: BUILD_RELEASE_DATE is baked into the binary's
          # Info.plist so SubscriptionRequiredGate can detect when a
          # lapsed user has installed a newer DMG than their entitlement
          # covers. ISO 8601 UTC. Setting empty preserves the gate's
          # fail-safe (no banner if value is missing) for local Debug.
          BUILD_RELEASE_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "BUILD_RELEASE_DATE=$BUILD_RELEASE_DATE"

          # LB-446: signing settings live in Config/Release.xcconfig
          # (scoped to the FlowMoose project's Release config). The
          # synthetic SPM resource-bundle target
          # (KeyboardShortcuts_KeyboardShortcuts) is in a separate
          # Xcode project, doesn't inherit our xcconfig, and falls
          # back to Xcode's "Sign to Run Locally" ad-hoc default —
          # which is sealed into the host app's Developer ID
          # signature at archive time and notarizes correctly. The
          # only build settings passed here are the ones the workflow
          # genuinely needs to inject (versions + release date).
          xcodebuild archive \
            -scheme "${{ vars.SCHEME_NAME }}" \
            -configuration Release \
            -archivePath /tmp/build/app.xcarchive \
            -destination "generic/platform=macOS" \
            MARKETING_VERSION=${{ inputs.version }} \
            CURRENT_PROJECT_VERSION=${{ inputs.build-number }} \
            BUILD_RELEASE_DATE="$BUILD_RELEASE_DATE"

      # ── Export ─────────────────────────────────────────────────────────────
      - name: Export for direct distribution
        shell: bash
        run: |
          set -euo pipefail

          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ vars.BUNDLE_ID }}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath /tmp/build/app.xcarchive \
            -exportPath /tmp/build/export \
            -exportOptionsPlist /tmp/ExportOptions.plist

      # ── Notarize ───────────────────────────────────────────────────────────
      - name: Notarize
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail

          ditto -c -k --keepParent \
            "/tmp/build/export/${{ vars.PRODUCT_NAME }}.app" \
            /tmp/build/notarize.zip

          SUBMIT_OUTPUT=$(xcrun notarytool submit /tmp/build/notarize.zip \
            --key ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait 2>&1)

          echo "$SUBMIT_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep '^\s*id:' | head -1 | sed 's/.*id: //')

          STATUS=$(echo "$SUBMIT_OUTPUT" | grep '^\s*status:' | tail -1 | sed 's/.*status: //')

          if [[ "$STATUS" != "Accepted" ]]; then
            echo "Notarization failed with status: $STATUS — fetching rejection log"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
              --key-id "$ASC_KEY_ID" \
              --issuer "$ASC_ISSUER_ID" || true
            exit 1
          fi

          rm /tmp/build/notarize.zip

      # ── Staple ─────────────────────────────────────────────────────────────
      - name: Staple notarization ticket
        shell: bash
        run: |
          set -euo pipefail
          xcrun stapler staple "/tmp/build/export/${{ vars.PRODUCT_NAME }}.app"

      # ── Create DMG and ZIP ─────────────────────────────────────────────────
      - name: Create DMG and ZIP
        shell: bash
        run: |
          set -euo pipefail

          DMG_NAME="${{ vars.PRODUCT_NAME }}_${{ inputs.artifact-label }}.dmg"
          ZIP_NAME="${{ vars.PRODUCT_NAME }}_${{ inputs.artifact-label }}.zip"

          # Create DMG with app and Applications symlink
          mkdir -p /tmp/build/dmg
          cp -R "/tmp/build/export/${{ vars.PRODUCT_NAME }}.app" /tmp/build/dmg/
          ln -s /Applications /tmp/build/dmg/Applications

          hdiutil create \
            -volname "${{ vars.PRODUCT_NAME }}" \
            -srcfolder /tmp/build/dmg \
            -ov \
            -format UDZO \
            "/tmp/build/${DMG_NAME}"

          rm -rf /tmp/build/dmg

          # Create ZIP containing the app bundle
          ditto -c -k --keepParent \
            "/tmp/build/export/${{ vars.PRODUCT_NAME }}.app" \
            "/tmp/build/${ZIP_NAME}"

          echo "DMG_PATH=/tmp/build/${DMG_NAME}" >> $GITHUB_ENV
          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV
          echo "ZIP_PATH=/tmp/build/${ZIP_NAME}" >> $GITHUB_ENV
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      # ── Upload to S3 ──────────────────────────────────────────────────────
      - name: Install AWS CLI
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws &>/dev/null; then
            echo "AWS CLI not found — installing"
            curl "https://awscli.amazonaws.com/AWSCLIV2.pkg" -o /tmp/AWSCLIV2.pkg
            sudo installer -pkg /tmp/AWSCLIV2.pkg -target /
            rm -f /tmp/AWSCLIV2.pkg
          fi
          aws --version

      - name: Upload to S3
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"
          S3_DISTRIBUTION_PATH: ${{ vars.S3_DISTRIBUTION_PATH }}
        run: |
          set -euo pipefail

          aws s3 cp "$DMG_PATH" "${S3_DISTRIBUTION_PATH}/${DMG_NAME}"
          aws s3 cp "$ZIP_PATH" "${S3_DISTRIBUTION_PATH}/${ZIP_NAME}"

          echo "Uploaded ${DMG_NAME} to ${S3_DISTRIBUTION_PATH}/"
          echo "Uploaded ${ZIP_NAME} to ${S3_DISTRIBUTION_PATH}/"

      # ── Cleanup ────────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          security delete-keychain build.keychain || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/pp-devid.provisionprofile"
          rm -rf /tmp/build
          rm -f /tmp/ExportOptions.plist
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8
          security list-keychains -d user -s login.keychain
