# ── Per-app beta shell ───────────────────────────────────────────────────────
# Copy to .github/workflows/distribute-beta.yml. Fires on every push to main.
# The orchestrator discovers Config/products/<id>.json and cuts a beta for each
# product whose OWN changelog changed since its last beta (changelog-driven).
# Each product pushes its own <id>-v<ver>-beta.N tag + pre-release.
# ─────────────────────────────────────────────────────────────────────────────
name: Distribute Beta

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  beta:
    uses: LeanBytes/workflows-macos/.github/workflows/distribute-beta.yml@v0.4.6
    # `secrets: inherit` only works same-org; the explicit list works universally.
    secrets:
      DEVELOPER_ID_P12_BASE64:        ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_PASSWORD:          ${{ secrets.DEVELOPER_ID_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_DEVID_BASE64:         ${{ secrets.PROV_PROF_DEVID_BASE64 }}
      # Per-product profiles a product file names via devid/store-profile-secret:
      # PROV_PROF_DEVID_PRO_BASE64:   ${{ secrets.PROV_PROF_DEVID_PRO_BASE64 }}
      # PROV_PROF_STORE_PRO_BASE64:   ${{ secrets.PROV_PROF_STORE_PRO_BASE64 }}
      # APPLE_DISTR_P12_BASE64:       ${{ secrets.APPLE_DISTR_P12_BASE64 }}     # if any product builds App Store
      # APPLE_DISTR_PASSWORD:         ${{ secrets.APPLE_DISTR_PASSWORD }}
      # MAC_DISTR_P12_BASE64:         ${{ secrets.MAC_DISTR_P12_BASE64 }}
      # MAC_DISTR_PASSWORD:           ${{ secrets.MAC_DISTR_PASSWORD }}
      # PROV_PROF_STORE_BASE64:       ${{ secrets.PROV_PROF_STORE_BASE64 }}
      ASC_KEY_ID:                     ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID:                  ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_BASE64:                 ${{ secrets.ASC_KEY_BASE64 }}
      AWS_ACCESS_KEY_ID:              ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:          ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # SPARKLE_ED_PRIVATE_KEY:       ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}     # if any product distributes appcast
      # JIRA_API_TOKEN:               ${{ secrets.JIRA_API_TOKEN }}             # if run-tests
    # ── Channel defaults a product file inherits when it omits them ─────────
    # with:
    #   build-app-store: true            # default; a product file overrides per product
    #   distribute-app-store: true
    #   distribute-beta-appcast: true    # FlowMoose (Sparkle beta channel)
    #   use-tuist: true                  # FlowMoose
    #   lfs: true
    #   runs-on-build: '["self-hosted","agent-alex"]'
    #   runs-on-publish: '["self-hosted","agent-alex"]'
    #   run-tests: true                  # gate the beta on tests (files a Jira ticket on failure)
    #   attach-release-assets: false     # skip GitHub pre-release asset upload (S3 keeps the DMG/ZIP) — saves budget
    #   artifact-retention-days: 30      # keep uploaded build/test artifacts longer than the 7-day default
