# ── Per-app beta distribution shell ──────────────────────────────────────────
# Copy into each app repo at .github/workflows/distribute-beta.yml.
# Triggered when a PR is merged to main. The `if:` gate prevents firing on
# closed-but-unmerged PRs.
# ─────────────────────────────────────────────────────────────────────────────
name: Distribute Beta

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write          # for the GH pre-release
  pull-requests: write     # for the PR comment

jobs:
  beta:
    if: github.event.pull_request.merged == true
    uses: LeanBytes/workflows-macos/.github/workflows/distribute-beta.yml@v0.3.0
    secrets: inherit
    with:
      # ── Build toggles (default: build-direct=true, build-app-store=false) ─
      # build-direct: false             # only set if you want to skip Direct
      # build-app-store: true           # macpacker, filefillet

      # ── Distribute toggles (default: all false) ─────────────────────────
      # distribute-app-store: true      # macpacker, filefillet (altool → TestFlight)
      # distribute-beta-appcast: true   # FlowMoose (Sparkle beta channel)

      # ── Per-app build flags ─────────────────────────────────────────────
      # use-tuist: true                # FlowMoose
      # has-finder-extension: true     # macpacker
      # has-quicklook-extension: true  # macpacker
      # extra-xcodebuild-args: ""

      # ── Pre-build hooks (e.g. asset download) ──────────────────────────
      # Example: FlowMoose downloading its Whisper model:
      # pre-build-cache-path: FlowMoose/Models/ggml-base.bin
      # pre-build-cache-key: whisper-base-model-v1
      # pre-build-script: .ci/download-whisper-model.sh

      # ── Runners ─────────────────────────────────────────────────────────
      # runs-on-build: '["self-hosted","agent-alex"]'   # FlowMoose
      # runs-on-publish: '["self-hosted","agent-alex"]' # FlowMoose
