# ── Per-app PR distribution shell ────────────────────────────────────────────
# Copy into each app repo at .github/workflows/distribute-pr.yml.
# PR builds are intentionally lightweight: changelog safeguard + compile-only.
# No signing, no S3, no PR comment. Beta and release workflows do the heavy
# lifting on merged PRs and tagged releases.
# ─────────────────────────────────────────────────────────────────────────────
name: Distribute PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  pr:
    uses: LeanBytes/workflows-macos/.github/workflows/distribute-pr.yml@v0.3.32
    with:
      # ── Scheme name (literal, required for fork-PR support) ────────────
      # GitHub strips `vars.*` from fork-PR workflow runs, so a vars-based
      # scheme name would resolve to empty. Hardcode here as a literal
      # string. Same-repo-only consumers can omit this and the workflow
      # falls back to `vars.SCHEME_NAME`.
      scheme-name: MyAppScheme

      # ── Optional per-app inputs (uncomment what applies) ────────────────
      # use-tuist: true                # FlowMoose
      # runs-on-build: '["self-hosted","agent-alex"]'  # FlowMoose self-hosted
      # extra-xcodebuild-args: ""

      # ── Pre-build hooks (e.g. asset download) ──────────────────────────
      # Caller's script runs on the build runner before xcodebuild.
      # pre-build-cache-path: Models/asset.bin
      # pre-build-cache-key: asset-v1
      # pre-build-script: .ci/download-asset.sh

      # ── Changelog.json (default: Config/Changelog.json) ─────────────────
      # changelog-path: Config/Changelog.json

      # ── Build configuration override (default: "Release") ─────────────
      # configuration-direct: Release
