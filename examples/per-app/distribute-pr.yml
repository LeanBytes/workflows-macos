# ── Per-app PR shell ─────────────────────────────────────────────────────────
# Copy to .github/workflows/distribute-pr.yml. Trigger-only: the orchestrator
# discovers every Config/products/<id>.json and compiles each one. Fork-PR safe
# (the product files ship with the checkout).
# ─────────────────────────────────────────────────────────────────────────────
name: Distribute PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  pr:
    uses: LeanBytes/workflows-macos/.github/workflows/distribute-pr.yml@v0.4.5
