# ── Per-app alpha (invite-only) distribution shell ───────────────────────────
# Copy into each app repo at .github/workflows/distribute-alpha.yml.
#
# MANUAL trigger only. Cuts a signed + notarized Direct build from whatever
# branch you run it against (e.g. a long-lived "3.0" / "v3" branch) and hands it
# out PRIVATELY via an unlisted S3 URL — NO appcast, NO changelog, NO GitHub
# Release. Use it to give a rough early build to a hand-picked few by invite.
#
# v0.4.0: pass `product-id` — identity + base version come from
# Config/products/<id>.json, and the tag is `<id>-v<base>-alpha.<N>`
# (<base> = that product's changelog.versions[0].version, overridable via
# version-base; <N> auto-counted from existing tags).
#
# To cut one:  Actions → "Distribute Alpha" → Run workflow → pick the branch → Run.
# The run summary prints the download URL to send to invitees.
#
# TWO prerequisites:
#   1. This file must exist on the DEFAULT branch (for the "Run workflow" button)
#      AND on the branch you build (so the run uses that branch's code).
#   2. Your distribute-release.yml MUST exclude alpha tags (its filter already
#      has `- '!*-v*-alpha.*'`), or the tag push fires a real release.
# ─────────────────────────────────────────────────────────────────────────────
name: Distribute Alpha

on:
  workflow_dispatch:
    inputs:
      product-id:
        description: "Product id (Config/products/<id>.json) to cut an alpha of."
        required: true
        default: "main"
      version-base:
        description: "Override base version (e.g. 3.0.0). Empty = the product's changelog versions[0]."
        required: false
        default: ""

permissions:
  contents: write          # push the <id>-v<base>-alpha.<N> tag

jobs:
  alpha:
    uses: LeanBytes/workflows-macos/.github/workflows/distribute-alpha.yml@v0.4.3
    # Direct subset only — no Sparkle key, no App Store certs/profiles.
    secrets:
      DEVELOPER_ID_P12_BASE64:        ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_PASSWORD:          ${{ secrets.DEVELOPER_ID_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_DEVID_BASE64:         ${{ secrets.PROV_PROF_DEVID_BASE64 }}
      # PROV_PROF_DEVID_PRO_BASE64:   ${{ secrets.PROV_PROF_DEVID_PRO_BASE64 }}   # if the product names devid-profile-secret
      ASC_KEY_ID:                     ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID:                  ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_BASE64:                 ${{ secrets.ASC_KEY_BASE64 }}
      AWS_ACCESS_KEY_ID:              ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:          ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # SHARED_WORKFLOWS_TOKEN:       ${{ secrets.SHARED_WORKFLOWS_TOKEN }}        # only if workflows-macos is a private fork
    with:
      product-id: ${{ inputs.product-id }}       # sources identity + base from Config/products/<id>.json
      version-base: ${{ inputs.version-base }}
      # ── Per-app build flags (match your distribute-beta.yml) ────────────
      # use-tuist: true                # FlowMoose
      # lfs: true                      # if a build input (e.g. a model) is git-LFS-tracked — FlowMoose
      # runs-on-build: '["self-hosted","agent-alex"]'
      # runs-on-publish: '["self-hosted","agent-alex"]'
      # pre-build-cache-path: FlowMoose/Models/ggml-base.bin
      # pre-build-cache-key: whisper-base-model-v1
      # pre-build-script: .ci/download-whisper-model.sh
