# ── Per-app release distribution shell ───────────────────────────────────────
# Copy into each app repo at .github/workflows/distribute-release.yml.
# Triggered by pushing a v*.*.* tag. Strict fail-safe order: GH Release is
# only created after every other publish step succeeds.
# ─────────────────────────────────────────────────────────────────────────────
name: Distribute Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*-beta.*'   # exclude beta tags auto-pushed by distribute-beta.yml

permissions:
  contents: write    # for the GH Release

jobs:
  release:
    uses: LeanBytes/workflows-macos/.github/workflows/distribute-release.yml@v0.3.28
    # `secrets: inherit` only works when the caller is in the same org/enterprise
    # as workflows-macos (LeanBytes). Cross-account callers (e.g. consumers in a
    # personal org) must pass secrets explicitly — `inherit` silently passes
    # nothing across the boundary. The explicit list below works universally.
    secrets:
      DEVELOPER_ID_P12_BASE64:        ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_PASSWORD:          ${{ secrets.DEVELOPER_ID_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_DEVID_BASE64:         ${{ secrets.PROV_PROF_DEVID_BASE64 }}
      # PROV_PROF_DEVID_FINDER_BASE64:  ${{ secrets.PROV_PROF_DEVID_FINDER_BASE64 }}   # only if has-finder-extension: true
      # PROV_PROF_DEVID_QL_BASE64:      ${{ secrets.PROV_PROF_DEVID_QL_BASE64 }}       # only if has-quicklook-extension: true
      # APPLE_DISTR_P12_BASE64:         ${{ secrets.APPLE_DISTR_P12_BASE64 }}          # only if build-app-store: true
      # APPLE_DISTR_PASSWORD:           ${{ secrets.APPLE_DISTR_PASSWORD }}            # only if build-app-store: true
      # MAC_DISTR_P12_BASE64:           ${{ secrets.MAC_DISTR_P12_BASE64 }}            # only if build-app-store: true
      # MAC_DISTR_PASSWORD:             ${{ secrets.MAC_DISTR_PASSWORD }}              # only if build-app-store: true
      # PROV_PROF_STORE_BASE64:         ${{ secrets.PROV_PROF_STORE_BASE64 }}          # only if build-app-store: true
      # PROV_PROF_STORE_FINDER_BASE64:  ${{ secrets.PROV_PROF_STORE_FINDER_BASE64 }}   # only if build-app-store + has-finder-extension
      # PROV_PROF_STORE_QL_BASE64:      ${{ secrets.PROV_PROF_STORE_QL_BASE64 }}       # only if build-app-store + has-quicklook-extension
      ASC_KEY_ID:                     ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID:                  ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_BASE64:                 ${{ secrets.ASC_KEY_BASE64 }}
      AWS_ACCESS_KEY_ID:              ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:          ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      SPARKLE_ED_PRIVATE_KEY:         ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
      # SHARED_WORKFLOWS_TOKEN:         ${{ secrets.SHARED_WORKFLOWS_TOKEN }}          # only if you fork workflows-macos private
    with:
      # ── Build toggles (default: build-direct=true, build-app-store=false) ─
      # build-direct: false             # only set if you want to skip Direct
      # build-app-store: true           # macpacker, filefillet

      # ── Distribute toggles (default: distribute-stable-appcast=true) ────
      # distribute-app-store: true      # macpacker, filefillet (altool → ASC)
      # distribute-stable-appcast: false # set false only if no Sparkle

      # ── Per-app build flags ─────────────────────────────────────────────
      # use-tuist: true                # FlowMoose
      # has-finder-extension: true     # macpacker
      # has-quicklook-extension: true  # macpacker
      # extra-xcodebuild-args: ""

      # ── Pre-build hooks (e.g. asset download) ──────────────────────────
      # Example: FlowMoose downloading its Whisper model:
      # pre-build-cache-path: FlowMoose/Models/ggml-base.bin
      # pre-build-cache-key: whisper-base-model-v1
      # pre-build-script: .ci/download-whisper-model.sh

      # ── Runners ─────────────────────────────────────────────────────────
      # runs-on-build: '["self-hosted","agent-alex"]'   # FlowMoose
      # runs-on-publish: '["self-hosted","agent-alex"]' # FlowMoose

      # ── Changelog.json (default: Config/Changelog.json) ─────────────────
      # changelog-path: Config/Changelog.json

      # ── Build configuration overrides (each default: "Release") ───────
      # Set these only if your .xcodeproj has separate configs per channel
      # (e.g. "Release" for Direct + "Release Store" for App Store).
      # configuration-direct: Release
      # configuration-app-store: Release Store
