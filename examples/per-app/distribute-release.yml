# ── Per-app release shell ────────────────────────────────────────────────────
# Copy to .github/workflows/distribute-release.yml. Each product releases
# INDEPENDENTLY via its own tag `<id>-v<X.Y.Z>` (e.g. `main-v2.13.0`). The
# orchestrator parses the tag → the target product, validates the version
# against that product's inline changelog, and builds + publishes just it.
# ─────────────────────────────────────────────────────────────────────────────
name: Distribute Release

on:
  push:
    tags:
      - '*-v*'            # per-product release, e.g. main-v2.13.0 / companion-v1.4.0
      - '!*-v*-beta.*'    # exclude auto-pushed betas
      - '!*-v*-alpha.*'   # exclude manual alphas

permissions:
  contents: write
  discussions: write     # required only for the opt-in create-discussion path

jobs:
  release:
    uses: LeanBytes/workflows-macos/.github/workflows/distribute-release.yml@v0.4.4
    secrets:
      DEVELOPER_ID_P12_BASE64:        ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_PASSWORD:          ${{ secrets.DEVELOPER_ID_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_DEVID_BASE64:         ${{ secrets.PROV_PROF_DEVID_BASE64 }}
      # PROV_PROF_DEVID_PRO_BASE64:   ${{ secrets.PROV_PROF_DEVID_PRO_BASE64 }}
      # PROV_PROF_STORE_PRO_BASE64:   ${{ secrets.PROV_PROF_STORE_PRO_BASE64 }}
      # APPLE_DISTR_P12_BASE64:       ${{ secrets.APPLE_DISTR_P12_BASE64 }}     # if any product builds App Store
      # APPLE_DISTR_PASSWORD:         ${{ secrets.APPLE_DISTR_PASSWORD }}
      # MAC_DISTR_P12_BASE64:         ${{ secrets.MAC_DISTR_P12_BASE64 }}
      # MAC_DISTR_PASSWORD:           ${{ secrets.MAC_DISTR_PASSWORD }}
      # PROV_PROF_STORE_BASE64:       ${{ secrets.PROV_PROF_STORE_BASE64 }}
      ASC_KEY_ID:                     ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID:                  ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_BASE64:                 ${{ secrets.ASC_KEY_BASE64 }}
      AWS_ACCESS_KEY_ID:              ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:          ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      SPARKLE_ED_PRIVATE_KEY:         ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
    # with:
    #   build-app-store: true            # default a product file inherits
    #   distribute-app-store: true
    #   use-tuist: true
    #   runs-on-build: '["self-hosted","agent-alex"]'
    #   create-discussion: true          # opt-in; needs Discussions + the exact category
